<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #5865f2; --bg: #0e1621; --panel: #17212b; --text: #fff; --sub: #708499; --danger: #ed4245; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Экраны */
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* РЕГИСТРАЦИЯ */
        #login-screen { justify-content: center; align-items: center; background: radial-gradient(circle at top, #1e2a38, #0e1621); }
        .auth-card { width: 90%; max-width: 400px; background: var(--panel); padding: 40px 30px; border-radius: 28px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
        .auth-card input, .auth-card textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: var(--bg); color: #fff; outline: none; }
        
        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        .app-shell { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; }
        .nav-bar i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.2s; }
        .nav-bar i.active { color: var(--accent); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }
        .tab-header { padding: 20px 25px; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* ПРОФИЛЬ */
        .profile-card { background: linear-gradient(135deg, #2b5278, #5865f2); margin: 15px; border-radius: 20px; padding: 30px 20px; text-align: center; }
        .avatar-big { width: 80px; height: 80px; background: #fff; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: var(--accent); border: 4px solid rgba(255,255,255,0.2); }
        .info-block { background: var(--bg); margin: 0 15px 10px; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; }

        /* ПОИСК */
        .search-area { padding: 15px; }
        .res-card { background: var(--bg); border-radius: 15px; padding: 20px; margin-top: 15px; text-align: center; border: 1px solid var(--accent); display: none; }

        /* ЧАТ */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0e1621; }
        .msg { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 14px; position: relative; }
        .msg.me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        .msg b { font-size: 11px; color: var(--accent); display: block; margin-bottom: 4px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }
        
        @media (max-width: 768px) { 
            .app-shell { flex-direction: column-reverse; } 
            .nav-bar { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; border-top: 1px solid #17212b; } 
            .sidebar { width: 100%; height: calc(100vh - 60px); } 
            .chat-main { display: none; } 
            .chat-main.mobile-active { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: calc(100vh - 60px); z-index: 100; background: var(--bg); }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px;">VERONAGRAM</h2>
            <input type="text" id="reg-name" placeholder="Придумайте никнейм">
            <input type="email" id="reg-email" placeholder="Ваша почта">
            <textarea id="reg-bio" placeholder="Пару слов о себе..."></textarea>
            <button class="btn" onclick="startApp()">ВОЙТИ В СЕТЬ</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-shell">
            <nav class="nav-bar">
                <i class="fas fa-comment" id="nav-chats" onclick="switchTab('chats', this)"></i>
                <i class="fas fa-search" id="nav-search" onclick="switchTab('search', this)"></i>
                <i class="fas fa-user-circle active" id="nav-profile" onclick="switchTab('profile', this)"></i>
            </nav>

            <aside class="sidebar">
                <div id="tab-chats" class="tab-content">
                    <div class="tab-header">Чаты</div>
                    <div style="padding: 20px; color: var(--sub); cursor: pointer;" onclick="openGlobalChat()">
                        <div style="display:flex; gap:15px; align-items:center;">
                            <div style="width:50px; height:50px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-users"></i></div>
                            <div>
                                <b>Общий чат</b><br>
                                <small style="color:var(--accent);">Все пользователи здесь</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-search" class="tab-content">
                    <div class="tab-header">Поиск</div>
                    <div class="search-area">
                        <input type="text" id="sq" placeholder="Поиск @admin..." oninput="findUser()" style="width:100%; padding:12px; background:var(--bg); border:none; border-radius:10px; color:#fff;">
                        <div id="res" class="res-card">
                            <div class="avatar-big" style="width:50px; height:50px; font-size:20px;"><i class="fas fa-robot"></i></div>
                            <b id="res-name">Verona Admin</b>
                            <p style="color:var(--sub); font-size:12px; margin: 5px 0 15px;">@admin</p>
                            <div style="display:flex; gap:10px;">
                                <button class="btn" style="padding:8px; font-size:11px;" onclick="alert('Запрос отправлен!')">Написать</button>
                                <button class="btn" style="padding:8px; font-size:11px; background:var(--danger);" onclick="alert('Пользователь заблокирован')">Блок</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-profile" class="tab-content active">
                    <div class="tab-header">Профиль</div>
                    <div class="profile-card">
                        <div class="avatar-big"><i class="fas fa-user"></i></div>
                        <h2 id="p-name">Имя</h2>
                    </div>
                    <div class="info-block"><i class="fas fa-envelope"></i><div><small style="color:var(--sub); display:block;">Почта</small><span id="p-email">---</span></div></div>
                    <div class="info-block"><i class="fas fa-info-circle"></i><div><small style="color:var(--sub); display:block;">О себе</small><span id="p-bio">---</span></div></div>
                    <div style="padding:15px;"><button class="btn" style="background:var(--danger);" onclick="location.reload()">ВЫЙТИ ИЗ АККАУНТА</button></div>
                </div>
            </aside>
            
            <main class="chat-main" id="chat-window">
                <div class="tab-header" style="display:flex; align-items:center; gap:15px;">
                    <i class="fas fa-arrow-left" style="cursor:pointer;" onclick="closeChat()"></i>
                    <span>Общий чат</span>
                </div>
                <div class="messages" id="chat-box">
                    <div style="text-align:center; color:var(--sub); margin-top:20px; font-size:12px;">Добро пожаловать в Veronagram!</div>
                </div>
                <div style="padding:15px; background:var(--panel); display:flex; gap:10px; border-top:1px solid rgba(255,255,255,0.05);">
                    <input type="text" id="m-in" placeholder="Написать сообщение..." style="flex:1; background:var(--bg); border:none; padding:12px; border-radius:10px; color:#fff; outline:none;" onkeypress="if(event.key==='Enter') send()">
                    <button class="btn" style="width:auto; padding:0 20px; background:transparent; color:var(--accent); font-size:20px;" onclick="send()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ТВОЯ ПРОВЕРЕННАЯ КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
            authDomain: "veronagram-aafc1.firebaseapp.com",
            databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
            projectId: "veronagram-aafc1",
            storageBucket: "veronagram-aafc1.firebasestorage.app",
            messagingSenderId: "292300518581",
            appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myNick = "";

        // ФУНКЦИЯ ВХОДА
        function startApp() {
            myNick = document.getElementById('reg-name').value;
            if(!myNick) return alert("Пожалуйста, введите никнейм!");
            
            // Заполняем профиль данными из формы
            document.getElementById('p-name').innerText = myNick;
            document.getElementById('p-email').innerText = document.getElementById('reg-email').value || 'не указана';
            document.getElementById('p-bio').innerText = document.getElementById('reg-bio').value || 'Нет описания';

            // Переключаем экраны
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
            
            // СЛУШАЕМ СООБЩЕНИЯ ИЗ БАЗЫ
            db.ref("messages").on("value", (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                const data = snapshot.val();
                
                for(let id in data) {
                    const m = data[id];
                    const div = document.createElement('div');
                    div.className = m.user === myNick ? "msg me" : "msg other";
                    div.innerHTML = `<b>${m.user}</b>${m.text}`;
                    box.appendChild(div);
                }
                box.scrollTop = box.scrollHeight; // Автопрокрутка вниз
            });
        }

        // ОТПРАВКА СООБЩЕНИЯ
        function send() {
            const input = document.getElementById('m-in');
            const text = input.value.trim();
            if(!text) return;
            
            db.ref("messages").push().set({
                user: myNick,
                text: text,
                time: Date.now()
            });
            input.value = "";
        }

        // ПОИСК
        function findUser() {
            const q = document.getElementById('sq').value.toLowerCase();
            const res = document.getElementById('res');
            // Если вводим admin, показываем карточку
            res.style.display = (q.includes('admin')) ? 'block' : 'none';
        }

        // ВКЛАДКИ
        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            el.classList.add('active');
        }

        // МОБИЛЬНЫЕ ФУНКЦИИ
        function openGlobalChat() {
            if(window.innerWidth <= 768) {
                document.getElementById('chat-window').classList.add('mobile-active');
            }
        }
        function closeChat() {
            document.getElementById('chat-window').classList.remove('mobile-active');
        }
    </script>
</body>
</html>
