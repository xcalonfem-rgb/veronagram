<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VERONA ELITE ULTIMATE V14</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; 
            --bg: #030508; 
            --panel: #0a0d14; 
            --text: #ffffff; 
            --neon: 0 0 25px var(--accent);
            --gradient: linear-gradient(135deg, var(--accent), #7000ff);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; width: 100vw; 
            overflow: hidden; display: flex;
        }

        /* --- ПЛАВНЫЕ ПЕРЕХОДЫ --- */
        .tab-content { 
            display: none; opacity: 0; 
            transform: scale(0.98); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-direction: column; height: 100%; overflow-y: auto;
        }
        .tab-content.active { display: flex; opacity: 1; transform: scale(1); }

        /* --- AUTH --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 40px; border: 1px solid var(--accent); width: 90%; max-width: 400px; text-align: center; box-shadow: var(--neon); }
        .auth-input { background: #000; border: 1px solid #222; padding: 18px; border-radius: 20px; color: #fff; width: 100%; margin-bottom: 15px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { background: var(--gradient); color: #000; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* --- НАВИГАЦИЯ --- */
        .nav-bar { width: 90px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 40px; border-right: 1px solid #111; z-index: 5000; transition: 0.3s; }
        .nav-bar i { font-size: 26px; color: #333; cursor: pointer; transition: 0.4s; }
        .nav-bar i.active { color: var(--accent); text-shadow: var(--neon); transform: scale(1.2); }
        .plus-btn { color: var(--accent) !important; font-size: 32px !important; margin-top: auto; }

        /* --- САЙДБАР --- */
        .sidebar { width: 420px; background: var(--panel); display: flex; flex-direction: column; border-right: 2px solid #000; position: relative; z-index: 100; }
        
        /* STORIES HD */
        .stories-row { display: flex; gap: 18px; padding: 20px; overflow-x: auto; border-bottom: 1px solid #151921; scrollbar-width: none; }
        .story-circle { min-width: 75px; height: 75px; border-radius: 50%; background: var(--gradient); padding: 3px; cursor: pointer; transition: 0.3s; position: relative; }
        .story-circle .inner { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #000; overflow: hidden; }
        .story-circle img, .story-circle video { width: 100%; height: 100%; object-fit: cover; }
        .story-circle span { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); font-size: 10px; background: #000; padding: 2px 6px; border-radius: 10px; border: 1px solid var(--accent); white-space: nowrap; }

        /* СПИСКИ */
        .user-item { display: flex; align-items: center; padding: 18px 25px; gap: 15px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .user-item:hover { background: rgba(255,255,255,0.03); }
        .user-ava-cont { position: relative; width: 60px; height: 60px; }
        .user-ava-cont img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .online-dot { width: 14px; height: 14px; background: #0f8; border-radius: 50%; border: 3px solid #0a0d14; position: absolute; bottom: 2px; right: 2px; display: none; box-shadow: 0 0 10px #0f8; }
        .is-online .online-dot { display: block; }

        /* --- ОКНО ЧАТА (HD ADAPTIVE) --- */
        .chat-main { flex: 1; display: none; flex-direction: column; background: #05070a; position: relative; z-index: 2000; }
        .chat-main.active { display: flex; }
        .chat-header { padding: 15px 25px; background: rgba(10,13,20,0.9); backdrop-filter: blur(20px); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--accent); }
        
        .msg-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-size: cover; background-position: center; }
        .msg { max-width: 75%; padding: 14px 18px; border-radius: 22px; position: relative; font-size: 15px; line-height: 1.4; animation: msgSlide 0.3s ease; }
        @keyframes msgSlide { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .msg.me { align-self: flex-end; background: var(--gradient); color: #000; font-weight: 600; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(0,242,254,0.2); }
        .msg.other { align-self: flex-start; background: #161b22; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg video { width: 100%; border-radius: 12px; margin-top: 8px; }
        .like-tag { position: absolute; bottom: -8px; right: 10px; background: #000; border: 1px solid var(--accent); border-radius: 10px; padding: 1px 6px; font-size: 11px; }

        /* INPUT */
        .input-wrap { background: #0a0d14; padding: 12px 0; border-top: 1px solid #1a1a1a; }
        .input-area { padding: 0 25px; display: flex; align-items: center; gap: 15px; }
        .input-area input { flex: 1; background: #000; border: 1px solid #222; padding: 14px 22px; border-radius: 30px; color: #fff; outline: none; }

        /* ПРОФИЛЬ */
        .prof-header { padding: 40px 20px; text-align: center; }
        .prof-ava { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; box-shadow: var(--neon); cursor: pointer; }
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
        .post-item { aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.3s; }
        .post-item:hover { transform: scale(0.98); filter: brightness(1.2); }
        .post-item img, .post-item video { width: 100%; height: 100%; object-fit: cover; }

        /* МОДАЛКИ */
        #zoom-view { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #group-info-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 95000; display: none; align-items: center; justify-content: center; }

        /* ADAPTIVE MOBILE */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav-bar { width: 100%; height: 75px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; border-right: none; border-top: 1px solid #111; padding: 0; }
            .sidebar { width: 100%; height: 100vh; }
            .chat-main { position: fixed; inset: 0; width: 100%; height: 100%; }
            .plus-btn { margin-top: 0; }
            .tab-content { padding-bottom: 90px; }
        }
    </style>
</head>
<body>

<div id="zoom-view" onclick="this.style.display='none'"><div id="zoom-target"></div></div>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--accent); letter-spacing: 8px;">VERONA</h1>
        <p style="opacity:0.3; font-size: 11px; margin-bottom: 30px;">ELITE SECURE ACCESS</p>
        <input type="text" id="auth-nick" class="auth-input" placeholder="НИКНЕЙМ">
        <input type="password" id="auth-pass" class="auth-input" placeholder="ПАРОЛЬ">
        <button class="auth-btn" onclick="handleAuth()">ВОЙТИ В СИСТЕМУ</button>
    </div>
</div>

<div id="create-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:90000; display:none; align-items:center; justify-content:center;">
    <div class="auth-card">
        <h3>СОЗДАТЬ ОБЪЕКТ</h3><br>
        <input type="text" id="group-name" class="auth-input" placeholder="Название">
        <input type="text" id="group-desc" class="auth-input" placeholder="Описание">
        <select id="group-type" class="auth-input">
            <option value="group">ГРУППА (ЧАТ)</option>
            <option value="channel">КАНАЛ (ПОСТЫ)</option>
        </select>
        <button class="auth-btn" onclick="createGroup()">СОЗДАТЬ</button>
        <p onclick="this.parentElement.parentElement.style.display='none'" style="margin-top:20px; cursor:pointer; opacity:0.5">ОТМЕНА</p>
    </div>
</div>

<div id="group-info-modal">
    <div class="auth-card">
        <img id="gi-ava" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent); margin-bottom:10px;">
        <h2 id="gi-name"></h2>
        <p id="gi-desc" style="opacity:0.6; margin:10px 0 20px;"></p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <label class="auth-btn" style="width:auto; font-size:12px;">АВА <input type="file" hidden onchange="upFile(this,'group_ava')"></label>
            <button class="auth-btn" style="width:auto; font-size:12px; background:#333" onclick="showInviteList()">ПРИГЛАСИТЬ</button>
        </div>
        <div id="invite-list" style="max-height:150px; overflow-y:auto; margin-top:15px; border:1px solid #222; border-radius:10px;"></div>
        <button class="auth-btn" style="margin-top:20px; background:none; border:1px solid #ff0055; color:#ff0055" onclick="document.getElementById('group-info-modal').style.display='none'">ЗАКРЫТЬ</button>
    </div>
</div>

<nav class="nav-bar">
    <i class="fas fa-comment-dots active" onclick="tab('chats')" id="n-chats"></i>
    <i class="fas fa-search" onclick="tab('friends')" id="n-friends"></i>
    <i class="fas fa-plus-circle plus-btn" onclick="document.getElementById('create-modal').style.display='flex'"></i>
    <i class="fas fa-layer-group" onclick="tab('themes')" id="n-themes"></i>
    <i class="fas fa-user-circle" onclick="tab('prof')" id="n-prof"></i>
</nav>

<aside class="sidebar">
    <div id="t-chats" class="tab-content active">
        <div class="stories-row" id="stories-bar"></div>
        <div id="chat-list"></div>
    </div>
    <div id="t-friends" class="tab-content">
        <div style="padding:25px"><input type="text" id="user-search" placeholder="Поиск душ..." oninput="searchUsers(this.value)" class="auth-input"></div>
        <div id="friends-list"></div>
    </div>
    <div id="t-themes" class="tab-content"><div id="theme-grid" style="padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:15px"></div></div>
    <div id="t-prof" class="tab-content">
        <div class="prof-header">
            <img id="m-ava" src="" class="prof-ava" onclick="zoom(this.src)">
            <h2 id="m-name" style="margin:15px 0"></h2>
            <input type="text" id="m-status" onblur="saveStatus()" class="auth-input" style="background:none; border-bottom:1px solid var(--accent); width:80%">
            <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                <label class="auth-btn" style="width:auto; padding:12px 20px">ПОСТ <input type="file" hidden onchange="upFile(this,'post')"></label>
                <label class="auth-btn" style="width:auto; padding:12px 20px; background:#ff0055">ИСТОРИЯ <input type="file" hidden onchange="upFile(this,'story')"></label>
            </div>
        </div>
        <div id="my-posts" class="posts-grid"></div>
    </div>
</aside>

<main class="chat-main" id="chat-window">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <div style="position:relative" id="header-ava-cont">
            <img id="c-ava" src="" style="width:50px; height:50px; border-radius:50%; border: 2px solid var(--accent); cursor:pointer" onclick="viewPeerProfile()">
            <div class="online-dot"></div>
        </div>
        <div>
            <b id="c-name" style="display:block">Чат</b>
            <span id="c-sub" style="font-size:11px; opacity:0.4">загрузка...</span>
        </div>
        <div style="margin-left:auto; display:flex; gap:20px; align-items:center;">
            <i class="fas fa-cog" id="g-info-btn" style="display:none; cursor:pointer; color:var(--accent)" onclick="openGroupInfo()"></i>
            <label style="cursor:pointer; color:var(--accent)"><i class="fas fa-image"></i><input type="file" hidden onchange="setChatBg(this)"></label>
            <i class="fas fa-trash" onclick="clearChat()" style="opacity:0.3"></i>
        </div>
    </div>
    <div class="msg-box" id="messages"></div>
    <div class="input-wrap">
        <div id="reply-preview" style="display:none; padding:10px 25px; background:rgba(255,255,255,0.05); border-left:4px solid var(--accent); justify-content:space-between">
            <span id="reply-text" style="font-size:12px"></span><i class="fas fa-times" onclick="cancelReply()"></i>
        </div>
        <div class="input-area">
            <i class="fas fa-microphone" id="mic-btn" onclick="toggleRec()" style="color:var(--accent); font-size:24px"></i>
            <input type="text" id="msg-in" placeholder="Ваше послание..." onkeypress="if(event.key==='Enter') send()">
            <i class="fas fa-paper-plane" onclick="send()" style="color:var(--accent); font-size:24px"></i>
        </div>
    </div>
</main>

<script>
    const IMGBB_KEY = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";
    const firebaseConfig = { databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('v14-user')), currentChat, chatFriend, replyMsg = null;
    let recorder, chunks = [], currentGroupData = null;

    if(me) loginOk(me);

    async function handleAuth() {
        const n = document.getElementById('auth-nick').value.toLowerCase().trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!n || !p) return;
        const s = await db.ref('users/'+n).once('value');
        if(s.exists() && s.val().pass !== p) return alert("ОШИБКА ДОСТУПА");
        const u = s.exists() ? s.val() : { nick:n, pass:p, name:n, ava:"", status:"Verona Elite User", posts:[], stories:[], lastSeen: Date.now() };
        if(!s.exists()) await db.ref('users/'+n).set(u);
        loginOk(u);
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v14-user', JSON.stringify(me));
        document.getElementById('auth-screen').style.display = 'none';
        setInterval(() => db.ref('users/'+me.nick).update({lastSeen: Date.now()}), 30000);
        db.ref('users/'+me.nick).on('value', s => {
            const d = s.val(); if(!d) return;
            document.getElementById('m-name').innerText = d.name;
            document.getElementById('m-ava').src = d.ava || 'https://via.placeholder.com/150';
            document.getElementById('m-status').value = d.status || "";
            renderPosts('my-posts', d.posts);
        });
        loadChatList(); loadThemes(); loadStories();
    }

    function tab(t) {
        document.querySelectorAll('.tab-content, .nav-bar i').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('n-'+t).classList.add('active');
    }

    function zoom(url) {
        const t = document.getElementById('zoom-target');
        const isVid = url.includes("video") || url.match(/\.(mp4|mov|webm)/i);
        t.innerHTML = isVid ? `<video src="${url}" controls autoplay style="max-width:90vw; max-height:85vh; border-radius:15px;"></video>` : `<img src="${url}" style="max-width:90vw; max-height:85vh; border-radius:15px;">`;
        document.getElementById('zoom-view').style.display = 'flex';
    }

    /* GROUPS ENGINE */
    async function createGroup() {
        const name = document.getElementById('group-name').value;
        const desc = document.getElementById('group-desc').value;
        const type = document.getElementById('group-type').value;
        if(!name) return;
        const id = "grp_" + Date.now();
        const data = { id, name, desc, type, creator: me.nick, ava: "" };
        await db.ref('groups/'+id).set(data);
        await db.ref(`friends/${me.nick}/${id}`).set({name, type, ava: "", isGroup: true});
        document.getElementById('create-modal').style.display = 'none';
    }

    function openGroupInfo() {
        db.ref('groups/'+chatFriend).once('value', s => {
            const d = s.val(); currentGroupData = d;
            document.getElementById('gi-name').innerText = d.name;
            document.getElementById('gi-desc').innerText = d.desc || "Нет описания";
            document.getElementById('gi-ava').src = d.ava || 'https://via.placeholder.com/100';
            document.getElementById('group-info-modal').style.display = 'flex';
        });
    }

    async function showInviteList() {
        const list = document.getElementById('invite-list'); list.innerHTML = "";
        const s = await db.ref(`friends/${me.nick}`).once('value');
        s.forEach(f => {
            if(!f.key.startsWith('grp_')) {
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222" onclick="inviteToGroup('${f.key}','${f.val().name}','${f.val().ava}')">${f.val().name} +</div>`;
            }
        });
    }

    async function inviteToGroup(nick, name, ava) {
        await db.ref(`friends/${nick}/${chatFriend}`).set({name: currentGroupData.name, ava: currentGroupData.ava, type: currentGroupData.type, isGroup: true});
        alert("Приглашение отправлено!");
    }

    /* CHAT CORE */
    function openChat(nick, name, ava, type = 'private', isGroup = false) {
        chatFriend = nick; currentChat = isGroup ? nick : [me.nick, nick].sort().join("_");
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-ava').src = ava || 'https://via.placeholder.com/60';
        document.getElementById('chat-window').classList.add('active');
        document.getElementById('g-info-btn').style.display = isGroup ? 'block' : 'none';

        if(!isGroup) {
            db.ref('users/'+nick).on('value', s => {
                const online = (Date.now() - s.val().lastSeen) < 60000;
                document.getElementById('header-ava-cont').className = online ? 'is-online' : '';
                document.getElementById('c-sub').innerText = online ? 'в сети' : 'не в сети';
            });
        } else { document.getElementById('c-sub').innerText = type.toUpperCase(); }

        db.ref('messages/'+currentChat).on('value', s => {
            const b = document.getElementById('messages'); b.innerHTML = "";
            s.forEach(m => {
                const msg = m.val();
                const d = document.createElement('div');
                d.className = `msg ${msg.s === me.nick ? 'me' : 'other'}`;
                const isVid = msg.t.includes("video") || msg.t.match(/\.(mp4|mov|webm)/i);
                let h = msg.reply ? `<small style="opacity:0.5; display:block">⤴ ${msg.reply}</small>` : "";
                if(isVid) h += `<video src="${msg.t}" controls style="max-width:250px"></video>`;
                else if(msg.type === 'voice') h += `<audio src="${msg.t}" controls style="width:180px; height:35px"></audio>`;
                else h += msg.t;
                if(msg.liked) h += `<span class="like-tag">❤️</span>`;
                d.innerHTML = h;
                d.onclick = () => setReply(msg.t.substring(0,25), m.key);
                d.ondblclick = () => db.ref(`messages/${currentChat}/${m.key}`).update({liked: !msg.liked});
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function send() {
        const txt = document.getElementById('msg-in').value.trim(); if(!txt) return;
        const data = { s:me.nick, t:txt, time:Date.now() };
        if(replyMsg) { data.reply = replyMsg.t; cancelReply(); }
        db.ref('messages/'+currentChat).push(data);
        document.getElementById('msg-in').value = "";
    }

    /* MEDIA HANDLER */
    async function upFile(input, type) {
        const f = input.files[0]; if(!f) return;
        const isVid = f.type.startsWith('video/');
        const fd = new FormData(); fd.append("image", f);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
        const d = await r.json();
        if(d.success) {
            const url = d.data.url;
            if(type === 'ava') db.ref('users/'+me.nick).update({ava: url});
            else if(type === 'group_ava') {
                db.ref('groups/'+chatFriend).update({ava: url});
                db.ref(`friends/${me.nick}/${chatFriend}`).update({ava: url});
            } else if(type === 'post') {
                const s = await db.ref('users/'+me.nick+'/posts').once('value');
                const p = s.val() || []; p.push({url, isVideo: isVid});
                db.ref('users/'+me.nick).update({posts: p});
            } else if(type === 'story') {
                const s = await db.ref('users/'+me.nick+'/stories').once('value');
                const st = s.val() || []; st.push({url, isVideo: isVid});
                db.ref('users/'+me.nick).update({stories: st});
            }
        }
    }

    function renderPosts(id, p) {
        const g = document.getElementById(id); g.innerHTML = "";
        if(p) p.slice().reverse().forEach(obj => {
            const tag = obj.isVideo ? `<video src="${obj.url}"></video>` : `<img src="${obj.url}">`;
            g.innerHTML += `<div class="post-item" onclick="zoom('${obj.url}')">${tag}</div>`;
        });
    }

    function loadStories() {
        db.ref('users').on('value', s => {
            const bar = document.getElementById('stories-bar'); bar.innerHTML = "";
            s.forEach(u => {
                const d = u.val();
                if(d.stories && d.stories.length > 0) {
                    const last = d.stories[d.stories.length-1];
                    const tag = last.isVideo ? `<video src="${last.url}"></video>` : `<img src="${last.url}">`;
                    bar.innerHTML += `<div class="story-circle" onclick="zoom('${last.url}')"><div class="inner">${tag}</div><span>${d.name}</span></div>`;
                }
            });
        });
    }

    /* HELPERS */
    function loadChatList() {
        db.ref(`friends/${me.nick}`).on('value', s => {
            const l = document.getElementById('chat-list'); l.innerHTML = "";
            s.forEach(f => {
                const d = f.val();
                l.innerHTML += `<div class="user-item" onclick="openChat('${f.key}','${d.name}','${d.ava}','${d.type||'private'}', ${d.isGroup||false})">
                    <div class="user-ava-cont"><img src="${d.ava||'https://via.placeholder.com/60'}"></div>
                    <b>${d.name} ${d.type==='channel'?'📢':''}</b>
                </div>`;
            });
        });
    }

    async function toggleRec() {
        if(!recorder || recorder.state==='inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream); chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const b = new Blob(chunks, {type:'audio/webm'}); const r = new FileReader();
                r.readAsDataURL(b); r.onloadend = () => {
                    db.ref('messages/'+currentChat).push({s:me.nick, t:r.result, type:'voice', time:Date.now()});
                };
            };
            recorder.start(); document.getElementById('mic-btn').style.color='#ff0055';
        } else { recorder.stop(); document.getElementById('mic-btn').style.color='var(--accent)'; }
    }

    function loadThemes() { const box = document.getElementById('theme-grid'); [{n:'Neon Blue', p:'#00f2fe', s:'#7000ff'}, {n:'Toxic', p:'#adff2f', s:'#000'}, {n:'Ruby', p:'#ff0055', s:'#222'}].forEach(t => box.innerHTML += `<div style="background:linear-gradient(45deg, ${t.p}, ${t.s}); padding:20px; border-radius:15px; text-align:center; font-weight:bold; cursor:pointer" onclick="setTheme('${t.p}','${t.s}')">${t.n}</div>`); }
    function setTheme(p, s) { document.documentElement.style.setProperty('--accent', p); document.documentElement.style.setProperty('--gradient', `linear-gradient(45deg, ${p}, ${s})`); }
    function closeChat() { document.getElementById('chat-window').classList.remove('active'); chatFriend=null; }
    function setReply(t, id) { replyMsg={t,id}; document.getElementById('reply-text').innerText = "Reply: "+t; document.getElementById('reply-preview').style.display='flex'; }
    function cancelReply() { replyMsg=null; document.getElementById('reply-preview').style.display='none'; }
    function saveStatus() { db.ref('users/'+me.nick).update({status: document.getElementById('m-status').value}); }
    function searchUsers(q) { if(!q) return; db.ref('users').orderByKey().startAt(q.toLowerCase()).endAt(q.toLowerCase()+'\uf8ff').once('value', s => { let h=""; s.forEach(u => { if(u.key!==me.nick) h+=`<div class="user-item" onclick="addFriend('${u.key}','${u.val().name}','${u.val().ava}')">${u.val().name}</div>`; }); document.getElementById('friends-list').innerHTML=h; }); }
    async function addFriend(nick, name, ava) { await db.ref(`friends/${me.nick}/${nick}`).set({name, ava}); tab('chats'); openChat(nick, name, ava); }
</script>
</body>
