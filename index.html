<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #5865f2; --bg: #0e1621; --panel: #17212b;
            --text: #fff; --sub: #708499;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* ЭКРАН ВХОДА */
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .screen.active { display: flex; }

        .auth-card { 
            width: 90%; max-width: 380px; background: var(--panel); 
            padding: 40px 25px; border-radius: 25px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative;
        }

        /* БЕЛАЯ ВОРОНА */
        .verona-logo {
            width: 90px; height: 90px; background: #fff;
            border-radius: 50%; margin: -85px auto 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 45px;
            border: 5px solid var(--panel);
        }

        input, textarea {
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px;
            border: 2px solid transparent; background: var(--bg); color: #fff; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--accent); color: #fff; font-weight: bold;
            font-size: 16px; cursor: pointer; margin-top: 15px;
        }

        .auth-switch { margin-top: 20px; font-size: 14px; color: var(--sub); cursor: pointer; }
        .auth-switch b { color: var(--accent); }

        /* ИНТЕРФЕЙС ПРИЛОЖЕНИЯ */
        .app-container { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; }
        .nav-bar i { font-size: 24px; color: var(--sub); cursor: pointer; }
        .nav-bar i.active { color: var(--accent); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid #111; display: flex; flex-direction: column; }
        .tab-content { display: none; flex-direction: column; height: 100%; }
        .tab-content.active { display: flex; }
        .header { padding: 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #0002; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .nav-bar { width: 100%; height: 65px; position: fixed; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; z-index: 100; }
            .sidebar { width: 100%; flex: 1; padding-bottom: 65px; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-card">
            <div class="verona-logo"><i class="fas fa-crow"></i></div>
            <h2 id="auth-title">Вход</h2>
            
            <input type="text" id="name-input" placeholder="Никнейм">
            <input type="password" id="pass-input" placeholder="Пароль">
            
            <div id="reg-fields" style="display:none">
                <input type="email" placeholder="Электронная почта">
                <textarea placeholder="О себе..."></textarea>
            </div>

            <button class="btn-main" onclick="handleAuth()" id="auth-btn">Войти</button>
            <div class="auth-switch" onclick="toggleAuth()">
                <span id="switch-text">Нет аккаунта?</span> <b id="switch-btn">Зарегистрироваться</b>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-container">
            <nav class="nav-bar">
                <i class="fas fa-comment active" onclick="showTab('chats', this)"></i>
                <i class="fas fa-search" onclick="showTab('search', this)"></i>
                <i class="fas fa-user-circle" onclick="showTab('profile', this)"></i>
            </nav>
            <aside class="sidebar">
                <div id="tab-chats" class="tab-content active">
                    <div class="header">Чаты</div>
                    <div style="padding:20px; color:var(--sub)">Список пуст</div>
                </div>
                <div id="tab-search" class="tab-content">
                    <div class="header">Поиск</div>
                    <div style="padding:20px">
                        <input type="text" placeholder="Введите @id..." style="background:var(--bg)">
                    </div>
                </div>
                <div id="tab-profile" class="tab-content">
                    <div class="header">Мой Профиль</div>
                    <div style="padding:30px; text-align:center;">
                        <div class="verona-logo" style="margin:0 auto 20px; background:var(--accent); color:#fff;"><i class="fas fa-user"></i></div>
                        <h2 id="user-display">Имя</h2>
                        <button class="btn-main" style="background:#ed4245" onclick="location.reload()">Выйти</button>
                    </div>
                </div>
            </aside>
            <main style="flex:1; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--sub)">
                Выберите чат
            </main>
        </div>
    </div>

    <script>
        let isLogin = true;

        // Переключение между Входом и Регистрацией
        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('reg-fields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-title').innerText = isLogin ? 'Вход' : 'Регистрация';
            document.getElementById('auth-btn').innerText = isLogin ? 'Войти' : 'Создать аккаунт';
            document.getElementById('switch-text').innerText = isLogin ? 'Нет аккаунта?' : 'Уже есть аккаунт?';
            document.getElementById('switch-btn').innerText = isLogin ? 'Зарегистрироваться' : 'Войти';
        }

        // ГЛАВНАЯ ФУНКЦИЯ: ПЕРЕХОД В ПРИЛОЖЕНИЕ
        function handleAuth() {
            const name = document.getElementById('name-input').value;
            if(!name) {
                alert("Пожалуйста, введите никнейм!");
                return;
            }
            
            // Устанавливаем имя в профиле
            document.getElementById('user-display').innerText = name;
            
            // Прячем вход, показываем приложение
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
        }

        // Переключение вкладок в приложении
        function showTab(tabId, icon) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            icon.classList.add('active');
        }
    </script>
</body>
</html>
