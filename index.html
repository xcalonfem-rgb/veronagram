<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONA TELEGRAM STYLE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; --bg: #05070a; --panel: #17212b; --text: #fff; --sub: #8b949e;
            --tg-blue: #2481cc; --neon: 0 0 10px var(--accent);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Sidebar & Navigation */
        .sidebar { width: 400px; background: #0e1621; display: flex; flex-direction: column; border-right: 1px solid #000; }
        .nav-bar { width: 70px; background: #0e1621; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 30px; border-right: 1px solid #1c2938; }
        .nav-bar i { font-size: 20px; color: #536d84; cursor: pointer; transition: 0.2s; }
        .nav-bar i.active { color: var(--tg-blue); }

        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }

        /* User List Items */
        .user-item { display: flex; align-items: center; padding: 12px 15px; gap: 15px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #0e1621; }
        .user-item:hover { background: #17212b; }
        .user-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #2b5278; }
        .user-info { flex: 1; overflow: hidden; }
        .user-info b { display: block; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-info small { color: #8b949e; font-size: 13px; }

        /* Chat Window */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #0e1621 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .chat-header { background: #17212b; padding: 10px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; color: #fff; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #182533; border-bottom-left-radius: 4px; }
        
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; color: #a2b5c7; margin-top: 2px; }
        .msg-status { font-size: 12px; }

        /* TG-Style Profile Modal */
        .profile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .tg-profile { width: 100%; max-width: 400px; background: #17212b; border-radius: 15px; overflow: hidden; animation: slideUp 0.3s; }
        .tg-header { position: relative; height: 300px; }
        .tg-header img { width: 100%; height: 100%; object-fit: cover; }
        .tg-header-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        .tg-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .tg-row { display: flex; align-items: center; gap: 20px; padding: 10px 0; border-bottom: 1px solid #232e3b; }
        .tg-row i { color: #6eb1ef; font-size: 18px; width: 25px; text-align: center; }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Input Area */
        .input-area { background: #17212b; padding: 10px 15px; display: none; align-items: center; gap: 15px; }
        input { background: transparent; border: none; color: #fff; flex: 1; padding: 10px; outline: none; font-size: 15px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; flex: 1; }
            .nav-bar { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; z-index: 50; }
            .chat-main { position: fixed; inset: 0; z-index: 200; display: none; }
            .chat-main.active { display: flex; }
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <i class="fas fa-comment-alt active" onclick="tab('chats')" id="n-chats"></i>
    <i class="fas fa-search" onclick="tab('search')" id="n-search"></i>
    <i class="fas fa-user-circle" onclick="tab('prof')" id="n-prof"></i>
</div>

<aside class="sidebar">
    <div id="t-chats" class="tab-content active">
        <div style="padding:15px; font-weight:bold; font-size:18px">Verona Messenger</div>
        <div id="chat-list"></div>
    </div>
    
    <div id="t-search" class="tab-content">
        <div style="padding:10px 15px"><input type="text" id="s-in" placeholder="Поиск людей..." oninput="findUsers()" style="background:#242f3d; border-radius:10px; width:100%"></div>
        <div id="s-res"></div>
    </div>

    <div id="t-prof" class="tab-content">
        <div id="my-profile-tg" class="tg-profile" style="max-width:100%; border-radius:0">
            <div class="tg-header">
                <img id="m-ava-img" src="https://via.placeholder.com/400">
                <div class="tg-header-info">
                    <h2 id="m-name"></h2>
                    <span style="color:#6eb1ef">онлайн</span>
                </div>
                <label style="position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.5); padding:10px; border-radius:50%; cursor:pointer">
                    <i class="fas fa-camera"></i>
                    <input type="file" hidden onchange="uploadAvatar(this)">
                </label>
            </div>
            <div class="tg-body">
                <div class="tg-row"><i class="fas fa-info-circle"></i><div><div id="m-bio">Elite User</div><small style="color:#6eb1ef">О себе</small></div></div>
                <div class="tg-row"><i class="fas fa-at"></i><div><div id="m-nick"></div><small style="color:#6eb1ef">Имя пользователя</small></div></div>
            </div>
        </div>
    </div>
</aside>

<main class="chat-main" id="chat-window">
    <div class="chat-header" onclick="viewFriendProfile()">
        <i class="fas fa-arrow-left" onclick="closeChat(event)" style="display:none" id="back-btn"></i>
        <img id="chat-top-ava" src="">
        <div class="user-info">
            <b id="chat-top-name">Выбери чат</b>
            <small id="chat-top-status" style="color:#6eb1ef">нажми для профиля</small>
        </div>
    </div>
    <div class="msg-box" id="messages"></div>
    <div class="input-area" id="input-area">
        <i class="fas fa-microphone" id="rec-btn" onclick="toggleVoice()" style="color:#6eb1ef; cursor:pointer"></i>
        <input type="text" id="msg-in" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
        <i class="fas fa-paper-plane" onclick="sendMsg()" style="color:#6eb1ef; cursor:pointer"></i>
    </div>
</main>

<div class="profile-overlay" id="prof-modal" onclick="this.style.display='none'">
    <div class="tg-profile" onclick="event.stopPropagation()">
        <div class="tg-header">
            <img id="p-ava" src="">
            <div class="tg-header-info">
                <h2 id="p-name"></h2>
                <span id="p-status" style="color:#6eb1ef">был(а) недавно</span>
            </div>
        </div>
        <div class="tg-body">
            <div class="tg-row"><i class="fas fa-info-circle"></i><div><div id="p-bio">...</div><small style="color:#6eb1ef">О себе</small></div></div>
            <div class="tg-row"><i class="fas fa-at"></i><div><div id="p-nick"></div><small style="color:#6eb1ef">Имя пользователя</small></div></div>
            <button class="btn" onclick="document.getElementById('prof-modal').style.display='none'" style="width:100%; background:#2b5278; color:#fff">Закрыть</button>
        </div>
    </div>
</div>

<script>
    const IMGBB_KEY = "a4feb69baa5d7a0b6e9d3f4f80ce72bd"; 
    const firebaseConfig = {
        apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
        databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
        projectId: "veronagram-aafc1",
        storageBucket: "veronagram-aafc1.appspot.com",
        appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = JSON.parse(localStorage.getItem('v-user-v3')) || null;
    let currentChat = null, friendNick = null;

    // Вход / Регистрация (упрощенно для примера)
    if(!me) {
        const n = prompt("Твой ник:");
        const p = prompt("Твой пароль:");
        if(n && p) {
            db.ref('users/'+n).once('value', s => {
                if(s.val()) { loginOk(s.val()); }
                else { const u = {nick:n, pass:p, name:n, ava:"", bio:"Verona Elite"}; db.ref('users/'+n).set(u); loginOk(u); }
            });
        }
    } else { loginOk(me); }

    function loginOk(u) {
        me = u; localStorage.setItem('v-user-v3', JSON.stringify(me));
        updateMyUI(); loadChats();
    }

    function updateMyUI() {
        document.getElementById('m-name').innerText = me.name;
        document.getElementById('m-nick').innerText = "@"+me.nick;
        document.getElementById('m-ava-img').src = me.ava || 'https://via.placeholder.com/400';
    }

    async function uploadAvatar(input) {
        const file = input.files[0]; if(!file) return;
        const form = new FormData(); form.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:form});
        const data = await res.json();
        if(data.success) {
            me.ava = data.data.url;
            await db.ref('users/'+me.nick).update({ava: me.ava});
            updateMyUI();
        }
    }

    function findUsers() {
        const q = document.getElementById('s-in').value.toLowerCase();
        const res = document.getElementById('s-res'); res.innerHTML = "";
        if(!q) return;
        db.ref('users').once('value', s => {
            s.forEach(u => {
                const user = u.val();
                if(user.nick.includes(q) && user.nick !== me.nick) {
                    res.innerHTML += `
                        <div class="user-item" onclick="startChat('${user.nick}')">
                            <img src="${user.ava || 'https://via.placeholder.com/50'}">
                            <div class="user-info"><b>${user.name}</b><small>@${user.nick}</small></div>
                        </div>`;
                }
            });
        });
    }

    async function startChat(nick) {
        const s = await db.ref('users/'+nick).once('value');
        const u = s.val();
        await db.ref('friends/'+me.nick+'/'+nick).set({name: u.name, ava: u.ava});
        openChat(nick, u.name, u.ava);
    }

    function loadChats() {
        db.ref('friends/'+me.nick).on('value', s => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            s.forEach(f => {
                const friend = f.val();
                list.innerHTML += `
                    <div class="user-item" onclick="openChat('${f.key}','${friend.name}','${friend.ava}')">
                        <img src="${friend.ava || 'https://via.placeholder.com/50'}">
                        <div class="user-info"><b>${friend.name}</b><small>Нажми, чтобы открыть</small></div>
                    </div>`;
            });
        });
    }

    function openChat(nick, name, ava) {
        friendNick = nick;
        currentChat = [me.nick, nick].sort().join("_");
        document.getElementById('chat-top-name').innerText = name;
        document.getElementById('chat-top-ava').src = ava || 'https://via.placeholder.com/40';
        document.getElementById('input-area').style.display = "flex";
        if(window.innerWidth < 768) document.getElementById('chat-window').classList.add('active');

        db.ref('messages/'+currentChat).off();
        db.ref('messages/'+currentChat).on('value', s => {
            const box = document.getElementById('messages'); box.innerHTML = "";
            s.forEach(m => {
                const msg = m.val();
                const d = document.createElement('div');
                d.className = msg.s === me.nick ? "msg me" : "msg other";
                
                // Статус прочтения
                if(msg.s !== me.nick && !msg.read) db.ref('messages/'+currentChat+'/'+m.key).update({read:true});
                const status = msg.s === me.nick ? (msg.read ? ' <i class="fas fa-check-double"></i>' : ' <i class="fas fa-check"></i>') : '';
                
                const time = new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                d.innerHTML = `${msg.t} <div class="msg-meta">${time}${status}</div>`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const t = document.getElementById('msg-in').value.trim();
        if(!t) return;
        db.ref('messages/'+currentChat).push({
            s: me.nick, t: t, time: firebase.database.ServerValue.TIMESTAMP, read: false
        });
        document.getElementById('msg-in').value = "";
    }

    async function viewFriendProfile() {
        if(!friendNick) return;
        const s = await db.ref('users/'+friendNick).once('value');
        const u = s.val();
        document.getElementById('p-name').innerText = u.name;
        document.getElementById('p-nick').innerText = "@"+u.nick;
        document.getElementById('p-bio').innerText = u.bio || "Пользователь Verona";
        document.getElementById('p-ava').src = u.ava || 'https://via.placeholder.com/400';
        document.getElementById('prof-modal').style.display = 'flex';
    }

    function tab(t) {
        document.querySelectorAll('.tab-content, .nav-bar i').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('n-'+t).classList.add('active');
    }

    function closeChat(e) { e.stopPropagation(); document.getElementById('chat-window').classList.remove('active'); }
</script>
</body>
</html>
