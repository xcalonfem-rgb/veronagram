<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #5865f2; --bg: #0e1621; --panel: #17212b; --text: #fff; --sub: #708499;
            --grad: linear-gradient(135deg, #2b5278, var(--accent));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        .app-shell { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 25px; z-index: 100; }
        .nav-bar i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); transform: scale(1.2); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow-y: auto; }
        .tab-content { display: none; flex-direction: column; height: 100%; padding-bottom: 80px; }
        .tab-content.active { display: flex; }

        /* ПРОФИЛЬ */
        .p-header { background: var(--grad); height: 120px; position: relative; width: 100%; transition: 0.5s; }
        .p-avatar { width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--panel); position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .p-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { margin-top: 60px; text-align: center; padding: 0 20px; }

        .file-label { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; display: block; text-align: center; cursor: pointer; margin: 10px 0; font-size: 13px; border: 1px dashed var(--sub); transition: 0.3s; color: var(--sub); }
        .file-label:hover { border-color: var(--accent); color: var(--text); }
        input[type="file"] { display: none; }
        
        input, textarea { background: var(--bg); border: none; padding: 12px; border-radius: 10px; color: #fff; margin: 5px 0; outline: none; width: 100%; border: 1px solid transparent; }
        input:focus { border-color: var(--accent); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        .post-card { background: var(--bg); margin: 15px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .post-card img { width: 100%; max-height: 400px; object-fit: cover; }

        #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 60px; position: fixed; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<div id="edit-modal">
    <div style="background: var(--panel); padding: 25px; border-radius: 25px; width: 90%; max-width: 350px;">
        <h3 style="margin-bottom:15px">Настройки профиля</h3>
        <label class="file-label" id="l-ava">📸 Нажми, чтобы выбрать аватар
            <input type="file" id="f-ava" accept="image/*" onchange="uploadToImgBB(this)">
        </label>
        <input type="text" id="e-name" placeholder="Твое имя">
        <input type="number" id="e-age" placeholder="Сколько лет?">
        <textarea id="e-bio" placeholder="Пару слов о себе..."></textarea>
        <button class="btn" onclick="saveProfile()">СОХРАНИТЬ</button>
        <button class="btn" onclick="closeEdit()" style="background:none; margin-top:5px; color:var(--sub)">Отмена</button>
    </div>
</div>

<div id="login-screen" class="screen active">
    <div style="margin:auto; background:var(--panel); padding:40px; border-radius:30px; text-align:center; width:90%; max-width:380px;">
        <i class="fas fa-bolt" style="font-size: 50px; color: var(--accent); margin-bottom: 10px;"></i>
        <h2 style="letter-spacing: 2px; margin-bottom: 20px;">VERONAGRAM</h2>
        <input type="text" id="a-nick" placeholder="Твой ник (английский)">
        <input type="password" id="a-pass" placeholder="Пароль">
        <input type="text" id="a-name" placeholder="Как тебя зовут?">
        <button class="btn" onclick="auth()" style="margin-top:20px; padding:15px">ВОЙТИ / СОЗДАТЬ</button>
    </div>
</div>

<div id="app-screen" class="screen">
    <div class="app-shell">
        <nav class="nav-bar">
            <i class="fas fa-home" onclick="tab('chats')" id="n-chats"></i>
            <i class="fas fa-palette" onclick="tab('pal')" id="n-pal"></i>
            <i class="fas fa-user-circle" onclick="tab('prof')" id="n-prof"></i>
        </nav>

        <aside class="sidebar">
            <div id="t-chats" class="tab-content active">
                <div style="padding:20px; font-weight:bold; border-bottom:1px solid #222;">Лента сообщений</div>
                <div style="margin:auto; text-align:center; color:var(--sub); padding:40px;">Здесь будут твои чаты</div>
            </div>
            
            <div id="t-pal" class="tab-content">
                <div style="padding:20px; font-weight:bold">Стиль приложения</div>
                <div style="padding:15px; display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
                    <div style="height:50px; background:#5865f2; border-radius:12px; cursor:pointer;" onclick="setTheme('#5865f2')"></div>
                    <div style="height:50px; background:#eb459e; border-radius:12px; cursor:pointer;" onclick="setTheme('#eb459e')"></div>
                    <div style="height:50px; background:#2ecc71; border-radius:12px; cursor:pointer;" onclick="setTheme('#2ecc71')"></div>
                    <div style="height:50px; background:#f1c40f; border-radius:12px; cursor:pointer;" onclick="setTheme('#f1c40f')"></div>
                    <div style="height:50px; background:#e74c3c; border-radius:12px; cursor:pointer;" onclick="setTheme('#e74c3c')"></div>
                    <div style="height:50px; background:#9b59b6; border-radius:12px; cursor:pointer;" onclick="setTheme('#9b59b6')"></div>
                </div>
            </div>

            <div id="t-prof" class="tab-content">
                <div class="p-header" id="prof-header"></div>
                <div class="p-avatar" id="my-ava-box"></div>
                <div class="p-info">
                    <h3 id="m-name-txt">---</h3>
                    <div id="m-nick-txt" style="color:var(--accent); font-size:14px; margin-bottom:10px;">@---</div>
                    <p id="m-bio-txt" style="color:var(--sub); font-size:14px;">---</p>
                    <button class="btn" onclick="openEdit()" style="width:auto; padding:8px 25px; font-size:12px; margin-top:15px; background:rgba(255,255,255,0.05)">Редактировать</button>
                </div>
                
                <div style="padding:20px; border-top:1px solid #222; margin-top:25px; background: rgba(0,0,0,0.1)">
                    <small style="color:var(--sub); font-weight:bold;">НОВЫЙ ПОСТ</small>
                    <label class="file-label" id="l-post">🖼️ Выбрать картинку
                        <input type="file" id="f-post" accept="image/*" onchange="uploadToImgBB(this)">
                    </label>
                    <textarea id="p-txt" placeholder="Что нового?"></textarea>
                    <button class="btn" onclick="addPost()">ОПУБЛИКОВАТЬ</button>
                </div>
                <div id="my-posts"></div>
            </div>
        </aside>
    </div>
</div>

<script>
    // ТВОЙ КЛЮЧ УЖЕ ЗДЕСЬ
    const IMGBB_KEY = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";

    const firebaseConfig = {
        apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
        authDomain: "veronagram-aafc1.firebaseapp.com",
        databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
        projectId: "veronagram-aafc1",
        storageBucket: "veronagram-aafc1.appspot.com",
        messagingSenderId: "292300518581",
        appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let me = JSON.parse(localStorage.getItem('v-user-final')) || null;
    let tempUrl = "";

    if(me) loginOk(me);

    async function auth() {
        const nick = document.getElementById('a-nick').value.toLowerCase().trim();
        const pass = document.getElementById('a-pass').value.trim();
        const name = document.getElementById('a-name').value.trim();
        if(!nick || !pass) return alert("Введите ник и пароль!");
        
        const s = await db.ref('users/'+nick).once('value');
        if(s.val()) {
            if(s.val().pass === pass) loginOk(s.val()); else alert("Неверный пароль!");
        } else {
            if(!name) return alert("Введите имя для регистрации!");
            const u = { nick, pass, name, age:"?", ava:"", bio:"" };
            await db.ref('users/'+nick).set(u); loginOk(u);
        }
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v-user-final', JSON.stringify(me));
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('app-screen').classList.add('active');
        updateUI(); loadPosts();
    }

    async function uploadToImgBB(input) {
        const file = input.files[0];
        if(!file) return;
        const label = input.parentElement;
        const originalText = label.innerText;
        label.innerText = "⏳ Загрузка...";

        const formData = new FormData();
        formData.append("image", file);

        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: "POST",
                body: formData
            });
            const json = await res.json();
            if(json.success) {
                tempUrl = json.data.url;
                label.innerText = "✅ Готово!";
                label.style.borderColor = "var(--accent)";
                label.style.color = "#fff";
            }
        } catch(e) { 
            alert("Ошибка сети!"); 
            label.innerText = "❌ Ошибка"; 
        }
    }

    async function saveProfile() {
        const up = {
            name: document.getElementById('e-name').value || me.name,
            age: document.getElementById('e-age').value || me.age,
            bio: document.getElementById('e-bio').value || me.bio,
            ava: tempUrl || me.ava
        };
        Object.assign(me, up);
        await db.ref('users/'+me.nick).update(up);
        localStorage.setItem('v-user-final', JSON.stringify(me));
        updateUI(); closeEdit(); tempUrl = "";
        alert("Профиль обновлен!");
    }

    async function addPost() {
        const txt = document.getElementById('p-txt').value;
        if(!tempUrl && !txt) return;
        await db.ref('posts/'+me.nick).push({ url: tempUrl, txt, time: Date.now() });
        document.getElementById('p-txt').value = "";
        document.getElementById('l-post').innerText = "🖼️ Выбрать картинку";
        document.getElementById('l-post').style.borderColor = "var(--sub)";
        tempUrl = "";
        alert("Пост опубликован!");
    }

    function updateUI() {
        document.getElementById('m-name-txt').innerText = me.name;
        document.getElementById('m-nick-txt').innerText = "@" + me.nick;
        document.getElementById('m-bio-txt').innerText = me.bio || "Описание не заполнено";
        document.getElementById('my-ava-box').innerHTML = me.ava ? `<img src="${me.ava}">` : `<i class="fas fa-user" style="font-size:40px; color:#444"></i>`;
    }

    function loadPosts() {
        db.ref('posts/'+me.nick).on('value', s => {
            const list = document.getElementById('my-posts'); list.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                const p = data[id];
                const d = document.createElement('div'); d.className = 'post-card';
                d.innerHTML = `${p.url ? `<img src="${p.url}">` : ''}<div style="padding:15px; font-size:14px; line-height:1.5">${p.txt}</div>`;
                list.prepend(d);
            }
        });
    }

    function openEdit() {
        document.getElementById('e-name').value = me.name;
        document.getElementById('e-age').value = me.age === "?" ? "" : me.age;
        document.getElementById('e-bio').value = me.bio;
        document.getElementById('edit-modal').style.display = "flex";
    }
    function closeEdit() { document.getElementById('edit-modal').style.display = "none"; }
    
    function tab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
        document.getElementById('n-' + t).classList.add('active');
    }
    
    function setTheme(c) { 
        document.documentElement.style.setProperty('--accent', c);
        document.documentElement.style.setProperty('--grad', `linear-gradient(135deg, #1a2a3a, ${c})`);
    }
</script>
</body>
</html>
