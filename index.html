<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VERONA V18 PRO MAX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; --bg: #030508; --panel: #0a0d14; --text: #fff;
            --neon: 0 0 20px var(--accent);
            --gradient: linear-gradient(135deg, var(--accent), #7000ff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; transition: background 0.5s; }

        /* --- UI UTILS --- */
        .tab-content { display: none; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; animation: fadeIn 0.3s; }
        .tab-content.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: var(--gradient); border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .input { background: #000; border: 1px solid #222; padding: 12px; border-radius: 12px; color: #fff; width: 100%; outline: none; }

        /* --- NAVIGATION --- */
        .nav-bar { width: 80px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 30px; border-right: 1px solid #111; z-index: 5000; }
        .nav-bar i { font-size: 24px; color: #333; cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); text-shadow: var(--neon); transform: scale(1.2); }

        /* --- SIDEBAR --- */
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; position: relative; z-index: 100; }
        .stories-row { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #1a1a1a; }
        .story-circle { min-width: 65px; height: 65px; border-radius: 50%; background: var(--gradient); padding: 2px; cursor: pointer; position: relative; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        /* --- CHAT --- */
        .chat-main { flex: 1; display: none; flex-direction: column; background: #05070a; position: relative; z-index: 2000; }
        .chat-main.active { display: flex; }
        .chat-header { padding: 12px 20px; background: rgba(10,13,20,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--accent); }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; position: relative; cursor: pointer; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--gradient); color: #000; font-weight: 600; }
        .msg.other { align-self: flex-start; background: #1b2129; }
        .msg .heart { position: absolute; bottom: -8px; right: 5px; font-size: 12px; background: #000; padding: 2px 5px; border-radius: 10px; border: 1px solid var(--accent); }

        /* --- TG STORIES VIEWER --- */
        #story-overlay { position: fixed; inset: 0; background: #000; z-index: 100000; display: none; flex-direction: column; }
        .story-bars { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; gap: 4px; z-index: 10; }
        .s-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
        .s-fill { width: 0%; height: 100%; background: #fff; }
        .story-img-full { width: 100%; height: 100%; object-fit: contain; }

        /* --- VOICE RECORDING (TG STYLE) --- */
        .voice-overlay { display: none; align-items: center; background: var(--panel); position: absolute; bottom: 0; left: 0; right: 0; padding: 15px 25px; z-index: 100; border-top: 1px solid var(--accent); }
        .voice-timer { color: red; font-weight: bold; margin-right: 15px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- PROFILE GRID --- */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 5px; }
        .post-item { aspect-ratio: 1; background: #111; overflow: hidden; cursor: pointer; position: relative; }
        .post-item img, .post-item video { width: 100%; height: 100%; object-fit: cover; }

        /* --- MOBILE ADAPTIVE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav-bar { width: 100%; height: 70px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; border: none; border-top: 1px solid #111; }
            .sidebar { width: 100%; height: 100vh; }
            .chat-main { position: fixed; inset: 0; width: 100%; height: 100%; }
        }
    </style>
</head>
<body>

<div id="story-overlay">
    <div class="story-bars" id="story-bars"></div>
    <div style="position:absolute; top:30px; right:20px; z-index:20; font-size:24px;" onclick="closeStory()"><i class="fas fa-times"></i></div>
    <div id="story-target" style="height:100%; display:flex; align-items:center; justify-content:center;" onclick="tapStory(event)"></div>
</div>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:200000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--panel); padding:40px; border-radius:40px; border:1px solid var(--accent); width:90%; max-width:400px; text-align:center;">
        <h1 style="color:var(--accent); letter-spacing:10px;">VERONA</h1><br>
        <input type="text" id="a-nick" class="input" placeholder="НИКНЕЙМ"><br><br>
        <input type="password" id="a-pass" class="input" placeholder="ПАРОЛЬ"><br><br>
        <button class="btn" style="width:100%" onclick="auth()">ВХОД</button>
    </div>
</div>

<nav class="nav-bar">
    <i class="fas fa-comments active" onclick="tab('chats')" id="n-chats"></i>
    <i class="fas fa-search" onclick="tab('search')" id="n-search"></i>
    <i class="fas fa-plus-circle" style="color:var(--accent); font-size:30px;" onclick="document.getElementById('create-m').style.display='flex'"></i>
    <i class="fas fa-palette" onclick="tab('themes')" id="n-themes"></i>
    <i class="fas fa-user" onclick="tab('prof')" id="n-prof"></i>
</nav>

<aside class="sidebar">
    <div id="t-chats" class="tab-content active">
        <div class="stories-row" id="stories-row"></div>
        <div id="chat-list"></div>
    </div>

    <div id="t-search" class="tab-content" style="padding:20px;">
        <input type="text" class="input" placeholder="Найти пользователя..." oninput="search(this.value)">
        <div id="search-res" style="margin-top:20px;"></div>
    </div>

    <div id="t-themes" class="tab-content" style="padding:20px;">
        <h3>ТЕМЫ</h3><br>
        <div id="themes-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <div id="t-prof" class="tab-content">
        <div style="padding:30px; text-align:center;">
            <img id="m-ava" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent); object-fit:cover;">
            <h2 id="m-name" style="margin-top:10px;"></h2>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <label class="btn" style="flex:1">ПОСТ <input type="file" hidden onchange="upMedia(this,'post')"></label>
                <label class="btn" style="flex:1; background:#ff0055">ИСТОРИЯ <input type="file" hidden onchange="upMedia(this,'story')"></label>
            </div>
        </div>
        <div id="m-posts" class="posts-grid"></div>
    </div>
</aside>

<main class="chat-main" id="chat-window">
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="closeChat()"></i>
        <img id="c-ava" src="" style="width:40px; height:40px; border-radius:50%; border:1px solid var(--accent); cursor:pointer" onclick="openPeerProfile()">
        <b id="c-name" style="flex:1">Чат</b>
        <i class="fas fa-cog" onclick="openChatInfo()"></i>
    </div>
    <div class="msg-box" id="messages"></div>

    <div class="voice-overlay" id="voice-ui">
        <span class="voice-timer" id="v-timer">00:00</span>
        <span style="flex:1; opacity:0.5">Свайп влево для отмены</span>
        <i class="fas fa-microphone" style="color:var(--accent)"></i>
    </div>

    <div style="padding:15px; background:#0a0d14; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-microphone" id="mic" style="font-size:22px; color:var(--accent); cursor:pointer"></i>
        <input type="text" id="m-in" class="input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
        <i class="fas fa-paper-plane" onclick="sendMsg()" style="font-size:22px; color:var(--accent); cursor:pointer"></i>
    </div>
</main>

<div id="chat-info-m" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:90000; display:none; align-items:center; justify-content:center;">
    <div style="background:var(--panel); padding:30px; border-radius:30px; width:90%; max-width:350px;">
        <h3>НАСТРОЙКИ ЧАТА</h3><br>
        <img id="ci-ava" src="" style="width:80px; height:80px; border-radius:50%; display:block; margin:0 auto 15px;">
        <input type="text" id="ci-name" class="input" placeholder="Название"><br><br>
        <label class="btn" style="display:block; text-align:center">ИЗМЕНИТЬ ФОТО <input type="file" hidden onchange="upMedia(this,'chat_ava')"></label><br>
        <button class="btn" style="width:100%" onclick="saveChatInfo()">СОХРАНИТЬ</button>
        <button class="btn" style="width:100%; margin-top:10px; background:none; color:red;" onclick="this.parentElement.parentElement.style.display='none'">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="create-m" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:90000; display:none; align-items:center; justify-content:center;">
    <div style="background:var(--panel); padding:30px; border-radius:30px; width:90%; max-width:350px;">
        <h3>СОЗДАТЬ</h3><br>
        <input type="text" id="cr-name" class="input" placeholder="Название"><br><br>
        <select id="cr-type" class="input"><option value="group">Группа</option><option value="channel">Канал</option></select><br><br>
        <button class="btn" style="width:100%" onclick="createRoom()">ГОТОВО</button>
    </div>
</div>

<script>
    const IMGBB = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";
    const firebaseConfig = { databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('v18-user')), currentChat, chatPeer, chatType;
    let rec, chunks = [], vInt, vSec = 0;
    let sList = [], sIdx = 0, sTimer;

    if(me) loginOk(me);

    async function auth() {
        const n = document.getElementById('a-nick').value.toLowerCase().trim();
        const p = document.getElementById('a-pass').value.trim();
        if(!n || !p) return;
        const s = await db.ref('users/'+n).once('value');
        const u = s.exists() ? s.val() : { nick:n, pass:p, name:n, ava:"", posts:[], stories:[] };
        if(s.exists() && u.pass !== p) return alert("Пароль неверный");
        if(!s.exists()) await db.ref('users/'+n).set(u);
        loginOk(u);
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v18-user', JSON.stringify(me));
        document.getElementById('auth-screen').style.display = 'none';
        db.ref('users/'+me.nick).on('value', s => { 
            me = s.val(); 
            document.getElementById('m-name').innerText = me.name;
            document.getElementById('m-ava').src = me.ava || 'https://via.placeholder.com/100';
            renderPosts('m-posts', me.posts, true);
        });
        loadChats(); loadStoriesRow(); initThemes();
    }

    /* --- STORIES TG --- */
    function loadStoriesRow() {
        db.ref('users').on('value', s => {
            const row = document.getElementById('stories-row'); row.innerHTML = "";
            s.forEach(u => {
                const d = u.val();
                if(d.stories && d.stories.length > 0) {
                    row.innerHTML += `<div class="story-circle" onclick="openStories('${u.key}')"><img src="${d.stories[d.stories.length-1].url}"></div>`;
                }
            });
        });
    }

    async function openStories(nick) {
        const s = await db.ref('users/'+nick+'/stories').once('value');
        sList = s.val() || []; sIdx = 0;
        document.getElementById('story-overlay').style.display = 'flex';
        showS();
    }

    function showS() {
        clearTimeout(sTimer);
        const target = document.getElementById('story-target');
        const bars = document.getElementById('story-bars');
        bars.innerHTML = sList.map((_,i) => `<div class="s-bar"><div class="s-fill" id="f-${i}"></div></div>`).join('');
        
        const cur = sList[sIdx];
        target.innerHTML = `<img src="${cur.url}" class="story-img-full">`;
        
        for(let i=0; i<sIdx; i++) document.getElementById('f-'+i).style.width = '100%';
        const fill = document.getElementById('f-'+sIdx);
        setTimeout(() => { fill.style.transition = '5s linear'; fill.style.width = '100%'; }, 50);
        
        sTimer = setTimeout(() => { if(sIdx < sList.length-1){ sIdx++; showS(); } else closeStory(); }, 5000);
    }

    function tapStory(e) { if(e.clientX > window.innerWidth/2) { if(sIdx < sList.length-1){ sIdx++; showS(); } else closeStory(); } else { if(sIdx > 0){ sIdx--; showS(); } } }
    function closeStory() { clearTimeout(sTimer); document.getElementById('story-overlay').style.display='none'; }

    /* --- CHAT CORE --- */
    function openChat(id, name, ava, type) {
        currentChat = type === 'private' ? [me.nick, id].sort().join("_") : id;
        chatPeer = id; chatType = type;
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-ava').src = ava || 'https://via.placeholder.com/40';
        document.getElementById('chat-window').classList.add('active');

        db.ref('messages/'+currentChat).on('value', s => {
            const box = document.getElementById('messages'); box.innerHTML = "";
            s.forEach(m => {
                const d = document.createElement('div');
                const v = m.val();
                d.className = `msg ${v.s === me.nick ? 'me' : 'other'}`;
                if(v.type === 'voice') d.innerHTML = `<audio src="${v.t}" controls style="width:180px;height:35px;"></audio>`;
                else d.innerText = v.t;
                if(v.like) d.innerHTML += `<span class="heart">❤️</span>`;
                
                d.ondblclick = () => db.ref(`messages/${currentChat}/${m.key}`).update({like: !v.like});
                d.oncontextmenu = (e) => { e.preventDefault(); if(v.s === me.nick && confirm("Удалить?")) db.ref(`messages/${currentChat}/${m.key}`).remove(); };
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const t = document.getElementById('m-in').value.trim(); if(!t) return;
        db.ref('messages/'+currentChat).push({s:me.nick, t, time:Date.now()});
        document.getElementById('m-in').value = "";
    }

    /* --- VOICE TG STYLE --- */
    const mic = document.getElementById('mic');
    let startX;
    mic.onmousedown = vStart;
    mic.onmouseup = vEnd;
    mic.ontouchstart = (e) => { startX = e.touches[0].clientX; vStart(); };
    mic.ontouchend = vEnd;
    mic.ontouchmove = (e) => { if(startX - e.touches[0].clientX > 50) { chunks = []; vEnd(); } };

    async function vStart() {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        rec = new MediaRecorder(s); chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            if(chunks.length === 0) return;
            const b = new Blob(chunks, {type:'audio/webm'});
            const r = new FileReader(); r.readAsDataURL(b);
            r.onloadend = () => db.ref('messages/'+currentChat).push({s:me.nick, t:r.result, type:'voice', time:Date.now()});
        };
        rec.start();
        document.getElementById('voice-ui').style.display = 'flex';
        vSec = 0; vInt = setInterval(() => { vSec++; document.getElementById('v-timer').innerText = new Date(vSec*1000).toISOString().substr(14,5); }, 1000);
    }
    function vEnd() { clearInterval(vInt); if(rec) rec.stop(); document.getElementById('voice-ui').style.display = 'none'; }

    /* --- PROFILE & MEDIA --- */
    async function upMedia(input, type) {
        const f = input.files[0]; if(!f) return;
        const fd = new FormData(); fd.append("image", f);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB}`, {method:"POST", body:fd});
        const d = await r.json();
        if(d.success) {
            const url = d.data.url;
            if(type === 'post') {
                const p = me.posts || []; p.push({url, id: Date.now()});
                db.ref('users/'+me.nick).update({posts: p});
            } else if(type === 'story') {
                const s = me.stories || []; s.push({url, id: Date.now()});
                db.ref('users/'+me.nick).update({stories: s});
            } else if(type === 'chat_ava') {
                db.ref('groups/'+chatPeer).update({ava: url});
                db.ref(`friends/${me.nick}/${chatPeer}`).update({ava: url});
                document.getElementById('ci-ava').src = url;
            }
        }
    }

    function renderPosts(id, data, mine) {
        const g = document.getElementById(id); g.innerHTML = "";
        if(data) data.slice().reverse().forEach(x => {
            const div = document.createElement('div'); div.className = 'post-item';
            div.innerHTML = `<img src="${x.url}">`;
            div.onclick = () => { if(mine && confirm("Удалить публикацию?")) db.ref('users/'+me.nick).update({posts: me.posts.filter(p => p.id !== x.id)}); };
            g.appendChild(div);
        });
    }

    /* --- HELPERS --- */
    function search(q) {
        if(!q) return document.getElementById('search-res').innerHTML = "";
        db.ref('users').once('value', s => {
            let h = "";
            s.forEach(u => { if(u.key.includes(q.toLowerCase())) h += `<div style="padding:15px; display:flex; align-items:center; gap:10px; cursor:pointer" onclick="addFriend('${u.key}','${u.val().name}','${u.val().ava}')"><img src="${u.val().ava || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%"> <b>${u.val().name}</b></div>`; });
            document.getElementById('search-res').innerHTML = h;
        });
    }

    async function addFriend(nick, name, ava) { await db.ref(`friends/${me.nick}/${nick}`).set({name, ava, type:'private'}); tab('chats'); }

    function loadChats() {
        db.ref('friends/'+me.nick).on('value', s => {
            const l = document.getElementById('chat-list'); l.innerHTML = "";
            s.forEach(f => { const d = f.val(); l.innerHTML += `<div style="padding:15px; display:flex; align-items:center; gap:12px; cursor:pointer" onclick="openChat('${f.key}','${d.name}','${d.ava}','${d.type}')"><img src="${d.ava || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:50%; border:1px solid var(--accent)"> <b>${d.name}</b></div>`; });
        });
    }

    async function createRoom() {
        const n = document.getElementById('cr-name').value; if(!n) return;
        const id = 'grp_'+Date.now(); const t = document.getElementById('cr-type').value;
        await db.ref('groups/'+id).set({name:n, type:t, ava:"", id});
        await db.ref(`friends/${me.nick}/${id}`).set({name:n, ava:"", type:t});
        document.getElementById('create-m').style.display = 'none';
    }

    function initThemes() {
        const th = [{n:'Neon', a:'#00f2fe', b:'#030508'}, {n:'Gold', a:'#ffd700', b:'#0a0a00'}, {n:'Ruby', a:'#ff0055', b:'#0a0004'}, {n:'Toxic', a:'#adff2f', b:'#050a00'}, {n:'Sky', a:'#00d2ff', b:'#00050a'}, {n:'Wine', a:'#722f37', b:'#0a0002'}, {n:'Mint', a:'#00ffaa', b:'#000a05'}, {n:'Lava', a:'#ff4500', b:'#0a0200'}, {n:'Cyber', a:'#ff00ff', b:'#000'}, {n:'White', a:'#fff', b:'#111'}];
        const box = document.getElementById('themes-list');
        th.forEach(t => {
            const d = document.createElement('div'); d.style.background = t.b; d.style.color = t.a; d.style.border = `1px solid ${t.a}`; d.style.padding = '10px'; d.style.borderRadius = '10px'; d.style.textAlign = 'center'; d.innerText = t.n; d.onclick = () => { document.documentElement.style.setProperty('--accent', t.a); document.documentElement.style.setProperty('--bg', t.b); };
            box.appendChild(d);
        });
    }

    function tab(t) { document.querySelectorAll('.tab-content, .nav-bar i').forEach(x => x.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); document.getElementById('n-'+t).classList.add('active'); }
    function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
    function openChatInfo() { if(chatType !== 'private') document.getElementById('chat-info-m').style.display='flex'; }
    async function saveChatInfo() { const n = document.getElementById('ci-name').value; await db.ref('groups/'+chatPeer).update({name: n}); await db.ref(`friends/${me.nick}/${chatPeer}`).update({name: n}); document.getElementById('chat-info-m').style.display='none'; }
</script>
</body>
</html>
