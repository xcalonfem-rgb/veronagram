<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #5865f2; --bg: #0e1621; --panel: #17212b; --text: #fff; --sub: #708499; --danger: #ed4245;
            --gradient: linear-gradient(135deg, #2b5278, var(--accent));
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* ИНТЕРФЕЙС */
        .app-shell { display: flex; width: 100%; height: 100%; position: relative; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; z-index: 10; }
        .nav-bar i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); transform: scale(1.2); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; z-index: 5; }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }
        
        /* ЧАТ (ГЛАВНОЕ ОКНО) */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); transition: 0.3s; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }

        /* БЛОК НАСТРОЕК ЦВЕТА */
        .theme-box { background: var(--bg); margin: 15px; padding: 15px; border-radius: 15px; border: 1px solid var(--accent); }
        .color-row { display: flex; justify-content: space-between; margin-top: 10px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        /* КНОПКИ И ПОИСК */
        .btn { padding: 12px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .user-card { background: var(--bg); padding: 15px; margin: 10px 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }

        /* АДАПТИВНОСТЬ ДЛЯ ТЕЛЕФОНА */
        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; padding: 0; }
            .sidebar { width: 100%; height: calc(100vh - 60px); }
            .chat-main { position: fixed; top: 0; left: 100%; width: 100%; height: calc(100vh - 60px); z-index: 100; }
            .chat-main.mobile-open { left: 0; }
            .back-btn { display: block !important; }
        }

        .back-btn { display: none; cursor: pointer; font-size: 20px; margin-right: 15px; }
        .tab-header { padding: 20px; font-size: 18px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="margin: auto; width: 90%; max-width: 400px; background: var(--panel); padding: 30px; border-radius: 25px; text-align: center;">
            <i class="fas fa-crow" style="font-size: 50px; color: var(--accent);"></i>
            <h2 style="margin: 15px 0;">VERONAGRAM</h2>
            <input type="text" id="a-nick" placeholder="Никнейм" style="width:100%; padding:12px; margin: 8px 0; border-radius:10px; border:none; background:var(--bg); color:#fff;">
            <input type="password" id="a-pass" placeholder="Пароль" style="width:100%; padding:12px; margin: 8px 0; border-radius:10px; border:none; background:var(--bg); color:#fff;">
            <div id="reg-only">
                <input type="text" id="a-name" placeholder="Ваше Имя" style="width:100%; padding:12px; margin: 8px 0; border-radius:10px; border:none; background:var(--bg); color:#fff;">
            </div>
            <button class="btn" onclick="auth()" style="width: 100%; margin-top: 15px;">ВОЙТИ / СОЗДАТЬ</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-shell">
            <nav class="nav-bar">
                <i class="fas fa-comment" id="nav-chats" onclick="switchTab('chats')"></i>
                <i class="fas fa-user-friends" id="nav-friends" onclick="switchTab('friends')"></i>
                <i class="fas fa-search" id="nav-search" onclick="switchTab('search')"></i>
                <i class="fas fa-user-circle active" id="nav-profile" onclick="switchTab('profile')"></i>
            </nav>

            <aside class="sidebar">
                <div id="tab-profile" class="tab-content active">
                    <div class="tab-header">Мой Профиль</div>
                    <div style="text-align:center; padding: 20px;">
                        <div style="width:80px; height:80px; background:var(--accent); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:30px;"><i class="fas fa-crow"></i></div>
                        <h2 id="my-name-disp">---</h2>
                        <p id="my-nick-disp" style="opacity:0.5;">@---</p>
                    </div>
                    
                    <div class="theme-box">
                        <small style="color:var(--accent); font-weight:bold;">ЦВЕТОВАЯ ГАММА</small>
                        <div class="color-row">
                            <div class="color-dot" style="background:#5865f2" onclick="changeColor('#5865f2')"></div>
                            <div class="color-dot" style="background:#eb459e" onclick="changeColor('#eb459e')"></div>
                            <div class="color-dot" style="background:#2ecc71" onclick="changeColor('#2ecc71')"></div>
                            <div class="color-dot" style="background:#f1c40f" onclick="changeColor('#f1c40f')"></div>
                            <div class="color-dot" style="background:#e74c3c" onclick="changeColor('#e74c3c')"></div>
                        </div>
                    </div>
                    <button class="btn" onclick="logout()" style="margin: 0 15px; background:var(--danger);">Выйти</button>
                </div>

                <div id="tab-friends" class="tab-content">
                    <div class="tab-header">Мои Друзья</div>
                    <div id="friends-list"></div>
                </div>

                <div id="tab-search" class="tab-content">
                    <div class="tab-header">Поиск</div>
                    <div style="padding:15px;">
                        <input type="text" id="s-input" placeholder="Введите ник..." oninput="doSearch()" style="width:100%; padding:12px; background:var(--bg); border:none; border-radius:10px; color:#fff;">
                        <div id="s-results"></div>
                    </div>
                </div>
            </aside>

            <main class="chat-main" id="chat-window">
                <div class="tab-header">
                    <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
                    <span id="chat-with">Выберите чат</span>
                </div>
                <div class="messages" id="chat-box"></div>
                <div id="chat-input-area" style="padding:15px; background:var(--panel); display:none; gap:10px;">
                    <input type="text" id="msg-input" placeholder="Сообщение..." style="flex:1; background:var(--bg); border:none; padding:12px; border-radius:10px; color:#fff; outline:none;" onkeypress="if(event.key==='Enter') send()">
                    <button class="btn" onclick="send()" style="margin:0; width:50px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
            authDomain: "veronagram-aafc1.firebaseapp.com",
            databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
            projectId: "veronagram-aafc1",
            storageBucket: "veronagram-aafc1.firebasestorage.app",
            messagingSenderId: "292300518581",
            appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let me = JSON.parse(localStorage.getItem('v-user')) || null;
        let activeChat = null;

        if(me) { loginOk(me); changeColor(localStorage.getItem('v-color') || '#5865f2'); }

        async function auth() {
            const nick = document.getElementById('a-nick').value.toLowerCase().trim();
            const pass = document.getElementById('a-pass').value.trim();
            const name = document.getElementById('a-name').value;
            if(!nick || !pass) return alert("Заполни поля!");

            const snap = await db.ref('users/' + nick).once('value');
            const data = snap.val();

            if(data) {
                if(data.pass === pass) loginOk(data);
                else alert("Неверный пароль!");
            } else {
                if(!name) return alert("Введите имя для регистрации!");
                const newUser = { nick, pass, name };
                await db.ref('users/' + nick).set(newUser);
                loginOk(newUser);
            }
        }

        function loginOk(userData) {
            me = userData;
            localStorage.setItem('v-user', JSON.stringify(me));
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
            document.getElementById('my-name-disp').innerText = me.name;
            document.getElementById('my-nick-disp').innerText = '@' + me.nick;
            loadFriends();
        }

        function changeColor(hex) {
            document.documentElement.style.setProperty('--accent', hex);
            localStorage.setItem('v-color', hex);
        }

        function doSearch() {
            const q = document.getElementById('s-input').value.toLowerCase();
            const res = document.getElementById('s-results'); res.innerHTML = "";
            if(q.length < 2) return;

            db.ref('users').once('value', (s) => {
                const users = s.val();
                for(let n in users) {
                    if(n.includes(q) && n !== me.nick) {
                        const u = users[n];
                        const div = document.createElement('div');
                        div.className = "user-card";
                        div.innerHTML = `<b>${u.name} (@${u.nick})</b>
                            <button class="btn" onclick="addFriend('${u.nick}', '${u.name}')">Добавить в друзья</button>
                            <button class="btn" style="background:#333" onclick="openChat('${u.nick}', '${u.name}')">Написать</button>`;
                        res.appendChild(div);
                    }
                }
            });
        }

        function addFriend(fNick, fName) {
            db.ref('friends/' + me.nick + '/' + fNick).set({ name: fName });
            alert("Друг добавлен!");
            loadFriends();
        }

        function loadFriends() {
            db.ref('friends/' + me.nick).on('value', (s) => {
                const list = document.getElementById('friends-list'); list.innerHTML = "";
                const data = s.val();
                for(let nick in data) {
                    const div = document.createElement('div');
                    div.className = "user-card";
                    div.innerHTML = `<b>${data[nick].name}</b><button class="btn" onclick="openChat('${nick}', '${data[nick].name}')">Написать</button>`;
                    list.appendChild(div);
                }
            });
        }

        function openChat(nick, name) {
            activeChat = [me.nick, nick].sort().join("_");
            document.getElementById('chat-with').innerText = name;
            document.getElementById('chat-input-area').style.display = "flex";
            
            // Магия для телефона:
            document.getElementById('chat-window').classList.add('mobile-open');

            db.ref('chats/' + activeChat).off();
            db.ref('chats/' + activeChat).on('value', (s) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                const msgs = s.val();
                for(let id in msgs) {
                    const m = msgs[id];
                    const d = document.createElement('div');
                    d.className = m.s === me.nick ? "msg me" : "msg other";
                    d.innerHTML = m.t;
                    box.appendChild(d);
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        function send() {
            const t = document.getElementById('msg-input').value.trim();
            if(!t || !activeChat) return;
            db.ref('chats/' + activeChat).push({ s: me.nick, t: t });
            document.getElementById('msg-input').value = "";
        }

        function closeChat() { document.getElementById('chat-window').classList.remove('mobile-open'); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
