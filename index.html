<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #5865f2; --bg: #0e1621; --panel: #17212b;
            --text: #fff; --sub: #708499; --msg-in: #182533; --msg-out: #2b5278; --danger: #ed4245;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* РЕГИСТРАЦИЯ */
        #login-screen { justify-content: center; align-items: center; background: #0e1621; }
        .auth-card { width: 90%; max-width: 380px; background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; }
        .auth-card input, .auth-card textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: var(--bg); color: #fff; outline: none; }
        .avatar-select { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; overflow: hidden; }
        .avatar-select img { width: 100%; height: 100%; object-fit: cover; }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        .app-container { display: flex; width: 100%; height: 100%; }
        
        /* ВКЛАДКИ (НИЖНЕЕ МЕНЮ ДЛЯ МОБИЛОК) */
        .nav-tabs { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; border-right: 1px solid rgba(0,0,0,0.3); }
        .nav-tabs i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.3s; }
        .nav-tabs i.active { color: var(--accent); }

        /* САЙДБАР */
        .sidebar { width: 350px; background: var(--panel); display: flex; flex-direction: column; }
        .tab-content { display: none; flex-direction: column; height: 100%; }
        .tab-content.active { display: flex; }

        /* ПОИСК И КНОПКИ */
        .search-area { padding: 20px; }
        .user-card { background: var(--bg); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; display: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; color: #fff; }
        .btn-add { background: var(--accent); }
        .btn-block { background: var(--danger); }
        .btn-msg { background: #3ba55c; grid-column: span 2; }

        /* ЧАТ */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 15px; }
        .sent { background: var(--msg-out); align-self: flex-end; }
        .received { background: var(--msg-in); align-self: flex-start; }

        .input-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; background: var(--bg); border: none; padding: 12px; border-radius: 20px; color: #fff; outline: none; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .chat-area { display: none; position: fixed; inset: 0; z-index: 100; }
            .chat-area.active { display: flex; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-card">
            <div class="avatar-select" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-camera" id="cam-icon"></i>
                <img id="preview" src="" style="display:none">
            </div>
            <input type="file" id="file-input" hidden onchange="previewImg(this)">
            <h2>Создать профиль</h2>
            <input type="text" id="reg-name" placeholder="Ваше имя (Никнейм)">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <textarea id="reg-bio" placeholder="О себе..."></textarea>
            <button class="btn btn-add" style="width:100%; padding:15px;" onclick="register()">Зарегистрироваться</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-container">
            <div class="nav-tabs">
                <i class="fas fa-comment active" onclick="switchTab('chats', this)"></i>
                <i class="fas fa-search" onclick="switchTab('search', this)"></i>
                <i class="fas fa-user" onclick="switchTab('profile', this)"></i>
            </div>

            <aside class="sidebar">
                <div id="tab-chats" class="tab-content active">
                    <div style="padding:20px;"><h3>Чаты</h3></div>
                    <div id="active-chats-list">
                        <div style="padding:20px; color:var(--sub)">Нет активных чатов. Найдите друзей в поиске!</div>
                    </div>
                </div>

                <div id="tab-search" class="tab-content">
                    <div class="search-area">
                        <h3>Поиск друзей</h3>
                        <input type="text" id="s-input" placeholder="Введите @id (например @admin)..." 
                               style="width:100%; padding:12px; background:var(--bg); border:none; border-radius:8px; color:#fff; margin-top:10px;"
                               oninput="liveSearch()">
                        
                        <div id="search-result" class="user-card">
                            <div class="avatar" style="margin: 0 auto 10px;"><i class="fas fa-user-shield"></i></div>
                            <b id="res-name">Admin</b>
                            <p id="res-id" style="color:var(--sub); font-size:12px;">@admin</p>
                            <div class="btn-group">
                                <button class="btn btn-add" onclick="action('Добавлен!')">Добавить</button>
                                <button class="btn btn-block" onclick="action('Заблокирован!')">Блок</button>
                                <button class="btn btn-msg" onclick="startChat('Admin')">Написать</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-profile" class="tab-content">
                    <div style="padding:30px; text-align:center;">
                        <div class="avatar-select" id="prof-avatar"></div>
                        <h2 id="prof-name">Имя</h2>
                        <p id="prof-bio" style="color:var(--sub); margin-top:10px;"></p>
                        <button class="btn btn-block" style="margin-top:20px; width:100%" onclick="location.reload()">Выйти</button>
                    </div>
                </div>
            </aside>

            <main class="chat-area" id="main-chat">
                <div class="input-bar" style="background:var(--panel)">
                    <i class="fas fa-arrow-left" onclick="toggleChat(false)" style="cursor:pointer"></i>
                    <b id="chat-with">Чат не выбран</b>
                </div>
                <div class="messages" id="msg-box"></div>
                <div class="input-bar">
                    <input type="text" id="m-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
                    <i class="fas fa-arrow-right" style="color:var(--accent); cursor:pointer" onclick="send()"></i>
                </div>
            </main>
        </div>
    </div>

    <script>
        let myData = {};

        function previewImg(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('cam-icon').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function register() {
            myData.name = document.getElementById('reg-name').value;
            myData.pass = document.getElementById('reg-pass').value;
            myData.bio = document.getElementById('reg-bio').value;
            myData.img = document.getElementById('preview').src;

            if(!myData.name || !myData.pass) return alert("Введите имя и пароль!");

            document.getElementById('prof-name').innerText = myData.name;
            document.getElementById('prof-bio').innerText = myData.bio;
            if(myData.img) document.getElementById('prof-avatar').innerHTML = `<img src="${myData.img}" style="width:100%;height:100%;object-fit:cover">`;

            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tabs i').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            el.classList.add('active');
        }

        function liveSearch() {
            const val = document.getElementById('s-input').value.toLowerCase();
            const res = document.getElementById('search-result');
            res.style.display = (val === '@admin' || val === 'admin') ? 'block' : 'none';
        }

        function action(text) { alert(text); }

        function startChat(name) {
            document.getElementById('chat-with').innerText = name;
            const list = document.getElementById('active-chats-list');
            list.innerHTML = `<div style="padding:15px; background:var(--accent); cursor:pointer" onclick="toggleChat(true)">
                <b>${name}</b><br><small>Нажмите, чтобы открыть чат</small>
            </div>`;
            toggleChat(true);
        }

        function toggleChat(show) {
            if(window.innerWidth <= 768) {
                document.getElementById('main-chat').classList.toggle('active', show);
            }
        }

        function send() {
            const inp = document.getElementById('m-input');
            if(!inp.value) return;
            document.getElementById('msg-box').innerHTML += `<div class="bubble sent">${inp.value}</div>`;
            inp.value = "";
            document.getElementById('msg-box').scrollTop = 9999;
        }
    </script>
</body>
</html>
