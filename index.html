<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONA NEON ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; --bg: #05070a; --panel: #0d1117; --text: #fff; 
            --neon: 0 0 15px var(--accent);
            --gradient: linear-gradient(45deg, var(--accent), #7000ff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* ЭКРАН ВХОДА (КАК НА СКРИНЕ) */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-card { background: #0a0e14; padding: 40px; border-radius: 30px; border: 2px solid var(--accent); box-shadow: var(--neon); width: 90%; max-width: 400px; text-align: center; }
        .auth-card i.fa-crown { font-size: 50px; color: var(--accent); text-shadow: var(--neon); margin-bottom: 20px; }
        .auth-card h1 { letter-spacing: 10px; margin-bottom: 30px; font-weight: 300; }
        .auth-input { background: #000; border: 1px solid #1a2634; padding: 15px; border-radius: 12px; color: #fff; width: 100%; margin-bottom: 15px; outline: none; }
        .auth-input:focus { border-color: var(--accent); box-shadow: var(--neon); }
        .auth-btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; box-shadow: var(--neon); text-transform: uppercase; }

        /* УВЕДОМЛЕНИЯ */
        #push { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--accent); box-shadow: var(--neon); padding: 12px 20px; border-radius: 20px; z-index: 2000; transition: 0.5s; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .nav-bar { width: 75px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; border-right: 1px solid rgba(0,242,254,0.2); }
        .nav-bar i { font-size: 22px; color: #333; cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); text-shadow: var(--neon); transform: scale(1.2); }

        .sidebar { width: 380px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .user-item { display: flex; align-items: center; padding: 15px; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .user-item img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: var(--neon); object-fit: cover; }

        .chat-main { flex: 1; display: none; flex-direction: column; }
        .chat-main.active { display: flex; }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 15px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .msg.me { align-self: flex-end; background: var(--gradient); color: #000; font-weight: 500; box-shadow: var(--neon); }
        .msg.other { align-self: flex-start; background: #1c2128; border-color: var(--accent); }

        .emoji-box { display: none; grid-template-columns: repeat(8, 1fr); gap: 8px; padding: 15px; background: #000; border-top: 1px solid var(--accent); max-height: 200px; overflow-y: auto; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .post-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; border: 1px solid var(--accent); }

        .input-area { background: #0d1117; padding: 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--accent); }
        .input-area input { background: #000; border: 1px solid #333; padding: 12px; border-radius: 20px; color: #fff; flex: 1; outline: none; }

        .rec-active { color: #ff0055 !important; text-shadow: 0 0 15px #ff0055; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 65px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; z-index: 1000; }
            .sidebar { width: 100%; }
            .chat-main { position: fixed; inset: 0; z-index: 2000; }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <i class="fas fa-crown"></i>
        <h1>VERONA</h1>
        <input type="text" id="auth-nick" class="auth-input" placeholder="НИКНЕЙМ">
        <input type="password" id="auth-pass" class="auth-input" placeholder="ПАРОЛЬ">
        <input type="text" id="auth-name" class="auth-input" placeholder="ИМЯ (ДЛЯ НОВЫХ)">
        <button class="auth-btn" onclick="handleAuth()">ВОЙТИ В ЭЛИТУ</button>
    </div>
</div>

<div id="push" onclick="this.style.top = '-100px'">
    <img id="push-ava" src="" style="width:40px;height:40px;border-radius:50%">
    <div id="push-msg" style="font-size:13px"></div>
</div>

<nav class="nav-bar">
    <i class="fas fa-comment-dots active" onclick="tab('chats')" id="n-chats"></i>
    <i class="fas fa-search" onclick="tab('search')" id="n-search"></i>
    <i class="fas fa-user-astronaut" onclick="tab('prof')" id="n-prof"></i>
</nav>

<aside class="sidebar">
    <div id="t-chats" class="tab-content active">
        <h2 style="padding:20px; color:var(--accent); text-shadow:var(--neon); letter-spacing:5px">ЧАТЫ</h2>
        <div id="chat-list"></div>
    </div>
    <div id="t-search" class="tab-content">
        <div style="padding:20px"><input type="text" id="s-in" placeholder="Поиск неоновых душ..." oninput="findUsers()" style="width:100%; background:#000; border:1px solid var(--accent); padding:10px; color:#fff; border-radius:10px"></div>
        <div id="s-res"></div>
    </div>
    <div id="t-prof" class="tab-content">
        <div style="padding:30px; text-align:center">
            <div style="width:110px;height:110px;border-radius:50%;margin:0 auto 15px;border:3px solid var(--accent);box-shadow:var(--neon);overflow:hidden">
                <img id="m-ava" src="https://via.placeholder.com/150" style="width:100%;height:100%;object-fit:cover">
            </div>
            <h2 id="m-name" style="color:var(--accent); margin-bottom:10px"></h2>
            <div style="display:flex; gap:10px; margin-bottom:20px">
                <label style="flex:1; background:var(--gradient); padding:10px; border-radius:10px; cursor:pointer; font-size:12px; color:#000; font-weight:bold">
                    + ФОТО <input type="file" hidden onchange="uploadToProfile(this)">
                </label>
                <label style="flex:1; background:#222; padding:10px; border-radius:10px; cursor:pointer; font-size:12px; color:#fff">
                    АВАТАР <input type="file" hidden onchange="uploadAvatar(this)">
                </label>
            </div>
            <div class="post-grid" id="my-posts"></div>
        </div>
    </div>
</aside>

<main class="chat-main" id="chat-window">
    <div style="padding:15px; background:var(--panel); border-bottom:1px solid var(--accent); display:flex; align-items:center; gap:15px">
        <i class="fas fa-arrow-left" onclick="closeChat()" style="color:var(--accent)"></i>
        <img id="c-ava" src="" style="width:45px;height:45px;border-radius:50%;border:1px solid var(--accent)">
        <b id="c-name">Чат</b>
    </div>
    <div class="msg-box" id="messages"></div>
    <div id="emoji-box" class="emoji-box"></div>
    <div class="input-area">
        <i class="far fa-smile" onclick="toggleEmoji()" style="color:var(--accent); font-size:22px; cursor:pointer"></i>
        <i class="fas fa-microphone" id="rec-btn" onclick="toggleVoice()" style="color:var(--accent); font-size:22px; cursor:pointer"></i>
        <input type="text" id="msg-in" placeholder="Написать..." onkeypress="if(event.key==='Enter') sendMsg()">
        <i class="fas fa-paper-plane" onclick="sendMsg()" style="color:var(--accent); font-size:22px; cursor:pointer"></i>
    </div>
</main>

<script>
    const IMGBB_KEY = "a4feb69baa5d7a0b6e9d3f4f80ce72bd"; 
    const firebaseConfig = {
        apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
        databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
        projectId: "veronagram-aafc1",
        storageBucket: "veronagram-aafc1.appspot.com",
        appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = JSON.parse(localStorage.getItem('v-user-neon')) || null;
    let currentChat = null, chatFriend = null, mediaRecorder, chunks = [];

    if(me) { document.getElementById('auth-screen').style.display = 'none'; loginOk(me); }

    async function handleAuth() {
        const nick = document.getElementById('auth-nick').value.toLowerCase().trim();
        const pass = document.getElementById('auth-pass').value.trim();
        const name = document.getElementById('auth-name').value.trim() || nick;
        if(!nick || !pass) return alert("Заполни поля!");

        const s = await db.ref('users/'+nick).once('value');
        if(s.exists()) {
            if(s.val().pass === pass) { loginOk(s.val()); }
            else { alert("Неверный пароль!"); }
        } else {
            const newUser = { nick, pass, name, ava: "", bio: "New Elite Member", posts: [] };
            await db.ref('users/'+nick).set(newUser);
            loginOk(newUser);
        }
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v-user-neon', JSON.stringify(me));
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('m-name').innerText = me.name;
        document.getElementById('m-ava').src = me.ava || 'https://via.placeholder.com/150';
        loadChats(); loadEmojis(); listenPush(); loadMyPosts();
    }

    async function uploadAvatar(input) {
        const file = input.files[0]; if(!file) return;
        const form = new FormData(); form.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:form});
        const data = await res.json();
        if(data.success) {
            me.ava = data.data.url;
            await db.ref('users/'+me.nick).update({ava: me.ava});
            document.getElementById('m-ava').src = me.ava;
        }
    }

    async function uploadToProfile(input) {
        const file = input.files[0]; if(!file) return;
        const form = new FormData(); form.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:form});
        const data = await res.json();
        if(data.success) {
            const newPosts = me.posts || [];
            newPosts.push(data.data.url);
            await db.ref('users/'+me.nick).update({posts: newPosts});
            me.posts = newPosts; loadMyPosts();
        }
    }

    function loadMyPosts() {
        const grid = document.getElementById('my-posts'); grid.innerHTML = "";
        if(me.posts) me.posts.forEach(p => grid.innerHTML += `<img src="${p}">`);
    }

    function findUsers() {
        const q = document.getElementById('s-in').value.toLowerCase();
        const res = document.getElementById('s-res'); res.innerHTML = "";
        if(!q) return;
        db.ref('users').once('value', s => {
            s.forEach(u => {
                const user = u.val();
                if(user.nick.includes(q) && user.nick !== me.nick) {
                    res.innerHTML += `<div class="user-item" onclick="startChat('${user.nick}','${user.name}','${user.ava}')">
                        <img src="${user.ava || 'https://via.placeholder.com/50'}"><b>${user.name}</b></div>`;
                }
            });
        });
    }

    async function startChat(nick, name, ava) {
        await db.ref('friends/'+me.nick+'/'+nick).set({name, ava});
        openChat(nick, name, ava);
    }

    function loadChats() {
        db.ref('friends/'+me.nick).on('value', s => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            s.forEach(f => {
                const fr = f.val();
                list.innerHTML += `<div class="user-item" onclick="openChat('${f.key}','${fr.name}','${fr.ava}')">
                    <img src="${fr.ava || 'https://via.placeholder.com/50'}"><div><b>${fr.name}</b><br><small style="color:#444">Нажми, чтобы писать</small></div></div>`;
            });
        });
    }

    function openChat(nick, name, ava) {
        chatFriend = nick; currentChat = [me.nick, nick].sort().join("_");
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-ava').src = ava || 'https://via.placeholder.com/50';
        document.getElementById('chat-window').classList.add('active');
        db.ref('messages/'+currentChat).off();
        db.ref('messages/'+currentChat).on('value', s => {
            const box = document.getElementById('messages'); box.innerHTML = "";
            s.forEach(m => {
                const msg = m.val();
                const d = document.createElement('div');
                d.className = msg.s === me.nick ? "msg me" : "msg other";
                if(msg.type === 'voice') d.innerHTML = `<audio src="${msg.t}" controls style="width:180px;height:35px"></audio>`;
                else d.innerText = msg.t;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg(text, type = 'text') {
        const t = text || document.getElementById('msg-in').value.trim();
        if(!t) return;
        db.ref('messages/'+currentChat).push({s: me.nick, t, type, time: Date.now()});
        db.ref('notif/'+chatFriend).set({from: me.name, t: type==='voice'?'🎤 ГС':t, ava: me.ava, time: Date.now()});
        document.getElementById('msg-in').value = "";
    }

    async function toggleVoice() {
        const btn = document.getElementById('rec-btn');
        if(!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
                reader.onloadend = () => sendMsg(reader.result, 'voice');
            };
            mediaRecorder.start(); btn.classList.add('rec-active');
        } else { mediaRecorder.stop(); btn.classList.remove('rec-active'); }
    }

    function listenPush() {
        db.ref('notif/'+me.nick).on('value', s => {
            const d = s.val();
            if(d && Date.now() - d.time < 3000) {
                document.getElementById('push-ava').src = d.ava || 'https://via.placeholder.com/40';
                document.getElementById('push-msg').innerHTML = `<b>${d.from}</b><br>${d.t}`;
                document.getElementById('push').style.top = "20px";
                setTimeout(() => document.getElementById('push').style.top = "-100px", 4000);
            }
        });
    }

    function loadEmojis() {
        const box = document.getElementById('emoji-box');
        ["😀","😍","🔥","✨","❤️","😂","👍","😎","🚀","✔️","❌","🎤","⭐"].forEach(e => {
            const s = document.createElement('span'); s.innerText = e; s.style.cursor="pointer";
            s.onclick = () => document.getElementById('msg-in').value += e;
            box.appendChild(s);
        });
    }
    function toggleEmoji() { const b = document.getElementById('emoji-box'); b.style.display = b.style.display === "grid" ? "none" : "grid"; }
    function tab(t) {
        document.querySelectorAll('.tab-content, .nav-bar i').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('n-'+t).classList.add('active');
    }
    function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
</script>
</body>
</html>
