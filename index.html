<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VERONA ULTRA V24</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; --bg: #030508; --panel: rgba(10, 13, 20, 0.9);
            --neon: 0 0 15px var(--accent);
            --gradient: linear-gradient(135deg, var(--accent), #7000ff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; }
        #matrix { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }

        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--panel); backdrop-filter: blur(20px); padding: 40px; border: 1px solid var(--accent); border-radius: 30px; box-shadow: var(--neon); width: 90%; max-width: 400px; text-align: center; }

        /* Навигация */
        .nav { width: 80px; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 30px; border-right: 1px solid #111; z-index: 1000; }
        .nav i { font-size: 22px; color: #444; cursor: pointer; transition: 0.3s; }
        .nav i.active { color: var(--accent); text-shadow: var(--neon); }

        /* Боковая панель */
        .sidebar { width: 400px; background: var(--panel); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .tab { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .tab.active { display: flex; }

        /* Сториз */
        .st-row { display: flex; gap: 12px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .st-item { min-width: 65px; height: 65px; border-radius: 50%; background: var(--gradient); padding: 2px; flex-shrink: 0; cursor: pointer; }
        .st-item img, .st-item video { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #000; object-fit: cover; }

        /* Список чатов */
        .list { flex: 1; overflow-y: auto; }
        .item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .item img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--accent); }

        /* Окно чата */
        .chat { flex: 1; display: none; flex-direction: column; position: relative; z-index: 500; }
        .chat.active { display: flex; }
        .chat-head { height: 70px; background: var(--panel); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--accent); }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Сообщения */
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; position: relative; animation: pop 0.2s ease; font-size: 14px; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } }
        .msg.me { align-self: flex-end; background: var(--gradient); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #1a1d25; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .reply-box-msg { background: rgba(0,0,0,0.2); padding: 5px 10px; border-left: 3px solid var(--accent); margin-bottom: 5px; font-size: 12px; border-radius: 4px; }

        /* Ответ на сообщение (интерфейс) */
        #reply-preview { background: #0a0d14; padding: 10px 20px; border-top: 1px solid var(--accent); display: none; align-items: center; justify-content: space-between; }

        /* Ввод */
        .input-bar { padding: 15px; background: var(--panel); display: flex; align-items: center; gap: 12px; }
        .field { flex: 1; background: #000; border: 1px solid #333; padding: 12px 15px; border-radius: 12px; color: #fff; outline: none; }

        /* Голосовые */
        #gs-ui { position: absolute; inset: 0; background: #000; display: none; align-items: center; padding: 0 25px; z-index: 1000; }
        .dot { width: 12px; height: 12px; background: #ff0055; border-radius: 50%; margin-right: 10px; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Модальные окна и профиль */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .prof-card { text-align: center; width: 100%; max-width: 500px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; width: 100%; margin-top: 20px; }
        .grid-img { aspect-ratio: 1; width: 100%; object-fit: cover; cursor: pointer; }

        /* Зум фото */
        #zoom-view { position: fixed; inset: 0; background: #000; z-index: 1000000; display: none; align-items: center; justify-content: center; }
        #zoom-view img { max-width: 100%; max-height: 100%; transition: 0.3s; }

        .btn { background: var(--gradient); border: none; padding: 12px; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; width: 100%; }
        .back { font-size: 20px; color: var(--accent); cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; border: none; }
            .sidebar { width: 100%; height: calc(100vh - 60px); }
            .chat { position: fixed; inset: 0; z-index: 2000; background: #000; }
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="color:var(--accent); letter-spacing:5px; margin-bottom:20px;">VERONA V24</h1>
        <input type="text" id="a-u" class="field" placeholder="ЛОГИН" style="text-align:center; margin-bottom:10px;">
        <input type="password" id="a-p" class="field" placeholder="ПАРОЛЬ" style="text-align:center; margin-bottom:20px;">
        <button class="btn" onclick="auth()">ВОЙТИ В СИСТЕМУ</button>
    </div>
</div>

<nav class="nav">
    <i class="fas fa-comments active" onclick="tab('chats')"></i>
    <i class="fas fa-search" onclick="tab('search')"></i>
    <i class="fas fa-user-circle" onclick="tab('me')"></i>
    <i class="fas fa-adjust" onclick="tab('themes')"></i>
</nav>

<aside class="sidebar">
    <div id="t-chats" class="tab active">
        <div class="st-row" id="st-row"></div>
        <div class="list" id="chat-list"></div>
    </div>

    <div id="t-search" class="tab" style="padding:20px;">
        <input type="text" class="field" placeholder="Поиск по ID..." oninput="search(this.value)">
        <div id="search-res" class="list"></div>
    </div>

    <div id="t-me" class="tab">
        <div style="padding:30px; text-align:center;">
            <img id="my-ava" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent); object-fit:cover;">
            <h2 id="my-name" style="margin:10px 0;"></h2>
            <div style="display:flex; gap:10px;">
                <label class="btn">ПОСТ <input type="file" hidden onchange="up(this,'post')"></label>
                <label class="btn" style="background:#f05">СТОРИЗ <input type="file" hidden onchange="up(this,'story')"></label>
            </div>
        </div>
        <div id="my-grid" class="grid"></div>
    </div>

    <div id="t-themes" class="tab" style="padding:20px;">
        <h3>ЦВЕТ СИСТЕМЫ</h3><br>
        <div id="theme-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>
</aside>

<main class="chat" id="chat-win">
    <div class="chat-head">
        <i class="fas fa-arrow-left back" onclick="closeChat()"></i>
        <img id="c-ava" src="" style="width:45px; height:45px; border-radius:50%; cursor:pointer;" onclick="viewPeer()">
        <b id="c-name" style="flex:1">ЧАТ</b>
    </div>

    <div class="msg-box" id="msg-box"></div>

    <div id="reply-preview">
        <div id="reply-text" style="font-size:12px; opacity:0.7"></div>
        <i class="fas fa-times" onclick="cancelReply()"></i>
    </div>

    <div id="gs-ui">
        <div class="dot"></div> <span id="gs-timer">00:00</span>
        <span style="margin-left:auto; opacity:0.5; font-size:12px;">ОТМЕНА СВАЙПОМ ВЛЕВО</span>
    </div>

    <div class="input-bar">
        <i class="fas fa-microphone" id="gs-btn" style="font-size:22px; color:var(--accent);"></i>
        <input type="text" id="m-input" class="field" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <i class="fas fa-paper-plane" onclick="send()" style="font-size:22px; color:var(--accent);"></i>
    </div>
</main>

<div id="prof-modal" class="modal">
    <i class="fas fa-times" style="position:absolute; top:20px; right:20px; font-size:24px;" onclick="hideModal('prof-modal')"></i>
    <div class="prof-card">
        <img id="p-ava" src="" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--accent); object-fit:cover;">
        <h2 id="p-name" style="margin:15px 0;"></h2>
        <div id="p-grid" class="grid"></div>
    </div>
</div>

<div id="zoom-view" onclick="this.style.display='none'">
    <img id="zoom-img" src="">
</div>

<div id="st-viewer" class="modal" onclick="closeSt()">
    <div id="st-content" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
</div>

<script>
    const IMGBB = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";
    firebase.initializeApp({ databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('v24-user')), curChat, curPeer, replyTo = null;
    let rec, chunks = [], vInt, vSec = 0, vStart;

    // Матрица
    const c = document.getElementById('matrix'), x = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const drops = Array(Math.floor(c.width/15)).fill(1);
    setInterval(() => {
        x.fillStyle = "rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height);
        x.fillStyle = "#00f2fe"; x.font = "15px monospace";
        drops.forEach((y, i) => {
            x.fillText(String.fromCharCode(Math.random()*128), i*15, y*15);
            if(y*15 > c.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }, 50);

    if(user) start(user);

    async function auth() {
        const u = document.getElementById('a-u').value.toLowerCase().trim();
        const p = document.getElementById('a-p').value.trim();
        if(!u || !p) return;
        const s = await db.ref('users/'+u).once('value');
        const d = s.exists() ? s.val() : { nick:u, pass:p, name:u, ava:"", posts:[], stories:[] };
        if(s.exists() && d.pass !== p) return alert("Неверный пароль");
        if(!s.exists()) await db.ref('users/'+u).set(d);
        start(d);
    }

    function start(u) {
        user = u; localStorage.setItem('v24-user', JSON.stringify(user));
        document.getElementById('auth-screen').style.display='none';
        db.ref('users/'+user.nick).on('value', s => { 
            user = s.val(); 
            document.getElementById('my-name').innerText = user.name;
            document.getElementById('my-ava').src = user.ava || 'https://via.placeholder.com/100';
            renderGrid('my-grid', user.posts, true);
        });
        loadChats(); loadStories(); loadThemes();
    }

    /* ЧАТ И ОТВЕТЫ */
    function openChat(id, name, ava) {
        curChat = [user.nick, id].sort().join("_"); curPeer = id;
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-ava').src = ava || 'https://via.placeholder.com/50';
        document.getElementById('chat-win').classList.add('active');

        db.ref('messages/'+curChat).on('value', s => {
            const box = document.getElementById('msg-box'); box.innerHTML = "";
            s.forEach(m => {
                const v = m.val();
                const d = document.createElement('div');
                d.className = `msg ${v.s === user.nick ? 'me' : 'other'}`;
                let h = "";
                if(v.reply) h += `<div class="reply-box-msg">${v.reply}</div>`;
                if(v.type==='voice') h += `<audio src="${v.t}" controls style="width:200px; filter:invert(1)"></audio>`;
                else h += `<div>${v.t}</div>`;
                if(v.like) h += `<span style="font-size:10px; position:absolute; bottom:-5px; right:5px;">❤️</span>`;
                d.innerHTML = h;

                d.onclick = () => { replyTo = v.t.substring(0, 30); document.getElementById('reply-text').innerText = "Ответ на: " + replyTo; document.getElementById('reply-preview').style.display='flex'; };
                d.ondblclick = () => db.ref(`messages/${curChat}/${m.key}`).update({like: !v.like});
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const t = document.getElementById('m-input').value.trim(); if(!t) return;
        db.ref('messages/'+curChat).push({s:user.nick, t, reply: replyTo, time:Date.now()});
        cancelReply(); document.getElementById('m-input').value = "";
    }

    function cancelReply() { replyTo = null; document.getElementById('reply-preview').style.display='none'; }

    /* ПРОФИЛЬ СОБЕСЕДНИКА */
    async function viewPeer() {
        const s = await db.ref('users/'+curPeer).once('value');
        const d = s.val();
        document.getElementById('p-name').innerText = d.name;
        document.getElementById('p-ava').src = d.ava || 'https://via.placeholder.com/100';
        renderGrid('p-grid', d.posts, false, curPeer);
        document.getElementById('prof-modal').style.display = 'flex';
    }

    function renderGrid(target, posts, isMine, owner) {
        const g = document.getElementById(target); g.innerHTML = "";
        if(!posts) return;
        posts.slice().reverse().forEach((p, i) => {
            const img = document.createElement('img');
            img.className = 'grid-img'; img.src = p.url;
            img.onclick = () => { 
                document.getElementById('zoom-img').src = p.url;
                document.getElementById('zoom-view').style.display='flex';
            };
            // Лайки на фото в чужом профиле
            if(!isMine) {
                img.oncontextmenu = (e) => {
                    e.preventDefault();
                    alert("Вы лайкнули фото!");
                    db.ref(`users/${owner}/posts/${posts.length-1-i}`).update({likes: (p.likes||0)+1});
                };
            }
            g.appendChild(img);
        });
    }

    /* ГОЛОСОВЫЕ (ТГ СТАЙЛ) */
    const gbtn = document.getElementById('gs-btn');
    gbtn.onmousedown = vS; window.onmouseup = vE;
    gbtn.ontouchstart = (e) => { e.preventDefault(); vStart = e.touches[0].clientX; vS(); };
    gbtn.ontouchend = vE;
    gbtn.ontouchmove = (e) => { if(vStart - e.touches[0].clientX > 80) { chunks = []; vE(); } };

    async function vS() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        rec = new MediaRecorder(stream); chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            if(chunks.length > 0) {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader(); reader.readAsDataURL(blob);
                reader.onloadend = () => db.ref('messages/'+curChat).push({s:user.nick, t:reader.result, type:'voice'});
            }
        };
        rec.start(); document.getElementById('gs-ui').style.display='flex';
        vSec = 0; vInt = setInterval(() => { vSec++; document.getElementById('gs-timer').innerText = new Date(vSec*1000).toISOString().substr(14,5); }, 1000);
    }
    function vE() { clearInterval(vInt); if(rec) rec.stop(); document.getElementById('gs-ui').style.display='none'; }

    /* МЕДИА */
    async function up(input, type) {
        const f = input.files[0]; if(!f) return;
        const fd = new FormData(); fd.append("image", f);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB}`, {method:"POST", body:fd});
        const d = await r.json();
        if(d.success) {
            const url = d.data.url;
            const ref = db.ref('users/'+user.nick);
            if(type==='post') { const p = user.posts||[]; p.push({url, likes:0}); ref.update({posts:p}); }
            if(type==='story') { 
                const s = user.stories||[]; 
                // Проверка на видео (ImgBB только фото, для видео в реальности нужен другой хостинг, но здесь эмулируем)
                s.push({url, type: f.type.includes('video') ? 'video' : 'img'}); 
                ref.update({stories:s}); 
            }
        }
    }

    function loadStories() {
        db.ref('users').on('value', s => {
            const r = document.getElementById('st-row'); r.innerHTML = "";
            s.forEach(u => {
                const d = u.val();
                if(d.stories && d.stories.length > 0) {
                    const item = document.createElement('div'); item.className='st-item';
                    item.innerHTML = `<img src="${d.stories[d.stories.length-1].url}">`;
                    item.onclick = () => {
                        const last = d.stories[d.stories.length-1];
                        const box = document.getElementById('st-content');
                        box.innerHTML = last.type === 'video' ? `<video src="${last.url}" autoplay controls style="max-width:100%"></video>` : `<img src="${last.url}" style="max-width:100%">`;
                        document.getElementById('st-viewer').style.display='flex';
                    };
                    r.appendChild(item);
                }
            });
        });
    }

    function loadChats() {
        db.ref('users').on('value', s => {
            const l = document.getElementById('chat-list'); l.innerHTML = "";
            s.forEach(u => {
                if(u.key !== user.nick) {
                    l.innerHTML += `<div class="item" onclick="openChat('${u.key}','${u.val().name}','${u.val().ava}')"><img src="${u.val().ava || 'https://via.placeholder.com/50'}"> <b>${u.val().name}</b></div>`;
                }
            });
        });
    }

    function loadThemes() {
        const colors = ['#00f2fe', '#adff2f', '#ff4500', '#ff00ff', '#ffffff'];
        const g = document.getElementById('theme-grid');
        colors.forEach(c => {
            const d = document.createElement('div'); d.style.background = c; d.style.height='40px'; d.style.borderRadius='8px'; d.onclick = () => document.documentElement.style.setProperty('--accent', c);
            g.appendChild(d);
        });
    }

    function search(q) {
        if(!q) return;
        db.ref('users').once('value', s => {
            let h = "";
            s.forEach(u => { if(u.key.includes(q.toLowerCase())) h += `<div class="item" onclick="openChat('${u.key}','${u.val().name}','${u.val().ava}')">${u.val().name}</div>`; });
            document.getElementById('search-res').innerHTML = h;
        });
    }

    function tab(t) { 
        document.querySelectorAll('.tab, .nav i').forEach(x => x.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
    }
    function closeChat() { document.getElementById('chat-win').classList.remove('active'); }
    function hideModal(id) { document.getElementById(id).style.display='none'; }
    function closeSt() { document.getElementById('st-viewer').style.display='none'; document.getElementById('st-content').innerHTML=""; }
</script>
</body>
</html>
