<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VERONA HD ULTIMATE V13</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; 
            --bg: #030508; 
            --panel: #0a0d14; 
            --text: #ffffff; 
            --neon: 0 0 25px var(--accent);
            --gradient: linear-gradient(135deg, var(--accent), #7000ff);
            --glass: rgba(10, 13, 20, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex;
            letter-spacing: 0.5px;
        }

        /* --- АНИМАЦИИ ПЕРЕХОДОВ --- */
        .tab-content { 
            display: none; 
            opacity: 0; 
            transform: translateY(15px); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-direction: column; 
            height: 100%; 
            overflow-y: auto;
        }
        .tab-content.active { 
            display: flex; 
            opacity: 1; 
            transform: translateY(0); 
        }

        /* --- AUTH HD --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at center, #1a1a2e 0%, #030508 100%); }
        .auth-card { background: var(--panel); padding: 50px 30px; border-radius: 40px; border: 1px solid rgba(0, 242, 254, 0.3); width: 90%; max-width: 400px; text-align: center; box-shadow: var(--neon); }
        .auth-input { background: rgba(0,0,0,0.5); border: 1px solid #222; padding: 18px; border-radius: 20px; color: #fff; width: 100%; margin-bottom: 15px; outline: none; transition: 0.3s; font-size: 16px; }
        .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        .auth-btn { background: var(--gradient); color: #000; border: none; padding: 20px; border-radius: 20px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; }
        .auth-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- NAVIGATION --- */
        .nav-bar { width: 100px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 40px; border-right: 1px solid #111; z-index: 5000; }
        .nav-bar i { font-size: 28px; color: #333; cursor: pointer; transition: 0.4s; }
        .nav-bar i.active { color: var(--accent); text-shadow: var(--neon); transform: scale(1.3); }
        .plus-btn { color: var(--accent) !important; font-size: 35px !important; margin-top: auto; }

        /* --- SIDEBAR --- */
        .sidebar { width: 450px; background: var(--panel); display: flex; flex-direction: column; border-right: 2px solid #000; position: relative; }
        
        /* STORIES HD */
        .stories-row { display: flex; gap: 20px; padding: 25px; overflow-x: auto; border-bottom: 1px solid #151921; scrollbar-width: none; }
        .stories-row::-webkit-scrollbar { display: none; }
        .story-circle { min-width: 85px; height: 85px; border-radius: 50%; background: var(--gradient); padding: 3px; cursor: pointer; transition: 0.3s; }
        .story-circle:hover { transform: rotate(5deg) scale(1.05); }
        .story-circle .inner { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #000; overflow: hidden; }
        .story-circle img, .story-circle video { width: 100%; height: 100%; object-fit: cover; }

        /* СПИСКИ HD */
        .user-item { display: flex; align-items: center; padding: 20px 30px; gap: 20px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.02); position: relative; }
        .user-item:hover { background: rgba(255,255,255,0.03); }
        .user-ava-cont { position: relative; width: 65px; height: 65px; }
        .user-ava-cont img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0, 242, 254, 0.1); }
        .online-dot { width: 16px; height: 16px; background: #00ff88; border-radius: 50%; border: 3px solid #0a0d14; position: absolute; bottom: 2px; right: 2px; display: none; box-shadow: 0 0 10px #00ff88; }
        .is-online .online-dot { display: block; }

        /* --- CHAT ENGINE --- */
        .chat-main { flex: 1; display: none; flex-direction: column; background: #05070a; position: relative; z-index: 1000; }
        .chat-main.active { display: flex; }
        .chat-header { padding: 20px 30px; background: var(--glass); backdrop-filter: blur(25px); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--accent); }
        .chat-header b { font-size: 20px; }
        
        .msg-box { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; background-size: cover; background-position: center; }
        .msg { max-width: 70%; padding: 16px 22px; border-radius: 25px; font-size: 16px; position: relative; line-height: 1.5; animation: msgIn 0.3s ease-out; }
        @keyframes msgIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .msg.me { align-self: flex-end; background: var(--gradient); color: #000; font-weight: 600; border-bottom-right-radius: 5px; box-shadow: 0 5px 20px rgba(0, 242, 254, 0.2); }
        .msg.other { align-self: flex-start; background: #161b22; border-bottom-left-radius: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .msg video { width: 100%; max-width: 300px; border-radius: 15px; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* ВВОД */
        .input-wrap { background: #0a0d14; padding: 15px 0; border-top: 1px solid #1a1a1a; }
        .input-area { padding: 0 30px; display: flex; align-items: center; gap: 20px; }
        .input-area input { flex: 1; background: #000; border: 1px solid #222; padding: 16px 25px; border-radius: 35px; color: #fff; outline: none; font-size: 16px; transition: 0.3s; }
        .input-area input:focus { border-color: var(--accent); }

        /* --- PROFILE HD --- */
        .prof-header { padding: 50px 20px; text-align: center; background: linear-gradient(to bottom, #0a0d14, #030508); }
        .prof-ava { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; box-shadow: var(--neon); cursor: pointer; transition: 0.5s; }
        .prof-ava:hover { transform: scale(1.05) rotate(3deg); }
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .post-item { width: 100%; aspect-ratio: 1; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #111; transition: 0.3s; }
        .post-item:hover { filter: brightness(1.2); transform: translateY(-5px); }
        .post-item video, .post-item img { width: 100%; height: 100%; object-fit: cover; }

        /* FULLSCREEN HD ZOOM */
        #zoom-view { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .zoom-content { max-width: 95%; max-height: 90%; border-radius: 20px; box-shadow: var(--neon); }

        /* ADAPTIVE */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav-bar { width: 100%; height: 80px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; border-right: none; border-top: 1px solid #111; padding: 0; }
            .sidebar { width: 100%; height: 100vh; }
            .chat-main { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 15000; }
            .msg { max-width: 85%; }
            .plus-btn { margin-top: 0; }
        }
    </style>
</head>
<body>

<div id="zoom-view" onclick="this.style.display='none'"><div id="zoom-target"></div></div>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--accent); font-size: 35px; letter-spacing: 10px;">VERONA</h1>
        <p style="opacity:0.3; font-size: 10px; margin-bottom: 40px; text-transform: uppercase;">Next-Gen HD Social Protocol</p>
        <input type="text" id="auth-nick" class="auth-input" placeholder="НИКНЕЙМ">
        <input type="password" id="auth-pass" class="auth-input" placeholder="ПАРОЛЬ">
        <button class="auth-btn" onclick="handleAuth()">ИНИЦИИРОВАТЬ ВХОД</button>
    </div>
</div>

<div id="create-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:90000; display:none; align-items:center; justify-content:center; backdrop-filter: blur(10px);">
    <div class="auth-card">
        <h2 style="margin-bottom:25px">СОЗДАНИЕ ОБЪЕКТА</h2>
        <input type="text" id="group-name" class="auth-input" placeholder="Название">
        <input type="text" id="group-desc" class="auth-input" placeholder="Описание">
        <select id="group-type" class="auth-input">
            <option value="group">ГРУППА (ЧАТ)</option>
            <option value="channel">КАНАЛ (ВЕЩАНИЕ)</option>
        </select>
        <button class="auth-btn" onclick="createGroup()">ПОДТВЕРДИТЬ</button>
        <p onclick="this.parentElement.parentElement.style.display='none'" style="margin-top:20px; cursor:pointer; opacity:0.5; font-size: 12px;">ОТМЕНИТЬ</p>
    </div>
</div>

<nav class="nav-bar">
    <i class="fas fa-comment-alt active" onclick="tab('chats')" id="n-chats"></i>
    <i class="fas fa-search" onclick="tab('friends')" id="n-friends"></i>
    <i class="fas fa-plus-circle plus-btn" onclick="document.getElementById('create-modal').style.display='flex'"></i>
    <i class="fas fa-layer-group" onclick="tab('themes')" id="n-themes"></i>
    <i class="fas fa-user-astronaut" onclick="tab('prof')" id="n-prof"></i>
</nav>

<aside class="sidebar">
    <div id="t-chats" class="tab-content active">
        <div class="stories-row" id="stories-bar"></div>
        <div id="chat-list" style="padding-top: 10px;"></div>
    </div>
    
    <div id="t-friends" class="tab-content">
        <h2 style="padding: 30px; font-weight: 200; letter-spacing: 5px; color: var(--accent);">GLOBAL SEARCH</h2>
        <div style="padding: 0 30px 20px;">
            <input type="text" id="user-search" placeholder="Поиск в системе..." oninput="searchUsers(this.value)" class="auth-input">
        </div>
        <div id="friends-list"></div>
    </div>

    <div id="t-themes" class="tab-content">
        <h2 style="padding: 30px; letter-spacing: 5px;">INTERFACE</h2>
        <div id="theme-grid" style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <div id="t-prof" class="tab-content">
        <div class="prof-header">
            <img id="m-ava" src="" class="prof-ava" onclick="zoom(this.src)">
            <h2 id="m-name" style="margin-top: 25px; font-weight: 800; font-size: 28px;"></h2>
            <input type="text" id="m-status" onblur="saveStatus()" class="auth-input" style="background:none; border:none; border-bottom:1px solid var(--accent); border-radius:0; width: auto; margin-bottom: 30px; color: #888;">
            <div style="display:flex; gap:15px; justify-content:center;">
                <label class="auth-btn" style="width:auto; padding:15px 25px; font-size: 12px;">POST <input type="file" hidden onchange="upFile(this,'post')"></label>
                <label class="auth-btn" style="width:auto; padding:15px 25px; font-size: 12px; background:#ff0055;">STORY <input type="file" hidden onchange="upFile(this,'story')"></label>
            </div>
        </div>
        <div id="my-posts" class="posts-grid"></div>
    </div>
</aside>

<main class="chat-main" id="chat-window">
    <div class="chat-header">
        <i class="fas fa-chevron-left" onclick="closeChat()"></i>
        <div style="position:relative" id="header-ava-cont">
            <img id="c-ava" src="" style="width:55px; height:55px; border-radius:50%; border: 2px solid var(--accent); cursor:pointer" onclick="viewPeerProfile()">
            <div class="online-dot"></div>
        </div>
        <div>
            <b id="c-name" style="display: block;">Загрузка...</b>
            <span id="c-status" style="font-size: 12px; opacity: 0.4;">синхронизация...</span>
        </div>
        <div style="margin-left:auto; display:flex; gap:25px; align-items:center;">
            <label style="cursor:pointer; color: var(--accent); font-size: 20px;"><i class="fas fa-thumbtack"></i><input type="file" hidden onchange="setChatBg(this)"></label>
            <i class="fas fa-ellipsis-v" style="opacity: 0.3;"></i>
        </div>
    </div>
    
    <div class="msg-box" id="messages"></div>

    <div class="input-wrap">
        <div id="reply-preview" style="display:none; padding:15px 30px; background:rgba(255,255,255,0.03); border-left:4px solid var(--accent); justify-content:space-between; align-items:center;">
            <span id="reply-text" style="font-size:13px; opacity:0.6;"></span>
            <i class="fas fa-times" onclick="cancelReply()" style="cursor:pointer;"></i>
        </div>
        <div class="input-area">
            <i class="fas fa-microphone" id="mic-btn" onclick="toggleRec()" style="color:var(--accent); font-size:24px; cursor:pointer;"></i>
            <input type="text" id="msg-in" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') send()">
            <i class="fas fa-paper-plane" onclick="send()" style="color:var(--accent); font-size:24px; cursor:pointer;"></i>
        </div>
    </div>
</main>

<script>
    const IMGBB_KEY = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";
    const firebaseConfig = { databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('v13-user')), currentChat, chatFriend, replyMsg = null;
    let recorder, chunks = [], recInt, sec = 0;

    if(me) loginOk(me);

    async function handleAuth() {
        const n = document.getElementById('auth-nick').value.toLowerCase().trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!n || !p) return;
        const s = await db.ref('users/'+n).once('value');
        if(s.exists() && s.val().pass !== p) return alert("ACCESS DENIED: WRONG PASSWORD");
        const u = s.exists() ? s.val() : { nick:n, pass:p, name:n, ava:"", status:"Authorized Verona User", posts:[], stories:[], lastSeen: Date.now() };
        if(!s.exists()) await db.ref('users/'+n).set(u);
        loginOk(u);
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v13-user', JSON.stringify(me));
        document.getElementById('auth-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('auth-screen').style.display = 'none', 500);
        
        setInterval(() => db.ref('users/'+me.nick).update({lastSeen: Date.now()}), 20000);
        
        db.ref('users/'+me.nick).on('value', s => {
            const d = s.val(); if(!d) return;
            document.getElementById('m-name').innerText = d.name;
            document.getElementById('m-ava').src = d.ava || 'https://via.placeholder.com/150';
            document.getElementById('m-status').value = d.status || "";
            renderPosts('my-posts', d.posts);
        });
        loadChatList(); loadThemes(); loadStories();
    }

    function tab(t) {
        document.querySelectorAll('.tab-content, .nav-bar i').forEach(el => el.classList.remove('active'));
        const target = document.getElementById('t-'+t);
        target.classList.add('active');
        document.getElementById('n-'+t).classList.add('active');
    }

    function zoom(url) {
        const target = document.getElementById('zoom-target');
        const isVideo = url.includes("video") || url.match(/\.(mp4|webm|mov)/i);
        target.innerHTML = isVideo ? `<video src="${url}" controls autoplay class="zoom-content"></video>` : `<img src="${url}" class="zoom-content">`;
        document.getElementById('zoom-view').style.display = 'flex';
    }

    /* CHAT CORE */
    function openChat(nick, name, ava, type = 'private', isGroup = false) {
        chatFriend = nick; currentChat = isGroup ? nick : [me.nick, nick].sort().join("_");
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-ava').src = ava || 'https://via.placeholder.com/60';
        document.getElementById('chat-window').classList.add('active');
        
        if(!isGroup) {
            db.ref('users/'+nick).on('value', s => {
                const online = (Date.now() - s.val().lastSeen) < 60000;
                document.getElementById('header-ava-cont').className = online ? 'is-online' : '';
                document.getElementById('c-status').innerText = online ? 'online' : 'offline';
            });
        }

        db.ref('messages/'+currentChat).on('value', s => {
            const b = document.getElementById('messages'); b.innerHTML = "";
            s.forEach(m => {
                const msg = m.val();
                const d = document.createElement('div');
                d.className = `msg ${msg.s === me.nick ? 'me' : 'other'}`;
                const isVid = msg.t.includes("video") || msg.t.match(/\.(mp4|mov|webm)/i);
                let content = msg.reply ? `<small style="opacity:0.5; display:block; margin-bottom:5px;">⤴ ${msg.reply}</small>` : "";
                content += isVid ? `<video src="${msg.t}" controls></video>` : msg.t;
                d.innerHTML = content;
                d.onclick = () => setReply(msg.t.substring(0,30), m.key);
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function send() {
        const txt = document.getElementById('msg-in').value.trim(); if(!txt) return;
        const data = { s:me.nick, t:txt, time:Date.now() };
        if(replyMsg) { data.reply = replyMsg.t; cancelReply(); }
        db.ref('messages/'+currentChat).push(data);
        document.getElementById('msg-in').value = "";
    }

    async function upFile(input, type) {
        const f = input.files[0]; if(!f) return;
        const isVideo = f.type.startsWith('video/');
        const fd = new FormData(); fd.append("image", f);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
        const d = await r.json();
        if(d.success) {
            const url = d.data.url;
            if(type === 'ava') db.ref('users/'+me.nick).update({ava: url});
            else if(type === 'post') {
                const s = await db.ref('users/'+me.nick+'/posts').once('value');
                const p = s.val() || []; p.push({url, isVideo});
                db.ref('users/'+me.nick).update({posts: p});
            } else if(type === 'story') {
                const s = await db.ref('users/'+me.nick+'/stories').once('value');
                const st = s.val() || []; st.push({url, isVideo});
                db.ref('users/'+me.nick).update({stories: st});
            }
        }
    }

    function renderPosts(id, p) {
        const g = document.getElementById(id); g.innerHTML = "";
        if(p) p.slice().reverse().forEach(obj => {
            const tag = obj.isVideo ? `<video src="${obj.url}"></video>` : `<img src="${obj.url}">`;
            g.innerHTML += `<div class="post-item" onclick="zoom('${obj.url}')">${tag}</div>`;
        });
    }

    function loadStories() {
        db.ref('users').on('value', s => {
            const bar = document.getElementById('stories-bar'); bar.innerHTML = "";
            s.forEach(u => {
                const d = u.val();
                if(d.stories && d.stories.length > 0) {
                    const last = d.stories[d.stories.length-1];
                    const tag = last.isVideo ? `<video src="${last.url}"></video>` : `<img src="${last.url}">`;
                    bar.innerHTML += `<div class="story-circle" onclick="zoom('${last.url}')"><div class="inner">${tag}</div></div>`;
                }
            });
        });
    }

    function loadChatList() {
        db.ref(`friends/${me.nick}`).on('value', s => {
            const l = document.getElementById('chat-list'); l.innerHTML = "";
            s.forEach(f => {
                const d = f.val();
                l.innerHTML += `<div class="user-item" onclick="openChat('${f.key}','${d.name}','${d.ava}','${d.type||'private'}', ${d.isGroup||false})">
                    <div class="user-ava-cont"><img src="${d.ava||'https://via.placeholder.com/60'}"></div>
                    <div>
                        <b style="font-size:18px">${d.name}</b>
                        <p style="font-size:12px; opacity:0.3;">Открыть диалог</p>
                    </div>
                </div>`;
            });
        });
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); chatFriend=null; }
    function setReply(t, id) { replyMsg={t,id}; document.getElementById('reply-text').innerText = "Reply: " + t; document.getElementById('reply-preview').style.display='flex'; }
    function cancelReply() { replyMsg=null; document.getElementById('reply-preview').style.display='none'; }
    function loadThemes() { const box = document.getElementById('theme-grid'); [{n:'Cyber Blue', p:'#00f2fe', s:'#7000ff'}, {n:'Acid', p:'#adff2f', s:'#000'}, {n:'Ruby', p:'#ff0055', s:'#222'}].forEach(t => box.innerHTML += `<div style="background:linear-gradient(45deg, ${t.p}, ${t.s}); padding:25px; border-radius:20px; text-align:center; font-weight:bold; cursor:pointer" onclick="setTheme('${t.p}','${t.s}')">${t.n}</div>`); }
    function setTheme(p, s) { document.documentElement.style.setProperty('--accent', p); document.documentElement.style.setProperty('--gradient', `linear-gradient(135deg, ${p}, ${s})`); }
    function saveStatus() { db.ref('users/'+me.nick).update({status: document.getElementById('m-status').value}); }
    
    function searchUsers(q) {
        if(!q) return;
        db.ref('users').orderByKey().startAt(q.toLowerCase()).endAt(q.toLowerCase() + '\uf8ff').once('value', s => {
            let h = "";
            s.forEach(u => { if(u.key !== me.nick) h += `<div class="user-item" onclick="addFriend('${u.key}','${u.val().name}','${u.val().ava}')"><img src="${u.val().ava||'https://via.placeholder.com/50'}" style="width:50px; border-radius:50%"> <b style="margin-left:15px">${u.val().name}</b></div>`; });
            document.getElementById('friends-list').innerHTML = h;
        });
    }
    async function addFriend(nick, name, ava) { await db.ref(`friends/${me.nick}/${nick}`).set({name, ava}); tab('chats'); openChat(nick, name, ava); }

</script>
</body>
</html>
