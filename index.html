<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VERONA V20 ELITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; --bg: #030508; --panel: #0a0d14; --text: #fff;
            --neon: 0 0 15px var(--accent);
            --gradient: linear-gradient(135deg, var(--accent), #7000ff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* --- HACKER AUTH ANIMATION --- */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #matrix-canvas { position: absolute; top: 0; left: 0; opacity: 0.3; }
        .auth-card { position: relative; z-index: 10; background: rgba(10,13,20,0.9); padding: 40px; border: 1px solid var(--accent); border-radius: 20px; box-shadow: var(--neon); width: 90%; max-width: 400px; text-align: center; }
        
        .crow-anim { width: 120px; height: 120px; margin: 0 auto 20px; fill: #fff; filter: drop-shadow(var(--neon)); animation: fly 3s ease-in-out infinite; }
        @keyframes fly { 0%, 100% { transform: translateY(0) rotate(5deg); } 50% { transform: translateY(-15px) rotate(-5deg); } }

        /* --- UI COMPONENTS --- */
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid #111; display: flex; flex-direction: column; z-index: 100; }
        .nav-bar { width: 80px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; border-right: 1px solid #111; }
        .nav-bar i { font-size: 22px; color: #333; cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); text-shadow: var(--neon); }

        /* --- STORIES TOP --- */
        .stories-container { padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .stories-row { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .story-node { min-width: 65px; height: 65px; border-radius: 50%; background: var(--gradient); padding: 2px; cursor: pointer; flex-shrink: 0; }
        .story-node img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        /* --- CHAT ENGINE --- */
        .chat-main { flex: 1; display: none; flex-direction: column; background: #05070a; position: relative; }
        .chat-main.active { display: flex; }
        .chat-header { height: 65px; padding: 0 20px; background: rgba(10,13,20,0.95); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-size: cover; background-position: center; }
        
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; position: relative; font-size: 14px; line-height: 1.4; transition: 0.2s; }
        .msg.me { align-self: flex-end; background: var(--gradient); color: #000; font-weight: bold; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #1b2129; border-bottom-left-radius: 4px; }
        .msg-like { position: absolute; bottom: -10px; right: 10px; font-size: 12px; background: #000; border: 1px solid var(--accent); border-radius: 10px; padding: 2px 6px; }

        /* --- INPUT AREA --- */
        .input-area { padding: 15px; background: #0a0d14; display: flex; align-items: center; gap: 15px; border-top: 1px solid #1a1a1a; }
        .input { background: rgba(0,0,0,0.5); border: 1px solid #222; padding: 12px; border-radius: 12px; color: #fff; width: 100%; outline: none; }
        .input:focus { border-color: var(--accent); box-shadow: var(--neon); }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .nav-bar { width: 100%; height: 70px; flex-direction: row; justify-content: space-around; position: fixed; bottom: 0; border: none; border-top: 1px solid #111; z-index: 1000; }
            .sidebar { width: 100%; height: calc(100vh - 70px); }
            .chat-main { position: fixed; inset: 0; z-index: 2000; }
            .input-area { padding-bottom: 30px; }
        }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--panel); padding: 30px; border-radius: 25px; border: 1px solid var(--accent); width: 90%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <canvas id="matrix-canvas"></canvas>
    <div class="auth-card">
        <svg class="crow-anim" viewBox="0 0 24 24">
            <path d="M21,12C21,16.5 17.5,20 13,20C12.5,20 12,20 11.5,19.9C14,18.5 15,15.5 15,13C15,10.5 14,8 11.5,6.1C12,6 12.5,6 13,6C17.5,6 21,9.5 21,12M6.1,13.2L3,11L6.1,8.8L9.2,11L6.1,13.2M11,11L13,12L11,13L10,15L9,13L7,12L9,11L10,9L11,11Z"/>
        </svg>
        <h2 style="color:var(--accent); letter-spacing:8px; margin-bottom:20px;">VERONA_OS</h2>
        <input type="text" id="a-nick" class="input" placeholder="ACCESS_ID" style="text-align:center;"><br><br>
        <button class="btn" style="width:100%" onclick="login()">INITIALIZE</button>
    </div>
</div>

<nav class="nav-bar">
    <i class="fas fa-terminal active" onclick="tab('chats')" id="n-chats"></i>
    <i class="fas fa-satellite-dish" onclick="tab('search')" id="n-search"></i>
    <i class="fas fa-user-shield" onclick="tab('prof')" id="n-prof"></i>
</nav>

<aside class="sidebar">
    <div id="t-chats" class="tab-content active" style="display:flex; flex-direction:column; height:100%;">
        <div class="stories-container">
            <div style="font-size:10px; color:var(--accent); margin-bottom:8px;">ACTIVE_STORIES</div>
            <div class="stories-row" id="st-row"></div>
        </div>
        <div id="chat-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="t-search" class="tab-content" style="padding:20px; display:none;">
        <input type="text" class="input" placeholder="Scaning users..." oninput="findUser(this.value)">
        <div id="search-res" style="margin-top:20px;"></div>
    </div>

    <div id="t-prof" class="tab-content" style="display:none;">
        <div style="padding:40px; text-align:center;">
            <div style="position:relative; display:inline-block;">
                <img id="m-ava" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent); object-fit:cover;">
                <label style="position:absolute; bottom:0; right:0; background:var(--accent); border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer;"><i class="fas fa-camera" style="color:#000; font-size:12px;"></i><input type="file" hidden onchange="upMedia(this,'ava')"></label>
            </div>
            <h2 id="m-name" style="margin:15px 0; color:var(--accent);"></h2>
            <div style="display:flex; gap:10px;">
                <label class="btn" style="flex:1; font-size:12px;">UPLOAD_POST <input type="file" hidden onchange="upMedia(this,'post')"></label>
                <label class="btn" style="flex:1; font-size:12px; background:#f05;">ADD_STORY <input type="file" hidden onchange="upMedia(this,'story')"></label>
            </div>
        </div>
        <div id="m-posts" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px;"></div>
    </div>
</aside>

<main class="chat-main" id="chat-win">
    <div class="chat-header">
        <i class="fas fa-code-branch" onclick="closeChat()" style="color:var(--accent); cursor:pointer;"></i>
        <img id="c-ava" src="" style="width:40px; height:40px; border-radius:50%; border:1px solid var(--accent);">
        <b id="c-name" style="flex:1; letter-spacing:2px;">SESSION_NULL</b>
        <i class="fas fa-user-cog" onclick="openSet()" style="cursor:pointer;"></i>
    </div>

    <div class="msg-box" id="msg-box"></div>

    <div id="v-ui" style="display:none; position:absolute; bottom:70px; left:20px; right:20px; background:var(--panel); padding:15px; border-radius:15px; border:1px solid var(--accent); align-items:center;">
        <div style="width:10px; height:10px; background:red; border-radius:50%; animation:blink 0.5s infinite; margin-right:10px;"></div>
        <span id="v-timer">00:00</span>
        <span style="margin-left:auto; font-size:10px; opacity:0.5;">SWIPE_LEFT_TO_CANCEL</span>
    </div>

    <div class="input-area">
        <i class="fas fa-microphone" id="mic" style="font-size:22px; color:var(--accent); cursor:pointer;"></i>
        <input type="text" id="m-input" class="input" placeholder="Type command..." onkeypress="if(event.key==='Enter') send()">
        <i class="fas fa-paper-plane" onclick="send()" style="font-size:22px; color:var(--accent); cursor:pointer;"></i>
    </div>
</main>

<div id="set-modal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--accent);">CHAT_ENCRYPTION_SETTINGS</h3><br>
        <label class="btn" style="display:block; text-align:center">CHANGE_BACKGROUND <input type="file" hidden onchange="upMedia(this,'bg')"></label><br>
        <button class="btn" style="width:100%; background:none; border:1px solid #333; color:#fff;" onclick="closeModal()">EXIT</button>
    </div>
</div>

<script>
    const IMGBB = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";
    const firebaseConfig = { databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('v20-u')), curChat, chatPeer;
    let rec, chunks = [], vInt, vSec = 0, startX;

    // Matrix Background
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2fe"; ctx.font = fontSize + "px monospace";
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    if(me) initApp(me);

    async function login() {
        const n = document.getElementById('a-nick').value.toLowerCase().trim(); if(!n) return;
        const s = await db.ref('users/'+n).once('value');
        const u = s.exists() ? s.val() : { nick:n, name:n, ava:"", posts:[], stories:[], bg:{} };
        if(!s.exists()) await db.ref('users/'+n).set(u);
        initApp(u);
    }

    function initApp(u) {
        me = u; localStorage.setItem('v20-u', JSON.stringify(me));
        document.getElementById('auth-screen').style.display = 'none';
        db.ref('users/'+me.nick).on('value', s => { 
            me = s.val(); 
            document.getElementById('m-name').innerText = me.name;
            document.getElementById('m-ava').src = me.ava || 'https://via.placeholder.com/100';
            renderPosts();
        });
        loadChats(); loadStories();
    }

    /* --- MESSAGING --- */
    function openChat(id, name, ava) {
        curChat = [me.nick, id].sort().join("_"); chatPeer = id;
        document.getElementById('c-name').innerText = name.toUpperCase();
        document.getElementById('c-ava').src = ava || 'https://via.placeholder.com/40';
        document.getElementById('chat-win').classList.add('active');

        db.ref(`users/${me.nick}/bg/${curChat}`).on('value', s => {
            document.getElementById('msg-box').style.backgroundImage = s.exists() ? `url(${s.val()})` : 'none';
        });

        db.ref('messages/'+curChat).on('value', s => {
            const box = document.getElementById('msg-box'); box.innerHTML = "";
            s.forEach(m => {
                const v = m.val();
                const d = document.createElement('div');
                d.className = `msg ${v.s === me.nick ? 'me' : 'other'}`;
                if(v.type === 'voice') d.innerHTML = `<audio src="${v.t}" controls style="width:200px; height:40px; filter: invert(1);"></audio>`;
                else d.innerText = v.t;
                if(v.like) d.innerHTML += `<span class="msg-like">❤️</span>`;

                d.ondblclick = () => db.ref(`messages/${curChat}/${m.key}`).update({like: !v.like});
                d.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(confirm("DELETE MESSAGE?")) db.ref(`messages/${curChat}/${m.key}`).remove();
                };
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const t = document.getElementById('m-input').value.trim(); if(!t) return;
        db.ref('messages/'+curChat).push({s:me.nick, t, time:Date.now()});
        document.getElementById('m-input').value = "";
    }

    /* --- GS ENGINE --- */
    const mic = document.getElementById('mic');
    mic.onmousedown = vStart; mic.onmouseup = vEnd;
    mic.ontouchstart = (e) => { startX = e.touches[0].clientX; vStart(); };
    mic.ontouchend = vEnd;
    mic.ontouchmove = (e) => { if(startX - e.touches[0].clientX > 70) { chunks = []; vEnd(); } };

    async function vStart() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        rec = new MediaRecorder(stream); chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => {
            if(chunks.length === 0) return;
            const b = new Blob(chunks, {type:'audio/webm'});
            const r = new FileReader(); r.readAsDataURL(b);
            r.onloadend = () => db.ref('messages/'+curChat).push({s:me.nick, t:r.result, type:'voice'});
        };
        rec.start();
        document.getElementById('v-ui').style.display = 'flex';
        vSec = 0; vInt = setInterval(() => { vSec++; document.getElementById('v-timer').innerText = new Date(vSec*1000).toISOString().substr(14,5); }, 1000);
    }
    function vEnd() { clearInterval(vInt); if(rec) rec.stop(); document.getElementById('v-ui').style.display = 'none'; }

    /* --- CORE SYSTEM --- */
    async function upMedia(input, type) {
        const f = input.files[0]; if(!f) return;
        const fd = new FormData(); fd.append("image", f);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB}`, {method:"POST", body:fd});
        const d = await r.json();
        if(d.success) {
            const url = d.data.url;
            if(type === 'post') {
                const p = me.posts || []; p.push({url, id: Date.now()});
                db.ref('users/'+me.nick).update({posts: p});
            } else if(type === 'story') {
                const s = me.stories || []; s.push({url, id: Date.now()});
                db.ref('users/'+me.nick).update({stories: s});
            } else if(type === 'bg') {
                db.ref(`users/${me.nick}/bg/${curChat}`).set(url);
                closeModal();
            } else if(type === 'ava') {
                db.ref('users/'+me.nick).update({ava: url});
            }
        }
    }

    function loadStories() {
        db.ref('users').on('value', s => {
            const row = document.getElementById('st-row'); row.innerHTML = "";
            s.forEach(u => {
                const d = u.val();
                if(d.stories && d.stories.length > 0) {
                    row.innerHTML += `<div class="story-node" onclick="window.open('${d.stories[d.stories.length-1].url}','_blank')"><img src="${d.stories[d.stories.length-1].url}"></div>`;
                }
            });
        });
    }

    function loadChats() {
        db.ref('friends/'+me.nick).on('value', s => {
            const l = document.getElementById('chat-list'); l.innerHTML = "";
            s.forEach(f => {
                const d = f.val();
                l.innerHTML += `<div style="padding:15px; display:flex; gap:15px; align-items:center; cursor:pointer; border-bottom:1px solid #111;" onclick="openChat('${f.key}','${d.name}','${d.ava}')"><img src="${d.ava || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:50%; border:1px solid var(--accent)"> <div><b style="color:var(--accent)">${d.name.toUpperCase()}</b><br><span style="font-size:10px; opacity:0.5;">ENCRYPTED_LINK_ESTABLISHED</span></div></div>`;
            });
        });
    }

    function findUser(q) {
        if(!q) return;
        db.ref('users').once('value', s => {
            let h = "";
            s.forEach(u => { if(u.key.includes(q)) h += `<div style="padding:15px; border:1px solid var(--accent); margin:5px; cursor:pointer" onclick="addF('${u.key}','${u.val().name}','${u.val().ava}')">ADD_LINK: ${u.val().name}</div>`; });
            document.getElementById('search-res').innerHTML = h;
        });
    }

    async function addF(nick, name, ava) { await db.ref(`friends/${me.nick}/${nick}`).set({name, ava}); tab('chats'); }
    function renderPosts() {
        const g = document.getElementById('m-posts'); g.innerHTML = "";
        if(me.posts) me.posts.slice().reverse().forEach(p => { g.innerHTML += `<img src="${p.url}" style="width:100%; aspect-ratio:1; object-fit:cover; border:1px solid #111;" onclick="if(confirm('DELETE?')) db.ref('users/'+me.nick).update({posts: me.posts.filter(x=>x.id!==p.id)})">`; });
    }

    function tab(t) { document.querySelectorAll('.tab-content, .nav-bar i').forEach(x => { x.style.display='none'; x.classList.remove('active'); }); document.getElementById('t-'+t).style.display='flex'; document.getElementById('n-'+t).classList.add('active'); document.getElementById('n-'+t).style.display='block'; }
    function closeChat() { document.getElementById('chat-win').classList.remove('active'); }
    function openSet() { document.getElementById('set-modal').style.display='flex'; }
    function closeModal() { document.getElementById('set-modal').style.display='none'; }
</script>
</body>
</html>
