<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #5865f2; --bg: #0e1621; --panel: #17212b; --text: #fff; --sub: #708499; --danger: #ed4245;
            --grad: linear-gradient(135deg, #2b5278, var(--accent));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        .app-shell { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 25px; z-index: 100; }
        .nav-bar i { font-size: 20px; color: var(--sub); cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); transform: scale(1.2); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
        .tab-content { display: none; flex-direction: column; height: 100%; padding-bottom: 80px; }
        .tab-content.active { display: flex; }

        /* ПРОФИЛЬ */
        .p-header { background: var(--grad); height: 120px; position: relative; width: 100%; }
        .p-avatar { width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--panel); position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .p-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { margin-top: 60px; text-align: center; padding: 0 20px; }
        .p-age-tag { display: inline-block; background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 10px; font-size: 12px; margin-top: 5px; color: var(--accent); font-weight: bold; }
        
        .post-card { background: var(--bg); margin: 15px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .post-card img { width: 100%; max-height: 250px; object-fit: cover; }

        /* ЧАТ */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; transition: 0.3s; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #242f3d; border-bottom-left-radius: 4px; }

        input, textarea { background: var(--bg); border: none; padding: 12px; border-radius: 10px; color: #fff; margin: 5px 0; outline: none; width: 100%; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-edit { background: rgba(255,255,255,0.1); font-size: 12px; padding: 5px 15px; margin-top: 10px; }

        .chat-item { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .chat-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        /* ОКНО РЕДАКТИРОВАНИЯ */
        #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 60px; position: fixed; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; }
            .sidebar { width: 100%; }
            .chat-main { position: fixed; top: 0; left: 100%; width: 100%; height: calc(100vh - 60px); z-index: 200; }
            .chat-main.open { left: 0; }
        }
    </style>
</head>
<body>

<div id="edit-modal">
    <div style="background: var(--panel); padding: 25px; border-radius: 20px; width: 90%; max-width: 350px;">
        <h3>Настройки профиля</h3>
        <input type="text" id="e-name" placeholder="Новое имя">
        <input type="number" id="e-age" placeholder="Новый возраст">
        <input type="text" id="e-ava" placeholder="Ссылка на фото">
        <textarea id="e-bio" placeholder="О себе..."></textarea>
        <button class="btn" onclick="saveProfile()" style="width:100%; margin-top:10px;">Сохранить изменения</button>
        <button class="btn" onclick="closeEdit()" style="width:100%; margin-top:10px; background:none;">Отмена</button>
    </div>
</div>

<div id="login-screen" class="screen active">
    <div style="margin:auto; background:var(--panel); padding:30px; border-radius:25px; text-align:center; width:90%; max-width:380px;">
        <i class="fas fa-crow" style="font-size:50px; color:var(--accent);"></i>
        <h2 style="margin:10px 0;">VERONAGRAM</h2>
        <input type="text" id="a-nick" placeholder="Никнейм (eng)">
        <input type="password" id="a-pass" placeholder="Пароль">
        <div id="reg-box">
            <input type="text" id="a-name" placeholder="Имя">
            <input type="number" id="a-age" placeholder="Возраст">
            <input type="text" id="a-ava" placeholder="Ссылка на фото">
            <textarea id="a-bio" placeholder="О себе..."></textarea>
        </div>
        <button class="btn" onclick="auth()" style="width:100%; margin-top:15px;">ВОЙТИ / СОЗДАТЬ</button>
    </div>
</div>

<div id="app-screen" class="screen">
    <div class="app-shell">
        <nav class="nav-bar">
            <i class="fas fa-comment" id="n-chats" onclick="tab('chats')"></i>
            <i class="fas fa-search" id="n-search" onclick="tab('search')"></i>
            <i class="fas fa-palette" id="n-pal" onclick="tab('pal')"></i>
            <i class="fas fa-user-circle" id="n-prof" onclick="tab('prof')"></i>
        </nav>

        <aside class="sidebar">
            <div id="t-chats" class="tab-content active">
                <div style="padding:20px; font-weight:bold; border-bottom:1px solid rgba(255,255,255,0.05);">Диалоги</div>
                <div id="chat-list"></div>
            </div>

            <div id="t-search" class="tab-content">
                <div style="padding:20px; font-weight:bold;">Поиск</div>
                <input type="text" id="s-in" placeholder="Искать по нику..." oninput="findU()" style="margin:0 15px; width:calc(100% - 30px);">
                <div id="s-res"></div>
            </div>

            <div id="t-pal" class="tab-content">
                <div style="padding:20px; font-weight:bold;">Тема</div>
                <div style="padding:15px; display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                    <div style="height:40px; background:#5865f2; border-radius:10px;" onclick="setTheme('#5865f2')"></div>
                    <div style="height:40px; background:#eb459e; border-radius:10px;" onclick="setTheme('#eb459e')"></div>
                    <div style="height:40px; background:#2ecc71; border-radius:10px;" onclick="setTheme('#2ecc71')"></div>
                </div>
            </div>

            <div id="t-prof" class="tab-content">
                <div class="p-header"></div>
                <div class="p-avatar" id="my-ava-box"><i class="fas fa-user"></i></div>
                <div class="p-info">
                    <h3 id="m-name-txt">---</h3>
                    <span id="m-nick-txt" style="color:var(--accent); font-size:14px;">@---</span><br>
                    <div class="p-age-tag">Возраст: <span id="m-age-txt">?</span></div>
                    <p id="m-bio-txt" style="color:var(--sub); font-size:13px; margin-top:10px;">---</p>
                    <button class="btn btn-edit" onclick="openEdit()">Редактировать профиль</button>
                </div>
                <div style="padding:15px; border-top:1px solid rgba(255,255,255,0.05); margin-top:15px;">
                    <small>НОВЫЙ ПОСТ</small>
                    <input type="text" id="p-img" placeholder="Ссылка на фото">
                    <textarea id="p-txt" placeholder="Текст поста..."></textarea>
                    <button class="btn" onclick="addPost()" style="width:100%">Опубликовать</button>
                    <button onclick="logout()" style="width:100%; background:none; border:none; color:var(--danger); margin-top:15px; font-size:12px;">Выйти</button>
                </div>
                <div id="my-posts"></div>
            </div>

            <div id="t-guest" class="tab-content">
                <div class="p-header"></div>
                <div class="p-avatar" id="g-ava-box"></div>
                <div class="p-info">
                    <h3 id="g-name-txt">---</h3>
                    <span id="g-nick-txt" style="color:var(--accent); font-size:14px;">@---</span><br>
                    <div class="p-age-tag">Возраст: <span id="g-age-txt">?</span></div>
                    <p id="g-bio-txt" style="color:var(--sub); font-size:13px; margin-top:10px;">---</p>
                </div>
                <div id="g-posts"></div>
                <button class="btn" onclick="tab('chats')" style="margin:20px;">Назад</button>
            </div>
        </aside>

        <main class="chat-main" id="cw">
            <div style="padding:15px; background:var(--panel); display:flex; align-items:center; gap:12px;">
                <i class="fas fa-arrow-left" onclick="closeC()" style="cursor:pointer;"></i>
                <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="viewGuest()">
                    <div id="c-ava-box" style="width:35px; height:35px; border-radius:50%; background:#222; overflow:hidden;"></div>
                    <b id="c-name-top">Чат</b>
                </div>
            </div>
            <div class="messages" id="mb"></div>
            <div id="ci-area" style="padding:15px; background:var(--panel); display:none; gap:10px;">
                <input type="text" id="msg-in" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </main>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
        authDomain: "veronagram-aafc1.firebaseapp.com",
        databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
        projectId: "veronagram-aafc1",
        storageBucket: "veronagram-aafc1.firebasestorage.app",
        messagingSenderId: "292300518581",
        appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let me = JSON.parse(localStorage.getItem('v-pro-user')) || null;
    let activeC = null;
    let guestNick = null;

    if(me) { loginOk(me); setTheme(localStorage.getItem('v-theme') || '#5865f2'); }

    async function auth() {
        const nick = document.getElementById('a-nick').value.toLowerCase().trim();
        const pass = document.getElementById('a-pass').value.trim();
        if(!nick || !pass) return alert("Заполни ник и пароль!");
        const s = await db.ref('users/' + nick).once('value');
        const d = s.val();
        if(d) {
            if(d.pass === pass) loginOk(d); else alert("Неверный пароль!");
        } else {
            const name = document.getElementById('a-name').value;
            if(!name) return alert("Введи имя!");
            const u = { nick, pass, name, age: document.getElementById('a-age').value || "?", ava: document.getElementById('a-ava').value, bio: document.getElementById('a-bio').value };
            await db.ref('users/' + nick).set(u); loginOk(u);
        }
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v-pro-user', JSON.stringify(me));
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('app-screen').classList.add('active');
        updateProfileUI();
        loadFriends();
        loadPosts('my-posts', me.nick);
    }

    function updateProfileUI() {
        document.getElementById('m-name-txt').innerText = me.name;
        document.getElementById('m-nick-txt').innerText = '@' + me.nick;
        document.getElementById('m-age-txt').innerText = me.age;
        document.getElementById('m-bio-txt').innerText = me.bio || "Описание отсутствует";
        if(me.ava) document.getElementById('my-ava-box').innerHTML = `<img src="${me.ava}">`;
    }

    // ФУНКЦИИ РЕДАКТИРОВАНИЯ
    function openEdit() {
        document.getElementById('e-name').value = me.name;
        document.getElementById('e-age').value = me.age;
        document.getElementById('e-ava').value = me.ava || "";
        document.getElementById('e-bio').value = me.bio || "";
        document.getElementById('edit-modal').style.display = "flex";
    }

    function closeEdit() { document.getElementById('edit-modal').style.display = "none"; }

    async function saveProfile() {
        const up = {
            name: document.getElementById('e-name').value,
            age: document.getElementById('e-age').value,
            ava: document.getElementById('e-ava').value,
            bio: document.getElementById('e-bio').value
        };
        Object.assign(me, up);
        await db.ref('users/' + me.nick).update(up);
        localStorage.setItem('v-pro-user', JSON.stringify(me));
        updateProfileUI();
        closeEdit();
        alert("Профиль обновлен!");
    }

    function findU() {
        const q = document.getElementById('s-in').value.toLowerCase();
        const res = document.getElementById('s-res'); res.innerHTML = "";
        if(q.length < 2) return;
        db.ref('users').once('value', s => {
            const users = s.val();
            for(let n in users) {
                if(n.includes(q) && n !== me.nick) {
                    const u = users[n];
                    const d = document.createElement('div'); d.className = 'chat-item';
                    d.innerHTML = `<img src="${u.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"><div><b>${u.name}</b><br><small>${u.age} лет</small></div><button class="btn" style="padding:5px 10px; margin-left:auto;" onclick="addF('${n}','${u.name}','${u.ava||""}')">В друзья</button>`;
                    res.appendChild(d);
                }
            }
        });
    }

    function addF(n, name, ava) { db.ref('friends/'+me.nick+'/'+n).set({name, ava}); alert("Друг добавлен!"); }

    function loadFriends() {
        db.ref('friends/' + me.nick).on('value', s => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            const data = s.val();
            for(let n in data) {
                const f = data[n];
                const d = document.createElement('div'); d.className = 'chat-item';
                d.innerHTML = `<img src="${f.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"><b>${f.name}</b>`;
                d.onclick = () => openC(n, f.name, f.ava);
                list.appendChild(d);
            }
        });
    }

    function openC(nick, name, ava) {
        activeC = [me.nick, nick].sort().join("_"); guestNick = nick;
        document.getElementById('c-name-top').innerText = name;
        document.getElementById('c-ava-box').innerHTML = ava ? `<img src="${ava}" style="width:100%; height:100%; object-fit:cover;">` : `<i class="fas fa-user"></i>`;
        document.getElementById('ci-area').style.display = "flex";
        document.getElementById('cw').classList.add('open');
        db.ref('chats/'+activeC).on('value', s => {
            const b = document.getElementById('mb'); b.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                const m = data[id];
                const d = document.createElement('div'); d.className = m.s === me.nick ? "msg me" : "msg other";
                d.innerText = m.t; b.appendChild(d);
            }
            b.scrollTop = b.scrollHeight;
        });
    }

    function send() {
        const t = document.getElementById('msg-in').value.trim();
        if(!t || !activeC) return;
        db.ref('chats/'+activeC).push({s:me.nick, t:t});
        document.getElementById('msg-in').value = "";
    }

    function addPost() {
        const url = document.getElementById('p-img').value;
        const txt = document.getElementById('p-txt').value;
        if(!txt) return;
        db.ref('posts/'+me.nick).push({url, txt});
        document.getElementById('p-img').value = ""; document.getElementById('p-txt').value = "";
    }

    function loadPosts(boxId, nick) {
        db.ref('posts/'+nick).on('value', s => {
            const list = document.getElementById(boxId); list.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                const p = data[id];
                const d = document.createElement('div'); d.className = 'post-card';
                d.innerHTML = `${p.url ? `<img src="${p.url}">` : ''}<div style="padding:10px;">${p.txt}</div>`;
                list.prepend(d);
            }
        });
    }

    async function viewGuest() {
        if(!guestNick) return;
        const s = await db.ref('users/'+guestNick).once('value');
        const u = s.val();
        document.getElementById('g-name-txt').innerText = u.name;
        document.getElementById('g-nick-txt').innerText = '@' + u.nick;
        document.getElementById('g-age-txt').innerText = u.age;
        document.getElementById('g-bio-txt').innerText = u.bio || "Нет описания";
        document.getElementById('g-ava-box').innerHTML = u.ava ? `<img src="${u.ava}" style="width:100%; height:100%; object-fit:cover;">` : `<i class="fas fa-user"></i>`;
        loadPosts('g-posts', guestNick);
        tab('guest');
    }

    function setTheme(c) { document.documentElement.style.setProperty('--accent', c); localStorage.setItem('v-theme', c); }
    function tab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
        if(document.getElementById('n-'+t)) document.getElementById('n-'+t).classList.add('active');
    }
    function closeC() { document.getElementById('cw').classList.remove('open'); }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
