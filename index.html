<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #5865f2; --bg: #0e1621; --panel: #17212b; --text: #fff; --sub: #708499; --danger: #ed4245; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* ОКНО РЕГИСТРАЦИИ */
        #login-screen { justify-content: center; align-items: center; background: radial-gradient(circle at top, #1e2a38, #0e1621); }
        .auth-card { width: 90%; max-width: 400px; background: var(--panel); padding: 50px 30px 40px; border-radius: 28px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
        .auth-card input, .auth-card textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: var(--bg); color: #fff; outline: none; }
        
        /* ИНТЕРФЕЙС ПРИЛОЖЕНИЯ */
        .app-shell { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; }
        .nav-bar i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.2s; }
        .nav-bar i.active { color: var(--accent); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }
        .tab-header { padding: 20px 25px; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* ПРОФИЛЬ */
        .profile-card { background: linear-gradient(135deg, #2b5278, #5865f2); margin: 15px; border-radius: 20px; padding: 30px 20px; text-align: center; }
        .avatar-big { width: 80px; height: 80px; background: #fff; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: var(--accent); border: 4px solid rgba(255,255,255,0.2); }
        .info-block { background: var(--bg); margin: 0 15px 10px; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; }

        /* ПОИСК */
        .search-area { padding: 15px; }
        .res-card { background: var(--bg); border-radius: 15px; padding: 20px; margin-top: 15px; text-align: center; border: 1px solid var(--accent); display: none; }

        /* ЧАТ */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 768px) { .app-shell { flex-direction: column-reverse; } .nav-bar { width: 100%; height: 60px; flex-direction: row; justify-content: space-around; padding: 0; } .sidebar { width: 100%; } .chat-main { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px;">Регистрация</h2>
            <input type="text" id="reg-name" placeholder="Никнейм">
            <input type="email" id="reg-email" placeholder="Почта">
            <textarea id="reg-bio" placeholder="О себе..."></textarea>
            <button class="btn" onclick="startApp()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-shell">
            <nav class="nav-bar">
                <i class="fas fa-comment" onclick="switchTab('chats', this)"></i>
                <i class="fas fa-search" onclick="switchTab('search', this)"></i>
                <i class="fas fa-user-circle active" onclick="switchTab('profile', this)"></i>
            </nav>

            <aside class="sidebar">
                <div id="tab-chats" class="tab-content">
                    <div class="tab-header">Чаты</div>
                    <div style="padding: 20px; color: var(--sub);">Общий чат активен</div>
                </div>

                <div id="tab-search" class="tab-content">
                    <div class="tab-header">Поиск</div>
                    <div class="search-area">
                        <input type="text" id="sq" placeholder="Поиск @id..." oninput="findUser()" style="width:100%; padding:12px; background:var(--bg); border:none; border-radius:10px; color:#fff;">
                        <div id="res" class="res-card">
                            <div class="avatar-big" style="width:50px; height:50px; font-size:20px;"><i class="fas fa-robot"></i></div>
                            <b id="res-name">Verona Admin</b>
                            <p style="color:var(--sub); font-size:12px; margin: 5px 0 15px;">@admin</p>
                            <div style="display:flex; gap:10px;">
                                <button class="btn" style="padding:8px; font-size:12px;" onclick="alert('Добавлено!')">Добавить</button>
                                <button class="btn" style="padding:8px; font-size:12px; background:var(--danger);" onclick="alert('В бане')">Блок</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-profile" class="tab-content active">
                    <div class="tab-header">Профиль</div>
                    <div class="profile-card">
                        <div class="avatar-big"><i class="fas fa-user"></i></div>
                        <h2 id="p-name">Имя</h2>
                    </div>
                    <div class="info-block"><i class="fas fa-envelope"></i><div><small style="color:var(--sub); display:block;">Почта</small><span id="p-email">---</span></div></div>
                    <div class="info-block"><i class="fas fa-info-circle"></i><div><small style="color:var(--sub); display:block;">Статус</small><span id="p-bio">---</span></div></div>
                    <div style="padding:15px;"><button class="btn" style="background:var(--danger);" onclick="location.reload()">ВЫЙТИ</button></div>
                </div>
            </aside>
            
            <main class="chat-main">
                <div class="tab-header">Общий чат</div>
                <div class="messages" id="chat-box"></div>
                <div style="padding:15px; background:var(--panel); display:flex; gap:10px;">
                    <input type="text" id="m-in" placeholder="Сообщение..." style="flex:1; background:var(--bg); border:none; padding:12px; border-radius:10px; color:#fff; outline:none;">
                    <button class="btn" style="width:auto; padding:0 20px;" onclick="send()">Отправить</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ТВОЯ КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
            authDomain: "veronagram-aafc1.firebaseapp.com",
            projectId: "veronagram-aafc1",
            storageBucket: "veronagram-aafc1.firebasestorage.app",
            messagingSenderId: "292300518581",
            appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myNick = "";

        function startApp() {
            myNick = document.getElementById('reg-name').value;
            if(!myNick) return alert("Введите никнейм!");
            
            document.getElementById('p-name').innerText = myNick;
            document.getElementById('p-email').innerText = document.getElementById('reg-email').value || 'не указана';
            document.getElementById('p-bio').innerText = document.getElementById('reg-bio').value || 'В сети';

            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
            
            db.ref("messages").on("value", (s) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                const data = s.val();
                for(let id in data) {
                    const m = data[id];
                    const d = document.createElement('div');
                    d.className = m.user === myNick ? "msg me" : "msg other";
                    d.innerHTML = `<b>${m.user}</b><br>${m.text}`;
                    box.appendChild(d);
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        function send() {
            const t = document.getElementById('m-in').value;
            if(!t) return;
            db.ref("messages").push().set({ user: myNick, text: t });
            document.getElementById('m-in').value = "";
        }

        function findUser() {
            const q = document.getElementById('sq').value.toLowerCase();
            document.getElementById('res').style.display = (q === 'admin' || q === '@admin') ? 'block' : 'none';
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
