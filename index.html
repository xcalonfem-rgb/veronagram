<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONA ULTIMATE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; --bg: #05070a; --panel: #111418; --text: #fff; --sub: #8b949e;
            --neon: 0 0 15px var(--accent);
            --glass: rgba(255, 255, 255, 0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* УВЕДОМЛЕНИЕ */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: var(--panel); border: 1px solid var(--accent); box-shadow: var(--neon);
            padding: 12px 20px; border-radius: 20px; z-index: 2000; transition: 0.5s; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; min-width: 280px;
        }

        /* НАВИГАЦИЯ */
        .nav-bar { width: 75px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 35px; border-right: 1px solid rgba(0,242,254,0.1); z-index: 100; }
        .nav-bar i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); text-shadow: var(--neon); transform: scale(1.2); }

        .sidebar { width: 380px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 80px; }
        .tab-content.active { display: flex; }

        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; box-shadow: var(--neon); font-size: 11px; }

        /* СПИСКИ */
        .user-card { display: flex; align-items: center; padding: 15px 20px; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .user-card img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }

        /* ПОСТЫ */
        .post-card { background: var(--glass); margin: 15px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
        .post-card img { width: 100%; max-height: 400px; object-fit: cover; }
        .post-actions { display: flex; align-items: center; gap: 20px; padding: 12px 15px; border-top: 1px solid rgba(255,255,255,0.05); }

        /* ЧАТ */
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 14px; position: relative; animation: pop 0.3s ease; }
        .msg.me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #21262d; border-bottom-left-radius: 2px; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        /* МОДАЛКИ */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid var(--accent); text-align: center; }

        input, textarea { background: #000; border: 1px solid #333; padding: 12px; border-radius: 12px; color: #fff; margin: 5px 0; width: 100%; outline: none; }
        .rec-active { color: #ff2e2e !important; text-shadow: 0 0 10px #ff2e2e; }

        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 65px; position: fixed; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; z-index: 100; border-right:none; border-top:1px solid rgba(0,242,254,0.2); }
            .sidebar { width: 100%; }
            .chat-main { position: fixed; top: 0; left: 100%; width: 100%; height: calc(100vh - 65px); transition: 0.3s; z-index: 500; }
            .chat-main.active { left: 0; }
        }
    </style>
</head>
<body>

<div id="toast" onclick="this.style.top = '-100px'">
    <img id="toast-ava" src="" style="width:35px;height:35px;border-radius:50%;border:1px solid var(--accent)">
    <div id="toast-msg" style="font-size:13px"></div>
</div>

<div id="view-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="v-ava" src="" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent); margin-bottom:15px; object-fit:cover; box-shadow:var(--neon)">
        <h2 id="v-name"></h2>
        <p id="v-nick" style="color:var(--accent); font-weight:bold"></p>
        <p id="v-bio" style="margin-top:15px; color:var(--sub); font-style:italic"></p>
        <div id="v-posts-area" style="margin-top:20px; border-top:1px solid #333; padding-top:10px; max-height:200px; overflow-y:auto"></div>
        <button class="btn" onclick="document.getElementById('view-modal').style.display='none'" style="margin-top:20px; width:100%">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <label style="cursor:pointer">
            <img id="e-ava-preview" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent); object-fit:cover">
            <input type="file" hidden onchange="uploadFile(this, 'ava')">
            <p style="font-size:10px; color:var(--accent); margin:10px 0">ИЗМЕНИТЬ АВАТАР</p>
        </label>
        <input type="text" id="e-name" placeholder="Имя">
        <textarea id="e-bio" placeholder="О себе..."></textarea>
        <button class="btn" onclick="saveProfile()" style="width:100%; margin-top:10px">СОХРАНИТЬ</button>
        <button class="btn" onclick="closeEdit()" style="background:none; color:var(--sub); box-shadow:none">ОТМЕНА</button>
    </div>
</div>

<div id="login-screen" class="screen active">
    <div style="margin:auto; background:var(--panel); padding:40px; border-radius:35px; text-align:center; width:90%; max-width:400px; border: 1px solid var(--accent); box-shadow: var(--neon);">
        <i class="fas fa-crown" style="font-size:40px; color:var(--accent); text-shadow:var(--neon); margin-bottom:15px"></i>
        <h1 style="letter-spacing:10px; color:var(--accent); margin-bottom:20px">VERONA</h1>
        <input type="text" id="a-nick" placeholder="НИКНЕЙМ">
        <input type="password" id="a-pass" placeholder="ПАРОЛЬ">
        <input type="text" id="a-name" placeholder="ИМЯ (ДЛЯ НОВЫХ)">
        <button class="btn" onclick="auth()" style="width:100%; margin-top:15px; padding:15px">ВОЙТИ В ЭЛИТУ</button>
    </div>
</div>

<div id="app-screen" class="screen">
    <nav class="nav-bar">
        <i class="fas fa-comment-dots active" onclick="tab('chats')" id="n-chats"></i>
        <i class="fas fa-search" onclick="tab('search')" id="n-search"></i>
        <i class="fas fa-user-astronaut" onclick="tab('prof')" id="n-prof"></i>
        <i class="fas fa-palette" onclick="tab('pal')" id="n-pal"></i>
    </nav>

    <aside class="sidebar">
        <div id="t-chats" class="tab-content active">
            <div style="padding:25px; font-weight:900; color:var(--accent); text-shadow:var(--neon)">MESSAGES</div>
            <div id="chat-list"></div>
        </div>
        <div id="t-search" class="tab-content">
            <div style="padding:25px; font-weight:900">FIND PEOPLE</div>
            <input type="text" id="s-in" placeholder="Поиск по нику..." oninput="findUsers()" style="margin:0 20px; width:calc(100% - 40px)">
            <div id="s-res"></div>
        </div>
        <div id="t-prof" class="tab-content">
            <div style="height:110px; background:linear-gradient(var(--accent), transparent); opacity:0.3"></div>
            <div id="my-ava-main" style="width:100px;height:100px;border-radius:50%;margin:-50px auto 10px;border:3px solid var(--panel);overflow:hidden;background:#222;box-shadow:var(--neon)"></div>
            <div style="text-align:center">
                <h2 id="m-name"></h2>
                <small id="m-nick" style="color:var(--accent)"></small>
                <p id="m-bio" style="padding:15px; font-size:13px; color:var(--sub)"></p>
                <button class="btn" onclick="openEdit()" style="padding:8px 20px">РЕДАКТИРОВАТЬ</button>
            </div>
            <div style="padding:20px; margin-top:20px; background:rgba(255,255,255,0.02)">
                <label style="display:block; text-align:center; padding:15px; border:1px dashed var(--accent); border-radius:15px; cursor:pointer; margin-bottom:10px">
                    📸 ДОБАВИТЬ ФОТО В ЛЕНТУ
                    <input type="file" hidden onchange="uploadFile(this, 'post')">
                </label>
                <textarea id="p-txt" placeholder="Текст поста..." style="height:60px"></textarea>
                <button class="btn" onclick="addPost()" style="width:100%">ОПУБЛИКОВАТЬ</button>
            </div>
            <div id="my-posts"></div>
        </div>
        <div id="t-pal" class="tab-content">
             <div style="padding:25px; font-weight:900">CUSTOM THEME</div>
             <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; padding:20px">
                <div style="height:50px; background:#00f2fe; border-radius:12px; box-shadow:0 0 10px #00f2fe" onclick="setTheme('#00f2fe')"></div>
                <div style="height:50px; background:#ff007c; border-radius:12px; box-shadow:0 0 10px #ff007c" onclick="setTheme('#ff007c')"></div>
                <div style="height:50px; background:#39ff14; border-radius:12px; box-shadow:0 0 10px #39ff14" onclick="setTheme('#39ff14')"></div>
                <div style="height:50px; background:#ffea00; border-radius:12px; box-shadow:0 0 10px #ffea00" onclick="setTheme('#ffea00')"></div>
             </div>
        </div>
    </aside>

    <main class="chat-main" id="chat-window" style="flex:1; display:flex; flex-direction:column; background:#080a0d">
        <div style="padding:15px; background:var(--panel); display:flex; align-items:center; gap:15px; border-bottom:1px solid #222">
            <i class="fas fa-chevron-left" onclick="closeChat()" style="color:var(--accent); cursor:pointer"></i>
            <img id="chat-top-ava" src="" onclick="viewUser(currentChatUser)" style="width:40px;height:40px;border-radius:50%;cursor:pointer;border:1px solid var(--accent)">
            <b id="chat-top-name">Чат</b>
            <i class="fas fa-trash-alt" style="margin-left:auto; color:var(--sub); cursor:pointer" onclick="deleteEntireChat()"></i>
        </div>
        <div class="msg-box" id="messages"></div>
        <div id="input-area" style="padding:15px; background:var(--panel); display:none; align-items:center; gap:12px">
            <i class="fas fa-microphone" id="rec-btn" onclick="toggleRecord()" style="font-size:22px; color:var(--accent); cursor:pointer"></i>
            <input type="text" id="msg-in" placeholder="Напиши что-нибудь..." onkeypress="if(event.key==='Enter') sendMsg()">
            <i class="fas fa-paper-plane" onclick="sendMsg()" style="color:var(--accent); font-size:20px; cursor:pointer"></i>
        </div>
    </main>
</div>

<script>
    const IMGBB_KEY = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";
    const firebaseConfig = {
        apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
        authDomain: "veronagram-aafc1.firebaseapp.com",
        databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
        projectId: "veronagram-aafc1",
        storageBucket: "veronagram-aafc1.appspot.com",
        messagingSenderId: "292300518581",
        appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let me = JSON.parse(localStorage.getItem('v-pro-max-user')) || null;
    let currentChat = null, currentChatUser = null, tempPostImg = "";
    let mediaRecorder, audioChunks = [];

    if(me) loginOk(me);

    async function auth() {
        const nick = document.getElementById('a-nick').value.toLowerCase().trim();
        const pass = document.getElementById('a-pass').value.trim();
        const name = document.getElementById('a-name').value.trim();
        if(!nick || !pass) return alert("Введите данные");

        const s = await db.ref('users/'+nick).once('value');
        if(s.val()) {
            if(s.val().pass === pass) loginOk(s.val()); else alert("Пароль!");
        } else {
            if(!name) return alert("Имя для регистрации?");
            const u = { nick, pass, name, ava:"", bio:"New Elite Member" };
            await db.ref('users/'+nick).set(u); loginOk(u);
        }
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v-pro-max-user', JSON.stringify(me));
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('app-screen').classList.add('active');
        updateUI(); loadFriends(); loadPosts(); listenNotify();
    }

    async function uploadFile(input, mode) {
        const file = input.files[0]; if(!file) return;
        const formData = new FormData(); formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
        const data = await res.json();
        if(data.success) {
            const url = data.data.url;
            if(mode === 'ava') {
                me.ava = url; await db.ref('users/'+me.nick).update({ava: url});
                updateUI();
            } else { tempPostImg = url; alert("Фото готово к посту!"); }
        }
    }

    function updateUI() {
        document.getElementById('m-name').innerText = me.name;
        document.getElementById('m-nick').innerText = "@" + me.nick;
        document.getElementById('m-bio').innerText = me.bio;
        const img = me.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        document.getElementById('my-ava-main').innerHTML = `<img src="${img}" style="width:100%;height:100%;object-fit:cover">`;
        document.getElementById('e-ava-preview').src = img;
    }

    async function saveProfile() {
        me.name = document.getElementById('e-name').value || me.name;
        me.bio = document.getElementById('e-bio').value || me.bio;
        await db.ref('users/'+me.nick).update(me);
        localStorage.setItem('v-pro-max-user', JSON.stringify(me));
        updateUI(); closeEdit();
    }

    function findUsers() {
        const q = document.getElementById('s-in').value.toLowerCase();
        const res = document.getElementById('s-res'); res.innerHTML = "";
        if(q.length < 1) return;
        db.ref('users').once('value', s => {
            const users = s.val();
            for(let n in users) {
                if(n.includes(q) && n !== me.nick) {
                    const u = users[n];
                    const d = document.createElement('div'); d.className = 'user-card';
                    d.innerHTML = `<img src="${u.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"><b>${u.name}</b><button onclick="addFriend('${n}')" class="btn" style="margin-left:auto">+</button>`;
                    d.onclick = () => viewUser(n);
                    res.appendChild(d);
                }
            }
        });
    }

    async function addFriend(nick) {
        const s = await db.ref('users/'+nick).once('value');
        const u = s.val();
        await db.ref('friends/'+me.nick+'/'+nick).set({ name: u.name, ava: u.ava });
        alert("Добавлен в контакты!");
    }

    function loadFriends() {
        db.ref('friends/'+me.nick).on('value', s => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            const data = s.val();
            for(let n in data) {
                const f = data[n];
                const d = document.createElement('div'); d.className = 'user-card';
                d.innerHTML = `<img src="${f.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"><div><b>${f.name}</b><br><small>@${n}</small></div>`;
                d.onclick = () => openChat(n, f.name, f.ava);
                list.appendChild(d);
            }
        });
    }

    function openChat(nick, name, ava) {
        currentChatUser = nick;
        currentChat = [me.nick, nick].sort().join("_");
        document.getElementById('chat-top-name').innerText = name;
        document.getElementById('chat-top-ava').src = ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        document.getElementById('input-area').style.display = "flex";
        document.getElementById('chat-window').classList.add('active');

        db.ref('messages/'+currentChat).off();
        db.ref('messages/'+currentChat).on('value', s => {
            const box = document.getElementById('messages'); box.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                const m = data[id];
                const d = document.createElement('div'); d.className = m.s === me.nick ? "msg me" : "msg other";
                if(m.type === 'voice') d.innerHTML = `<audio src="${m.t}" controls style="width:180px;height:35px"></audio>`;
                else d.innerHTML = m.t;
                d.innerHTML += `<small style="display:block;font-size:8px;opacity:0.4;margin-top:5px" onclick="delMsg('${id}')">удалить</small>`;
                box.appendChild(d);
            }
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg(text, type = 'text') {
        const t = text || document.getElementById('msg-in').value.trim();
        if(!t) return;
        db.ref('messages/'+currentChat).push({ s: me.nick, t: t, type: type, time: Date.now() });
        db.ref('notify/'+currentChatUser).set({ from: me.name, t: type==='voice'?'🎤 Голосовое':t, ava: me.ava, time: Date.now() });
        document.getElementById('msg-in').value = "";
    }

    async function toggleRecord() {
        const btn = document.getElementById('rec-btn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(audioChunks));
                reader.onloadend = () => { sendMsg(reader.result, 'voice'); audioChunks = []; };
            };
            mediaRecorder.start(); btn.classList.add('rec-active');
        } else { mediaRecorder.stop(); btn.classList.remove('rec-active'); }
    }

    function listenNotify() {
        db.ref('notify/'+me.nick).on('value', s => {
            const d = s.val();
            if(d && Date.now() - d.time < 3000) {
                document.getElementById('toast-ava').src = d.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                document.getElementById('toast-msg').innerHTML = `<b>${d.from}</b><br>${d.t}`;
                document.getElementById('toast').style.top = "20px";
                setTimeout(() => document.getElementById('toast').style.top = "-100px", 4000);
            }
        });
    }

    async function viewUser(nick) {
        const s = await db.ref('users/'+nick).once('value');
        const u = s.val();
        document.getElementById('v-ava').src = u.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        document.getElementById('v-name').innerText = u.name;
        document.getElementById('v-nick').innerText = "@" + u.nick;
        document.getElementById('v-bio').innerText = u.bio || "Пользователь Verona Elite";
        document.getElementById('view-modal').style.display = 'flex';
    }

    async function addPost() {
        const txt = document.getElementById('p-txt').value;
        if(!tempPostImg && !txt) return;
        await db.ref('posts/'+me.nick).push({ url: tempPostImg, txt, likes: 0, time: Date.now() });
        tempPostImg = ""; document.getElementById('p-txt').value = "";
    }

    function loadPosts() {
        db.ref('posts/'+me.nick).on('value', s => {
            const box = document.getElementById('my-posts'); box.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                const p = data[id];
                const d = document.createElement('div'); d.className = 'post-card';
                d.innerHTML = `${p.url ? `<img src="${p.url}">` : ''}<div style="padding:15px">${p.txt}</div>
                <div class="post-actions"><span onclick="db.ref('posts/${me.nick}/${id}/likes').transaction(c=>(c||0)+1)"><i class="fas fa-heart" style="color:#ff2e2e"></i> ${p.likes || 0}</span>
                <i class="fas fa-trash" style="margin-left:auto;opacity:0.3" onclick="db.ref('posts/${me.nick}/${id}').remove()"></i></div>`;
                box.prepend(d);
            }
        });
    }

    function tab(t) {
        document.querySelectorAll('.tab-content, .nav-bar i').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('n-'+t).classList.add('active');
    }

    function setTheme(c) {
        document.documentElement.style.setProperty('--accent', c);
        document.documentElement.style.setProperty('--neon', `0 0 15px ${c}`);
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
    function openEdit() { 
        document.getElementById('e-name').value = me.name;
        document.getElementById('e-bio').value = me.bio;
        document.getElementById('edit-modal').style.display = "flex"; 
    }
    function closeEdit() { document.getElementById('edit-modal').style.display = "none"; }
    function delMsg(id) { db.ref('messages/'+currentChat+'/'+id).remove(); }
    function deleteEntireChat() { if(confirm("Стереть историю?")) db.ref('messages/'+currentChat).remove(); }
</script>
</body>
</html>
