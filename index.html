<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONAGRAM - Вход</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page dark-theme">

    <div id="splash-screen">
        <div class="crow-logo"><i class="fas fa-crow"></i></div>
        <h1 class="splash-title">VERONAGRAM</h1>
    </div>

    <div class="auth-card" id="auth-content" style="display: none;">
        <div class="auth-header">
            <div class="brand-icon"><i class="fas fa-crow"></i></div>
            <h2>VERONAGRAM</h2>
            <p class="safety-text" id="typing-text"></p>
        </div>

        <form action="chats.html" class="auth-form">
            <div class="input-wrapper">
                <input type="text" placeholder="Логин или @id" class="clean-input" required>
                <div class="input-line"></div>
            </div>
            
            <div class="input-wrapper">
                <input type="password" placeholder="Пароль" class="clean-input" required>
                <div class="input-line"></div>
            </div>

            <button type="submit" class="tg-btn-main">ПРОДОЛЖИТЬ</button>
        </form>
    </div>

    <script>
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('auth-content').style.display = 'block';
                startTyping(); 
            }, 500);
        }, 2000);

        function startTyping() {
            const text = "Твоя безопасность общения у нас!";
            const container = document.getElementById('typing-text');
            let i = 0;
            const interval = setInterval(() => {
                container.textContent += text[i];
                i++;
                if (i === text.length) clearInterval(interval);
            }, 50);
        }
    </script>
</body>
</html>
