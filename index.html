<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM GOLD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #5865f2; --bg: #0e1621; --panel: #17212b; --text: #fff; --sub: #708499; --danger: #ed4245;
            --grad: linear-gradient(135deg, #2b5278, var(--accent));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* ЭКРАНЫ */
        .screen { display: none; height: 100vh; width: 100%; }
        .screen.active { display: flex; }

        /* НАВИГАЦИЯ */
        .app-shell { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 25px; }
        .nav-bar i { font-size: 20px; color: var(--sub); cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: var(--accent); transform: scale(1.2); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }

        /* ЧАТЫ */
        .chat-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .avatar-sm { width: 45px; height: 45px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* СООБЩЕНИЯ */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; position: relative; cursor: pointer; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #242f3d; border-bottom-left-radius: 4px; }
        .like { font-size: 12px; position: absolute; bottom: -10px; right: 5px; background: #17212b; border-radius: 10px; padding: 2px 5px; }

        /* ПАЛИТРА */
        .color-card { background: var(--bg); margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid var(--accent); }
        .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .swatch { height: 40px; border-radius: 10px; cursor: pointer; border: 2px solid #fff; }

        /* ЭМОДЗИ ПАК */
        #emoji-box { position: absolute; bottom: 70px; left: 15px; background: #17212b; padding: 10px; border-radius: 15px; display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; z-index: 100; box-shadow: 0 5px 20px #000; }
        .emoji { font-size: 20px; cursor: pointer; padding: 5px; border-radius: 5px; }
        .emoji:hover { background: rgba(255,255,255,0.1); }

        /* УВЕДОМЛЕНИЕ */
        #toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        .tab-header { padding: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        
        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 60px; position: fixed; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; }
            .sidebar { width: 100%; height: calc(100vh - 60px); }
            .chat-main { position: fixed; top: 0; left: 100%; width: 100%; height: calc(100vh - 60px); z-index: 200; }
            .chat-main.mobile-on { left: 0; }
        }
    </style>
</head>
<body>

    <div id="toast">Новое сообщение!</div>

    <div id="login-screen" class="screen active">
        <div style="margin:auto; background:var(--panel); padding:40px; border-radius:30px; text-align:center; width:90%; max-width:380px;">
            <i class="fas fa-crow" style="font-size:60px; color:var(--accent);"></i>
            <h2 style="margin:20px 0;">VERONAGRAM</h2>
            <input type="text" id="a-nick" placeholder="Ник" style="width:100%; padding:12px; margin:5px 0; border-radius:10px; border:none; background:var(--bg); color:#fff;">
            <input type="password" id="a-pass" placeholder="Пароль" style="width:100%; padding:12px; margin:5px 0; border-radius:10px; border:none; background:var(--bg); color:#fff;">
            <input type="text" id="a-name" placeholder="Имя (для новых)" style="width:100%; padding:12px; margin:5px 0; border-radius:10px; border:none; background:var(--bg); color:#fff;">
            <button onclick="auth()" style="width:100%; background:var(--accent); color:#fff; border:none; padding:15px; border-radius:12px; margin-top:20px; font-weight:bold;">ВОЙТИ</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-shell">
            <nav class="nav-bar">
                <i class="fas fa-comment" id="n-chats" onclick="showT('chats')"></i>
                <i class="fas fa-palette" id="n-pal" onclick="showT('pal')"></i>
                <i class="fas fa-search" id="n-search" onclick="showT('search')"></i>
                <i class="fas fa-user-circle" id="n-prof" onclick="showT('prof')"></i>
            </nav>

            <aside class="sidebar">
                <div id="t-chats" class="tab-content active">
                    <div class="tab-header">Чаты</div>
                    <div id="chat-list"></div>
                </div>

                <div id="t-pal" class="tab-content">
                    <div class="tab-header">Палитра</div>
                    <div class="color-card">
                        <small>ГРАДИЕНТЫ</small>
                        <div class="theme-grid">
                            <div class="swatch" style="background:linear-gradient(to bottom, #5865f2, #2b5278)" onclick="setTh('#5865f2')"></div>
                            <div class="swatch" style="background:linear-gradient(to bottom, #eb459e, #880e4f)" onclick="setTh('#eb459e')"></div>
                            <div class="swatch" style="background:linear-gradient(to bottom, #2ecc71, #1b5e20)" onclick="setTh('#2ecc71')"></div>
                            <div class="swatch" style="background:linear-gradient(to bottom, #f1c40f, #967117)" onclick="setTh('#f1c40f')"></div>
                        </div>
                        <small style="display:block; margin-top:15px;">ОДНОТОННЫЕ</small>
                        <div class="theme-grid">
                            <div class="swatch" style="background:#e74c3c" onclick="setTh('#e74c3c')"></div>
                            <div class="swatch" style="background:#9b59b6" onclick="setTh('#9b59b6')"></div>
                            <div class="swatch" style="background:#1abc9c" onclick="setTh('#1abc9c')"></div>
                            <div class="swatch" style="background:#7f8c8d" onclick="setTh('#7f8c8d')"></div>
                        </div>
                    </div>
                </div>

                <div id="t-search" class="tab-content">
                    <div class="tab-header">Поиск</div>
                    <input type="text" id="s-in" placeholder="Найти друга..." oninput="find()" style="margin:15px; padding:12px; background:var(--bg); border:none; border-radius:10px; color:#fff;">
                    <div id="s-res"></div>
                </div>

                <div id="t-prof" class="tab-content">
                    <div class="tab-header">Профиль</div>
                    <div style="text-align:center; padding:30px;">
                        <div class="avatar-sm" style="width:80px; height:80px; margin:0 auto 15px; font-size:30px;"><i class="fas fa-crow"></i></div>
                        <h2 id="m-name">---</h2>
                        <button onclick="logout()" style="margin-top:20px; color:var(--danger); background:none; border:none; font-weight:bold;">ВЫЙТИ</button>
                    </div>
                </div>
            </aside>

            <main class="chat-main" id="cw">
                <div class="tab-header">
                    <i class="fas fa-arrow-left" onclick="closeC()" style="cursor:pointer;"></i>
                    <span id="c-name">Выберите чат</span>
                    <i class="fas fa-trash-alt" onclick="clearFull()" style="color:var(--danger); cursor:pointer;"></i>
                </div>
                <div class="messages" id="mb"></div>
                <div id="emoji-box"></div>
                <div id="ci" style="padding:15px; background:var(--panel); display:none; gap:10px; align-items:center;">
                    <i class="far fa-smile" onclick="toggleE()" style="font-size:22px; cursor:pointer; color:var(--sub);"></i>
                    <input type="text" id="mi" placeholder="Сообщение..." style="flex:1; background:var(--bg); border:none; padding:12px; border-radius:10px; color:#fff; outline:none;" onkeypress="if(event.key==='Enter') send()">
                    <i class="fas fa-paper-plane" onclick="send()" style="font-size:20px; color:var(--accent); cursor:pointer;"></i>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
            authDomain: "veronagram-aafc1.firebaseapp.com",
            databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
            projectId: "veronagram-aafc1",
            storageBucket: "veronagram-aafc1.firebasestorage.app",
            messagingSenderId: "292300518581",
            appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let me = JSON.parse(localStorage.getItem('v-u')) || null;
        let activeC = null;

        const ems = ["😂","😍","❤️","🔥","👍","🙌","😎","😭","🤔","😊","✨","🚀"];
        const eBox = document.getElementById('emoji-box');
        ems.forEach(e => {
            const span = document.createElement('span'); span.className = 'emoji'; span.innerText = e;
            span.onclick = () => { document.getElementById('mi').value += e; toggleE(); };
            eBox.appendChild(span);
        });

        if(me) { loginOk(me); setTh(localStorage.getItem('v-c') || '#5865f2'); }

        async function auth() {
            const nick = document.getElementById('a-nick').value.toLowerCase().trim();
            const pass = document.getElementById('a-pass').value.trim();
            if(!nick || !pass) return alert("Заполни поля!");
            const s = await db.ref('users/' + nick).once('value');
            const d = s.val();
            if(d) {
                if(d.pass === pass) loginOk(d); else alert("Пароль!");
            } else {
                const name = document.getElementById('a-name').value;
                if(!name) return alert("Введи имя!");
                const u = { nick, pass, name };
                await db.ref('users/' + nick).set(u); loginOk(u);
            }
        }

        function loginOk(u) {
            me = u; localStorage.setItem('v-u', JSON.stringify(me));
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
            document.getElementById('m-name').innerText = me.name;
            loadChats();
            listenGlobal();
        }

        function loadChats() {
            db.ref('users').once('value', s => {
                const all = s.val();
                const list = document.getElementById('chat-list'); list.innerHTML = "";
                for(let n in all) {
                    if(n !== me.nick) {
                        const div = document.createElement('div'); div.className = 'chat-item';
                        div.innerHTML = `<div class="avatar-sm">${all[n].name[0]}</div><b>${all[n].name}</b>`;
                        div.onclick = () => openC(n, all[n].name);
                        list.appendChild(div);
                    }
                }
            });
        }

        function openC(nick, name) {
            activeC = [me.nick, nick].sort().join("_");
            document.getElementById('c-name').innerText = name;
            document.getElementById('ci').style.display = "flex";
            document.getElementById('cw').classList.add('mobile-on');
            
            db.ref('chats/' + activeC).off();
            db.ref('chats/' + activeC).on('value', s => {
                const b = document.getElementById('mb'); b.innerHTML = "";
                const data = s.val();
                for(let id in data) {
                    const m = data[id];
                    const d = document.createElement('div');
                    d.className = m.s === me.nick ? "msg me" : "msg other";
                    d.innerHTML = `${m.t}${m.l ? '<span class="like">❤️</span>' : ''}`;
                    d.onclick = () => { if(confirm("Удалить или Лайкнуть?")) { if(m.s === me.nick) db.ref('chats/'+activeC+'/'+id).remove(); else db.ref('chats/'+activeC+'/'+id).update({l:!m.l}); }};
                    b.appendChild(d);
                }
                b.scrollTop = b.scrollHeight;
            });
        }

        function send() {
            const t = document.getElementById('mi').value.trim();
            if(!t || !activeC) return;
            db.ref('chats/' + activeC).push({ s: me.nick, t: t, time: Date.now() });
            document.getElementById('mi').value = "";
        }

        function listenGlobal() {
            db.ref('chats').on('child_changed', s => {
                if(s.key.includes(me.nick)) {
                    const t = document.getElementById('toast');
                    t.style.display = "block"; setTimeout(() => t.style.display="none", 2000);
                }
            });
        }

        function find() {
            const q = document.getElementById('s-in').value.toLowerCase();
            const res = document.getElementById('s-res'); res.innerHTML = "";
            db.ref('users').once('value', s => {
                const u = s.val();
                for(let n in u) if(n.includes(q) && n !== me.nick) {
                    const d = document.createElement('div'); d.className = 'chat-item';
                    d.innerHTML = `<b>${u[n].name}</b>`; d.onclick = () => openC(n, u[n].name);
                    res.appendChild(d);
                }
            });
        }

        function clearFull() { if(confirm("Очистить всё?")) db.ref('chats/' + activeC).remove(); }
        function toggleE() { eBox.style.display = eBox.style.display === 'grid' ? 'none' : 'grid'; }
        function setTh(c) { document.documentElement.style.setProperty('--accent', c); localStorage.setItem('v-c', c); }
        function showT(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
            document.getElementById('t-' + t).classList.add('active');
            document.getElementById('n-' + t).classList.add('active');
        }
        function closeC() { document.getElementById('cw').classList.remove('mobile-on'); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
