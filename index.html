<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM | Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #5865f2; --bg: #0e1621; --panel: #17212b; --text: #fff; --sub: #708499; --danger: #ed4245; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* АВТОРИЗАЦИЯ */
        #login-screen { justify-content: center; align-items: center; background: radial-gradient(circle at top, #1e2a38, #0e1621); }
        .auth-card { width: 90%; max-width: 400px; background: var(--panel); padding: 40px 30px; border-radius: 28px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
        .auth-card input, .auth-card textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: var(--bg); color: #fff; outline: none; border: 1px solid transparent; transition: 0.3s; }
        .auth-card input:focus { border-color: var(--accent); }
        
        /* ИНТЕРФЕЙС */
        .app-shell { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 70px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; }
        .nav-bar i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.2s; }
        .nav-bar i.active { color: var(--accent); }

        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }
        .tab-header { padding: 20px 25px; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* ПРОФИЛЬ */
        .profile-card { background: linear-gradient(135deg, #2b5278, #5865f2); margin: 15px; border-radius: 20px; padding: 30px 20px; text-align: center; }
        .avatar-big { width: 80px; height: 80px; background: #fff; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: var(--accent); border: 4px solid rgba(255,255,255,0.2); }
        .info-block { background: var(--bg); margin: 0 15px 10px; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; }

        /* ПОИСК */
        .search-area { padding: 15px; }
        .user-item { background: var(--bg); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; cursor: pointer; }
        .user-item:hover { border-color: var(--accent); }

        /* ЧАТ */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 14px; }
        .msg.me { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        .msg b { font-size: 11px; color: var(--accent); display: block; margin-bottom: 4px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 768px) { .sidebar { width: 100%; } .chat-main { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-card">
            <h2 style="margin-bottom: 10px;">VERONAGRAM</h2>
            <p style="color: var(--sub); margin-bottom: 20px; font-size: 14px;">Создайте свой профиль в сети</p>
            <input type="text" id="reg-nick" placeholder="Ваш уникальный никнейм (без @)">
            <input type="text" id="reg-name" placeholder="Ваше Имя">
            <input type="email" id="reg-email" placeholder="Электронная почта">
            <textarea id="reg-bio" placeholder="О себе..."></textarea>
            <button class="btn" onclick="registerUser()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-shell">
            <nav class="nav-bar">
                <i class="fas fa-comment" onclick="switchTab('chats', this)"></i>
                <i class="fas fa-search" onclick="switchTab('search', this)"></i>
                <i class="fas fa-user-circle active" onclick="switchTab('profile', this)"></i>
            </nav>

            <aside class="sidebar">
                <div id="tab-chats" class="tab-content">
                    <div class="tab-header">Чаты</div>
                    <div style="padding:20px; color:var(--sub); text-align:center;">Выберите пользователя в поиске, чтобы начать чат.</div>
                </div>

                <div id="tab-search" class="tab-content">
                    <div class="tab-header">Поиск людей</div>
                    <div class="search-area">
                        <input type="text" id="search-input" placeholder="Введите ник или имя..." oninput="searchUsers()" style="width:100%; padding:12px; background:var(--bg); border:none; border-radius:10px; color:#fff; margin-bottom:15px;">
                        <div id="search-results"></div>
                    </div>
                </div>

                <div id="tab-profile" class="tab-content active">
                    <div class="tab-header">Мой Профиль</div>
                    <div class="profile-card">
                        <div class="avatar-big"><i class="fas fa-user"></i></div>
                        <h2 id="p-display-name">---</h2>
                        <small id="p-display-nick" style="opacity:0.7;">@---</small>
                    </div>
                    <div class="info-block"><i class="fas fa-envelope"></i><div><small style="color:var(--sub); display:block;">Почта</small><span id="p-display-email">---</span></div></div>
                    <div class="info-block"><i class="fas fa-info-circle"></i><div><small style="color:var(--sub); display:block;">Статус</small><span id="p-display-bio">---</span></div></div>
                    <div style="padding:15px;"><button class="btn" style="background:var(--danger);" onclick="logout()">ВЫЙТИ</button></div>
                </div>
            </aside>
            
            <main class="chat-main">
                <div class="tab-header" id="chat-title">Выберите чат</div>
                <div class="messages" id="chat-box"></div>
                <div id="input-area" style="padding:15px; background:var(--panel); display:none; gap:10px;">
                    <input type="text" id="m-in" placeholder="Сообщение..." style="flex:1; background:var(--bg); border:none; padding:12px; border-radius:10px; color:#fff; outline:none;">
                    <button class="btn" style="width:auto; padding:0 20px;" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
            authDomain: "veronagram-aafc1.firebaseapp.com",
            databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
            projectId: "veronagram-aafc1",
            storageBucket: "veronagram-aafc1.firebasestorage.app",
            messagingSenderId: "292300518581",
            appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = JSON.parse(localStorage.getItem('v-user')) || null;
        let activeChatPartner = null;

        if(currentUser) showApp();

        // 1. РЕГИСТРАЦИЯ И СОХРАНЕНИЕ В БАЗУ
        function registerUser() {
            const nick = document.getElementById('reg-nick').value.toLowerCase().replace('@', '');
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const bio = document.getElementById('reg-bio').value;

            if(!nick || !name) return alert("Никнейм и Имя обязательны!");

            const userData = { nick, name, email, bio };

            // Сохраняем в папку "users" по его нику
            db.ref('users/' + nick).set(userData).then(() => {
                localStorage.setItem('v-user', JSON.stringify(userData));
                currentUser = userData;
                showApp();
            });
        }

        function showApp() {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
            document.getElementById('p-display-name').innerText = currentUser.name;
            document.getElementById('p-display-nick').innerText = '@' + currentUser.nick;
            document.getElementById('p-display-email').innerText = currentUser.email || 'Скрыто';
            document.getElementById('p-display-bio').innerText = currentUser.bio || 'Привет, я в Veronagram!';
        }

        // 2. ЖИВОЙ ПОИСК ПО БАЗЕ
        function searchUsers() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = "";

            if(q.length < 2) return;

            db.ref('users').once('value', (snapshot) => {
                const users = snapshot.val();
                for(let nick in users) {
                    const u = users[nick];
                    if((u.nick.includes(q) || u.name.toLowerCase().includes(q)) && u.nick !== currentUser.nick) {
                        const div = document.createElement('div');
                        div.className = "user-item";
                        div.innerHTML = `<div class="avatar-big" style="width:40px; height:40px; font-size:15px; margin:0;"><i class="fas fa-user"></i></div>
                                         <div><b>${u.name}</b><br><small style="color:var(--sub)">@${u.nick}</small></div>`;
                        div.onclick = () => startPrivateChat(u);
                        resultsDiv.appendChild(div);
                    }
                }
            });
        }

        // 3. ПЕРЕХОД В ЧАТ
        function startPrivateChat(partner) {
            activeChatPartner = partner;
            document.getElementById('chat-title').innerText = "Чат с " + partner.name;
            document.getElementById('input-area').style.display = "flex";
            
            const chatID = [currentUser.nick, partner.nick].sort().join("_");
            
            db.ref('chats/' + chatID).on('value', (s) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                const msgs = s.val();
                for(let id in msgs) {
                    const m = msgs[id];
                    const d = document.createElement('div');
                    d.className = m.sender === currentUser.nick ? "msg me" : "msg other";
                    d.innerHTML = `<b>${m.sender}</b>${m.text}`;
                    box.appendChild(d);
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMessage() {
            const text = document.getElementById('m-in').value;
            if(!text || !activeChatPartner) return;

            const chatID = [currentUser.nick, activeChatPartner.nick].sort().join("_");
            db.ref('chats/' + chatID).push({
                sender: currentUser.nick,
                text: text,
                time: Date.now()
            });
            document.getElementById('m-in').value = "";
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            el.classList.add('active');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
