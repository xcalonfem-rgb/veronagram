<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONAGRAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #5865f2; --bg: #0e1621; --panel: #17212b;
            --text: #fff; --sub: #708499; --msg-in: #182533; --msg-out: #2b5278; --danger: #ed4245; --success: #3ba55c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Экраны */
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* ВХОД / РЕГИСТРАЦИЯ (С ЛОГО ВОРОНЫ) */
        #login-screen { justify-content: center; align-items: center; background: radial-gradient(circle at top, #1e2a38, #0e1621); }
        .auth-card { width: 90%; max-width: 400px; background: var(--panel); padding: 30px; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        
        /* БЕЛАЯ ВОРОНА (ЛОГО) */
        .verona-logo { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); margin: -60px auto 20px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--panel); color: #fff; font-size: 40px; }

        .auth-card h2 { margin-bottom: 20px; color: #fff; }
        .auth-card input, .auth-card textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 2px solid transparent; background: var(--bg); color: #fff; outline: none; }
        .auth-card textarea { resize: none; height: 80px; }
        .auth-card input:focus { border-color: var(--accent); }
        
        /* КНОПКА ВОЙТИ / РЕГИСТРАЦИЯ */
        .btn-main { padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; transition: 0.2s; background: var(--accent); color: #fff; width: 100%; }

        /* ПЕРЕКЛЮЧАТЕЛЬ */
        .auth-switch { margin-top: 15px; color: var(--sub); font-size: 14px; cursor: pointer; text-decoration: underline; }

        /* ОСНОВНОЙ КОНТЕЙНЕР (ПОСЛЕ ВХОДА) */
        .app-container { display: flex; width: 100%; height: 100%; }
        .nav-bar { width: 75px; background: #080e16; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-bar i { font-size: 24px; color: var(--sub); cursor: pointer; }
        .nav-bar i.active { color: var(--accent); }

        .sidebar { width: 350px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.2); }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; }
        .tab-header { padding: 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* ЧАТ */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 15px; background: var(--panel); display: flex; align-items: center; gap: 15px; }
        .input-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; background: var(--bg); border: none; padding: 12px; border-radius: 20px; color: #fff; outline: none; }

        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 60px; position: fixed; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid #111; }
            .sidebar { width: 100%; padding-bottom: 60px; }
            .chat-view { position: fixed; inset: 0; transform: translateX(100%); transition: 0.3s; z-index: 100; }
            .chat-view.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="auth-card">
            <div class="verona-logo">
                <i class="fas fa-crow"></i>
            </div>
            <h2 id="auth-title">Вход</h2>
            
            <input type="text" id="auth-name" placeholder="Никнейм">
            <input type="password" id="auth-pass" placeholder="Пароль">
            
            <div id="reg-fields" style="display:none">
                <input type="email" id="reg-email" placeholder="Электронная почта">
                <textarea id="reg-bio" placeholder="О себе..."></textarea>
            </div>

            <button class="btn-main" onclick="startApp()" id="auth-btn">Войти</button>
            <div class="auth-switch" onclick="switchAuth()" id="auth-link">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-container">
            <nav class="nav-bar">
                <i class="fas fa-comment active" onclick="tab('chats', this)"></i>
                <i class="fas fa-search" onclick="tab('search', this)"></i>
                <i class="fas fa-shield-alt" onclick="tab('privacy', this)"></i>
                <i class="fas fa-user-circle" onclick="tab('profile', this)"></i>
            </nav>

            <aside class="sidebar">
                <div id="tab-chats" class="tab-content active"><div class="tab-header">Чаты</div><div style="padding:15px;color:var(--sub)">Список пуст</div></div>
                <div id="tab-search" class="tab-content"><div class="tab-header">Поиск</div></div>
                <div id="tab-privacy" class="tab-content"><div class="tab-header">Приватность</div></div>
                <div id="tab-profile" class="tab-content">
                    <div class="tab-header">Профиль</div>
                    <div style="padding:20px;text-align:center;">
                        <div class="verona-logo" style="margin: 0 auto 20px;"><i class="fas fa-user"></i></div>
                        <h2 id="profile-nick">User</h2>
                        <button class="btn-main" onclick="location.reload()" style="background:var(--danger)">Выйти</button>
                    </div>
                </div>
            </aside>
            <main class="chat-view"><div class="chat-header"><b>Чат не выбран</b></div></main>
        </div>
    </div>

    <script>
        let isLogin = true;

        // Переключатель Регистрация / Вход
        function switchAuth() {
            isLogin = !isLogin;
            const fields = document.getElementById('reg-fields');
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const link = document.getElementById('auth-link');

            if (isLogin) {
                fields.style.display = 'none';
                title.innerText = 'Вход';
                btn.innerText = 'Войти';
                link.innerText = 'Нет аккаунта? Зарегистрироваться';
            } else {
                fields.style.display = 'block';
                title.innerText = 'Регистрация';
                btn.innerText = 'Создать аккаунт';
                link.innerText = 'Уже есть аккаунт? Войти';
            }
        }

        // КНОПКА "СТАРТ"
        function startApp() {
            const name = document.getElementById('auth-name').value;
            if(!name) return alert("Введите никнейм!");
            
            // Ставим имя в профиль
            document.getElementById('profile-nick').innerText = name;
            
            // Переключаем экраны
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app-screen').classList.add('active');
        }

        // Переключатель вкладок
        function tab(name, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
        }
    </script>
</body>
</html>
