<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONA ULTIMATE EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #00f2fe; --bg: #05070a; --panel: #111418; --text: #fff; --sub: #8b949e;
            --neon: 0 0 15px var(--accent);
            --glass: rgba(255, 255, 255, 0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .screen { display: none; height: 100vh; width: 100%; }
        .screen.active { display: flex; }

        /* НАВИГАЦИЯ */
        .nav-bar { width: 75px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 35px; border-right: 1px solid rgba(0,242,254,0.1); z-index: 100; }
        .nav-bar i { font-size: 22px; color: var(--sub); cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-bar i.active { color: var(--accent); text-shadow: var(--neon); transform: scale(1.3); }

        .sidebar { width: 380px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 80px; }
        .tab-content.active { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* НЕОНОВЫЕ КНОПКИ */
        .btn { 
            background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 14px; 
            font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: var(--neon);
            text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.2); box-shadow: 0 0 25px var(--accent); }
        .btn:active { transform: scale(0.98); }

        /* ПОИСК И ЧАТ-ЛИСТ */
        .user-item { display: flex; align-items: center; padding: 15px 20px; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .user-item:hover { background: rgba(255,255,255,0.05); }
        .user-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); box-shadow: var(--neon); }

        /* ПОСТЫ */
        .post-card { background: var(--glass); margin: 15px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
        .post-card img { width: 100%; max-height: 450px; object-fit: cover; }
        .post-actions { display: flex; align-items: center; gap: 20px; padding: 12px 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .like-btn { cursor: pointer; transition: 0.2s; color: var(--sub); font-size: 14px; }
        .like-btn.active { color: #ff2e2e; text-shadow: 0 0 10px #ff2e2e; }

        /* ЧАТ */
        .msg-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; position: relative; font-size: 14px; line-height: 1.4; animation: pop 0.3s ease; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .msg.me { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; border-bottom-right-radius: 4px; box-shadow: var(--neon); }
        .msg.other { align-self: flex-start; background: #21262d; color: #fff; border-bottom-left-radius: 4px; }
        .del-msg { font-size: 9px; opacity: 0.4; cursor: pointer; display: block; text-align: right; margin-top: 4px; }

        /* МОДАЛКИ И ВВОД */
        #edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        input, textarea { background: #000; border: 1px solid #333; padding: 14px; border-radius: 12px; color: #fff; margin: 8px 0; outline: none; width: 100%; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: var(--neon); }

        .sticker-panel { display: grid; grid-template-columns: repeat(6, 1fr); padding: 15px; background: #000; gap: 10px; border-top: 1px solid #222; }
        .sticker { font-size: 28px; cursor: pointer; transition: 0.2s; text-align: center; }
        .sticker:hover { transform: scale(1.3); }

        @media (max-width: 768px) {
            .nav-bar { width: 100%; height: 65px; position: fixed; bottom: 0; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid rgba(0,242,254,0.2); }
            .sidebar { width: 100%; }
            .chat-main { position: fixed; top: 0; left: 100%; width: 100%; height: calc(100vh - 65px); transition: 0.4s; z-index: 500; }
            .chat-main.active { left: 0; }
        }
    </style>
</head>
<body>

<div id="edit-modal">
    <div style="background: var(--panel); padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid var(--accent); box-shadow: var(--neon);">
        <h2 style="text-align:center; margin-bottom:20px;">ПРОФИЛЬ</h2>
        <div style="text-align:center; margin-bottom:20px">
            <label style="cursor:pointer">
                <div style="width:90px; height:90px; border-radius:50%; margin:0 auto 10px; border:2px solid var(--accent); overflow:hidden; box-shadow: var(--neon);">
                    <img src="" id="e-ava-img" style="width:100%; height:100%; object-fit:cover">
                </div>
                <input type="file" hidden onchange="uploadFile(this, 'ava')">
                <span style="color:var(--accent); font-size:12px;">СМЕНИТЬ ФОТО</span>
            </label>
        </div>
        <input type="text" id="e-name" placeholder="Имя">
        <textarea id="e-bio" placeholder="О себе..."></textarea>
        <button class="btn" onclick="saveProfile()" style="width:100%; margin-top:10px">СОХРАНИТЬ</button>
        <button class="btn" onclick="closeEdit()" style="width:100%; background:none; color:var(--sub); box-shadow:none">ОТМЕНА</button>
    </div>
</div>

<div id="login-screen" class="screen active">
    <div style="margin:auto; background:var(--panel); padding:40px; border-radius:35px; text-align:center; width:90%; max-width:400px; border: 1px solid var(--accent); box-shadow: var(--neon);">
        <i class="fas fa-bolt" style="font-size: 50px; color: var(--accent); text-shadow: var(--neon); margin-bottom: 15px;"></i>
        <h1 style="letter-spacing: 10px; margin-bottom: 30px;">VERONA</h1>
        <input type="text" id="a-nick" placeholder="НИКНЕЙМ">
        <input type="password" id="a-pass" placeholder="ПАРОЛЬ">
        <input type="text" id="a-name" placeholder="ВАШЕ ИМЯ">
        <button class="btn" onclick="auth()" style="width:100%; margin-top:20px; padding:18px">ВОЙТИ</button>
    </div>
</div>

<div id="app-screen" class="screen">
    <div class="app-shell">
        <nav class="nav-bar">
            <i class="fas fa-comment-dots active" onclick="tab('chats')" id="n-chats"></i>
            <i class="fas fa-search" onclick="tab('search')" id="n-search"></i>
            <i class="fas fa-rocket" onclick="tab('prof')" id="n-prof"></i>
            <i class="fas fa-palette" onclick="tab('pal')" id="n-pal"></i>
        </nav>

        <aside class="sidebar">
            <div id="t-chats" class="tab-content active">
                <div style="padding:25px; font-weight:900; font-size:22px; color:var(--accent); text-shadow: var(--neon);">MESSAGES</div>
                <div id="chat-list"></div>
            </div>

            <div id="t-search" class="tab-content">
                <div style="padding:25px; font-weight:900; font-size:22px;">FIND FRIENDS</div>
                <input type="text" id="s-in" placeholder="Введите ник..." oninput="findUsers()" style="margin: 0 20px; width: calc(100% - 40px);">
                <div id="s-res"></div>
            </div>

            <div id="t-pal" class="tab-content">
                <div style="padding:25px; font-weight:900; font-size:22px;">THEMES</div>
                <div style="padding:20px; display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;">
                    <div style="height:55px; background:#00f2fe; border-radius:15px; box-shadow: 0 0 15px #00f2fe;" onclick="setTheme('#00f2fe')"></div>
                    <div style="height:55px; background:#ff007c; border-radius:15px; box-shadow: 0 0 15px #ff007c;" onclick="setTheme('#ff007c')"></div>
                    <div style="height:55px; background:#39ff14; border-radius:15px; box-shadow: 0 0 15px #39ff14;" onclick="setTheme('#39ff14')"></div>
                    <div style="height:55px; background:#ff9100; border-radius:15px; box-shadow: 0 0 15px #ff9100;" onclick="setTheme('#ff9100')"></div>
                    <div style="height:55px; background:#ff2e2e; border-radius:15px; box-shadow: 0 0 15px #ff2e2e;" onclick="setTheme('#ff2e2e')"></div>
                    <div style="height:55px; background:#9000ff; border-radius:15px; box-shadow: 0 0 15px #9000ff;" onclick="setTheme('#9000ff')"></div>
                </div>
            </div>

            <div id="t-prof" class="tab-content">
                <div style="height:120px; background:linear-gradient(135deg, #000, var(--accent)); position:relative;" id="p-head"></div>
                <div style="width:100px; height:100px; border-radius:50%; border:4px solid var(--panel); background:#222; margin:-50px auto 10px; position:relative; overflow:hidden; box-shadow: var(--neon);" id="my-ava-box"></div>
                <div style="text-align:center; padding:0 20px;">
                    <h2 id="m-name-txt">---</h2>
                    <div style="color:var(--accent); font-size:14px;">@<span id="m-nick-txt">---</span></div>
                    <p id="m-bio-txt" style="color:var(--sub); font-size:13px; margin-top:10px;">---</p>
                    <button class="btn" onclick="openEdit()" style="margin-top:15px; padding:8px 25px;">НАСТРОЙКИ</button>
                </div>
                <div style="padding:20px; margin-top:30px; background:rgba(0,0,0,0.3)">
                    <label style="background:var(--glass); padding:15px; border-radius:15px; display:block; text-align:center; cursor:pointer; border:1px dashed var(--accent); margin-bottom:10px">
                        📸 ВЫБРАТЬ ФОТО ПОСТА
                        <input type="file" hidden onchange="uploadFile(this, 'post')">
                    </label>
                    <textarea id="p-txt" placeholder="Что нового?" style="height:80px;"></textarea>
                    <button class="btn" onclick="addPost()" style="width:100%">ОПУБЛИКОВАТЬ</button>
                </div>
                <div id="my-posts"></div>
            </div>
        </aside>

        <main class="chat-main" id="chat-window" style="flex:1; display:flex; flex-direction:column; background:#080a0d">
            <div style="padding:15px 25px; background:var(--panel); display:flex; align-items:center; gap:15px; border-bottom:1px solid rgba(255,255,255,0.05)">
                <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor:pointer; color:var(--accent)"></i>
                <img id="chat-top-ava" src="" style="width:40px; height:40px; border-radius:50%; display:none; border:1px solid var(--accent)">
                <div style="flex:1">
                    <b id="chat-top-name">Выбери друга</b>
                    <small id="chat-status" style="display:block; color:#0cf017; font-size:10px"></small>
                </div>
                <i class="fas fa-trash-alt" id="del-chat-btn" style="color:var(--sub); cursor:pointer; display:none;" onclick="deleteEntireChat()"></i>
            </div>
            
            <div class="msg-box" id="messages"></div>
            
            <div class="sticker-panel" id="stickers" style="display:none;">
                <span class="sticker" onclick="sendMsg('🔥')">🔥</span>
                <span class="sticker" onclick="sendMsg('❤️')">❤️</span>
                <span class="sticker" onclick="sendMsg('😂')">😂</span>
                <span class="sticker" onclick="sendMsg('😎')">😎</span>
                <span class="sticker" onclick="sendMsg('👿')">👿</span>
                <span class="sticker" onclick="sendMsg('💀')">💀</span>
            </div>

            <div id="input-area" style="padding:15px; background:var(--panel); display:none; gap:12px; align-items:center;">
                <i class="far fa-laugh" onclick="toggleStickers()" style="font-size:22px; cursor:pointer; color:var(--accent);"></i>
                <input type="text" id="msg-in" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()" style="border-radius:30px; padding:12px 20px;">
                <button class="btn" onclick="sendMsg()" style="width:50px; height:50px; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>
</div>

<script>
    const IMGBB_KEY = "a4feb69baa5d7a0b6e9d3f4f80ce72bd";
    const firebaseConfig = {
        apiKey: "AIzaSyDQWF2K9Pmb_xIYbELL0I95yQgNGQeAr4g",
        authDomain: "veronagram-aafc1.firebaseapp.com",
        databaseURL: "https://veronagram-aafc1-default-rtdb.firebaseio.com",
        projectId: "veronagram-aafc1",
        storageBucket: "veronagram-aafc1.appspot.com",
        messagingSenderId: "292300518581",
        appId: "1:292300518581:web:5bdcfe32aa4fbcdef83afc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let me = JSON.parse(localStorage.getItem('v-final-user')) || null;
    let currentChat = null;
    let tempUrl = "";

    if(me) loginOk(me);

    async function auth() {
        const nick = document.getElementById('a-nick').value.toLowerCase().trim();
        const pass = document.getElementById('a-pass').value.trim();
        const name = document.getElementById('a-name').value.trim();
        if(!nick || !pass) return alert("Заполни поля!");

        const s = await db.ref('users/'+nick).once('value');
        if(s.val()) {
            if(s.val().pass === pass) loginOk(s.val()); else alert("Пароль!");
        } else {
            if(!name) return alert("Введи имя для регистрации!");
            const u = { nick, pass, name, ava:"", bio:"Verona user", age:"?" };
            await db.ref('users/'+nick).set(u); loginOk(u);
        }
    }

    function loginOk(u) {
        me = u; localStorage.setItem('v-final-user', JSON.stringify(me));
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('app-screen').classList.add('active');
        updateUI(); loadFriends(); loadPosts();
    }

    async function uploadFile(input, mode) {
        const file = input.files[0]; if(!file) return;
        const formData = new FormData(); formData.append("image", file);
        const label = input.parentElement; label.innerText = "⏳ ЗАГРУЗКА...";

        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
        const data = await res.json();
        if(data.success) {
            tempUrl = data.data.url;
            label.innerText = "✅ ГОТОВО";
            if(mode === 'ava') {
                document.getElementById('e-ava-img').src = tempUrl;
                me.ava = tempUrl;
            }
        }
    }

    function updateUI() {
        document.getElementById('m-name-txt').innerText = me.name;
        document.getElementById('m-nick-txt').innerText = me.nick;
        document.getElementById('m-bio-txt').innerText = me.bio;
        document.getElementById('my-ava-box').innerHTML = me.ava ? `<img src="${me.ava}" style="width:100%;height:100%;object-fit:cover">` : `<i class="fas fa-user-astronaut" style="font-size:40px;margin-top:25px;color:#333"></i>`;
        document.getElementById('e-ava-img').src = me.ava || '';
    }

    async function saveProfile() {
        me.name = document.getElementById('e-name').value || me.name;
        me.bio = document.getElementById('e-bio').value || me.bio;
        await db.ref('users/'+me.nick).update(me);
        localStorage.setItem('v-final-user', JSON.stringify(me));
        updateUI(); closeEdit();
    }

    // ПОИСК
    function findUsers() {
        const q = document.getElementById('s-in').value.toLowerCase();
        const res = document.getElementById('s-res'); res.innerHTML = "";
        if(q.length < 1) return;
        db.ref('users').once('value', s => {
            const users = s.val();
            for(let n in users) {
                if(n.includes(q) && n !== me.nick) {
                    const u = users[n];
                    const d = document.createElement('div'); d.className = 'user-item';
                    d.innerHTML = `<img src="${u.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"><b>${u.name}</b> <button onclick="addFriend('${n}','${u.name}','${u.ava}')" class="btn" style="margin-left:auto; padding:5px 12px; font-size:10px">+</button>`;
                    res.appendChild(d);
                }
            }
        });
    }

    async function addFriend(nick, name, ava) {
        await db.ref('friends/'+me.nick+'/'+nick).set({ name, ava });
        alert("Друг добавлен в список!");
    }

    function loadFriends() {
        db.ref('friends/'+me.nick).on('value', s => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            const data = s.val();
            for(let n in data) {
                const f = data[n];
                const d = document.createElement('div'); d.className = 'user-item';
                d.innerHTML = `<img src="${f.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"><div><b>${f.name}</b><br><small style="color:var(--sub)">@${n}</small></div>`;
                d.onclick = () => openChat(n, f.name, f.ava);
                list.appendChild(d);
            }
        });
    }

    // ЧАТ
    function openChat(nick, name, ava) {
        currentChat = [me.nick, nick].sort().join("_");
        document.getElementById('chat-top-name').innerText = name;
        document.getElementById('chat-top-ava').src = ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        document.getElementById('chat-top-ava').style.display = "block";
        document.getElementById('input-area').style.display = "flex";
        document.getElementById('del-chat-btn').style.display = "block";
        document.getElementById('chat-status').innerText = "online";
        document.getElementById('chat-window').classList.add('active');

        db.ref('messages/'+currentChat).off();
        db.ref('messages/'+currentChat).on('value', s => {
            const box = document.getElementById('messages'); box.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                const m = data[id];
                const d = document.createElement('div'); d.className = m.s === me.nick ? "msg me" : "msg other";
                d.innerHTML = `${m.t}<span class="del-msg" onclick="deleteMsg('${id}')">удалить</span>`;
                box.appendChild(d);
            }
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg(sticker) {
        const t = sticker || document.getElementById('msg-in').value.trim();
        if(!t) return;
        db.ref('messages/'+currentChat).push({ s: me.nick, t: t, time: Date.now() });
        document.getElementById('msg-in').value = "";
        document.getElementById('stickers').style.display = "none";
    }

    function deleteMsg(id) { if(confirm("Удалить?")) db.ref('messages/'+currentChat+'/'+id).remove(); }
    function deleteEntireChat() { if(confirm("Стереть чат?")) db.ref('messages/'+currentChat).remove(); }
    function toggleStickers() { 
        const s = document.getElementById('stickers');
        s.style.display = s.style.display === 'none' ? 'grid' : 'none';
    }

    // ЛЕНТА
    async function addPost() {
        const txt = document.getElementById('p-txt').value;
        if(!tempUrl && !txt) return;
        await db.ref('posts/'+me.nick).push({ url: tempUrl, txt, time: Date.now(), likes: 0 });
        tempUrl = ""; document.getElementById('p-txt').value = "";
    }

    function loadPosts() {
        db.ref('posts/'+me.nick).on('value', s => {
            const list = document.getElementById('my-posts'); list.innerHTML = "";
            const data = s.val();
            for(let id in data) {
                const p = data[id];
                const d = document.createElement('div'); d.className = 'post-card';
                d.innerHTML = `
                    ${p.url ? `<img src="${p.url}">` : ''}
                    <div style="padding:15px; font-size:14px;">${p.txt}</div>
                    <div class="post-actions">
                        <span class="like-btn" onclick="likePost('${id}')"><i class="fas fa-heart"></i> ${p.likes || 0}</span>
                        <i class="fas fa-trash-alt" style="margin-left:auto; color:#444; font-size:12px; cursor:pointer;" onclick="deletePost('${id}')"></i>
                    </div>
                `;
                list.prepend(d);
            }
        });
    }

    function deletePost(id) { if(confirm("Удалить пост?")) db.ref('posts/'+me.nick+'/'+id).remove(); }
    function likePost(id) {
        db.ref('posts/'+me.nick+'/'+id+'/likes').transaction(c => (c || 0) + 1);
    }

    // UI
    function tab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-bar i').forEach(i => i.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('n-'+t).classList.add('active');
    }

    function setTheme(c) {
        document.documentElement.style.setProperty('--accent', c);
        document.documentElement.style.setProperty('--neon', `0 0 15px ${c}`);
        document.getElementById('p-head').style.background = `linear-gradient(135deg, #000, ${c})`;
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
    function openEdit() { 
        document.getElementById('e-name').value = me.name;
        document.getElementById('e-bio').value = me.bio;
        document.getElementById('edit-modal').style.display = "flex"; 
    }
    function closeEdit() { document.getElementById('edit-modal').style.display = "none"; }
</script>
</body>
</html>
